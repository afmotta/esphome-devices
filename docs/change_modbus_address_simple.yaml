# Simplified ESPHome Configuration to Change Modbus 0-10V Adapter Address
# 
# ⚠️  CRITICAL: Only connect ONE device at a time to avoid address conflicts!
# 
# Quick Start:
# 1. Edit 'current_address' to factory default (usually 0x01)
# 2. Edit 'new_address' to desired value (0x04 or 0x05)
# 3. Adjust uart pins for your board (see comments below)
# 4. Flash to ESP32
# 5. Watch logs, use button in HA to change address
# 6. Power cycle the 0-10V adapter
# 7. Verify by changing 'current_address' to 'new_address' and reflashing

substitutions:
  device_name: "modbus-addr-tool"
  current_address: "0x01"  # Factory default is usually 0x01
  new_address: "0x05"      # 0x04=second floor, 0x05=ground floor

esphome:
  name: ${device_name}
  
esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: "YourSSID"      # ← Edit this
  password: "YourPass"  # ← Edit this
  
  ap:
    ssid: "${device_name}"
    password: "12345678"

captive_portal:
logger:
  level: DEBUG
api:
ota:

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# RS485 UART - ADJUST PINS FOR YOUR BOARD:
# KC868-A6:  TX=GPIO27, RX=GPIO14
# KC868-A16: TX=GPIO13, RX=GPIO16
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
uart:
  id: rs485
  tx_pin: GPIO27  # ← Change for A16: GPIO13
  rx_pin: GPIO14  # ← Change for A16: GPIO16
  baud_rate: 9600
  stop_bits: 1

modbus:
  id: modbus_bus
  uart_id: rs485

modbus_controller:
  - id: device
    address: ${current_address}
    modbus_id: modbus_bus
    update_interval: 3s

# Test communication with device
sensor:
  - platform: modbus_controller
    modbus_controller_id: device
    name: "Test Read (Reg 0x0001)"
    id: test_reg
    address: 0x0001
    register_type: holding
    value_type: U_WORD

# Button to change address
button:
  - platform: template
    name: "⚠️  Change Address ${current_address} → ${new_address}"
    on_press:
      - logger.log: "🔧 Changing Modbus address..."
      - modbus_controller.write_register:
          id: device
          address: 0x0000
          value: ${new_address}
      - delay: 1s
      - logger.log: 
          format: "✅ Done! Power cycle the 0-10V adapter now."
          level: WARN
      - logger.log:
          format: "Then change current_address to ${new_address} and reflash to verify."
          level: WARN

text_sensor:
  - platform: template
    name: "Status"
    lambda: |-
      if (id(test_reg).has_state()) {
        return {"✅ Device found at " + std::string("${current_address}")};
      }
      return {"❌ No device at " + std::string("${current_address}")};
    update_interval: 5s
