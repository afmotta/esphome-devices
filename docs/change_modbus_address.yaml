# ESPHome Configuration to Change Modbus 0-10V Adapter Address
# Purpose: Change device address from 0x01 (factory default) to desired address
#
# WARNING: Only connect ONE device at a time to avoid address conflicts!
#
# Instructions:
# 1. Connect ONLY the device you want to reconfigure to RS485 bus
# 2. Flash this config to your ESP32 board
# 3. Monitor logs to see current address detection
# 4. Press the button in Home Assistant to change address
# 5. Device will be reconfigured to new address (0x04 or 0x05)

substitutions:
  device_name: "modbus-address-changer"
  friendly_name: "Modbus Address Changer"
  current_address: "0x01" # Factory default address
  new_address: "0x0032" # Change to 0x0032 for second floor, 0x0033 for ground floor

esphome:
  name: ${device_name}
  platform: ESP32
  board: esp32dev

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${device_name} Fallback"
    password: "fallbackpass"

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  password: !secret ota_password

# RS485 UART Configuration (adjust pins for your board)
# For KC868-A6: TX=GPIO27, RX=GPIO14
# For KC868-A16: TX=GPIO13, RX=GPIO16
uart:
  id: rs485
  tx_pin: GPIO27 # Change based on your board
  rx_pin: GPIO14 # Change based on your board
  baud_rate: 9600
  stop_bits: 1
  data_bits: 8
  parity: NONE

# Modbus RTU Master
modbus:
  id: modbus_bus
  uart_id: rs485
  send_wait_time: 200ms

# Connect to device at current address
modbus_controller:
  - id: target_device
    address: ${current_address}
    modbus_id: modbus_bus
    update_interval: 5s
    command_throttle: 100ms

# Read current device address (usually at register 0x0000 or 0x4000)
sensor:
  - platform: modbus_controller
    modbus_controller_id: target_device
    name: "Current Device Address (Reg 0x0000)"
    id: current_addr_0
    address: 0x0000
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: target_device
    name: "Current Device Address (Reg 0x4000)"
    id: current_addr_4000
    address: 0x4000
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: target_device
    name: "Test Register 0x0001"
    id: test_register
    address: 0x0001
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0

# Button to change device address
button:
  - platform: template
    name: "Change Address to ${new_address}"
    icon: "mdi:cog"
    on_press:
      - logger.log: "Attempting to change device address..."
      # Try writing to common configuration registers
      # Method 1: Register 0x40001
      - lambda: |-
          uint16_t new_addr = ${new_address};
          ESP_LOGI("address_change", "Writing new address %d to register 0x40001", new_addr);
          esphome::modbus_controller::ModbusController *controller = id(target_device);
          std::vector<uint16_t> data = {new_addr};
          controller->create_register_write_multiple_command(
            esphome::modbus_controller::ModbusRegisterType::HOLDING,
            0x40001,
            1,
            data
          );
      - delay: 2s
      - logger.log:
          format: "Address change command sent. Power cycle the device, then change 'current_address' to ${new_address} and reflash to verify."
          level: WARN

  - platform: restart
    name: "Restart ESP32"

# Number entity to manually write to any register
number:
  - platform: template
    name: "Manual Register Write"
    id: manual_register_write
    min_value: 0
    max_value: 65535
    step: 1
    optimistic: true
    set_action:
      - lambda: |-
          uint16_t value = (uint16_t)x;
          ESP_LOGI("manual_write", "Writing value %d to register 0x0000", value);
          esphome::modbus_controller::ModbusController *controller = id(target_device);
          std::vector<uint16_t> data = {value};
          controller->create_register_write_multiple_command(
            esphome::modbus_controller::ModbusRegisterType::HOLDING,
            0x0000,
            1,
            data
          );

text_sensor:
  - platform: template
    name: "Status"
    id: status_text
    lambda: |-
      if (id(test_register).has_state()) {
        return {"Device responding at address " + std::string("${current_address}")};
      } else {
        return {"No response from device at " + std::string("${current_address}")};
      }
    update_interval: 10s
