# =============================================================================
# Node: node012 — ID 12
# =============================================================================
# Floor:    First
# Location: Master bedroom bed right
# Room:     9, Board: 2
# Buttons:  2 (GPIO 2,3)
# CAN ID:   Input  = 0x20C
#            Status = 0x60C
# =============================================================================

substitutions:
  node_name: "node012"
  node_id: "12"
  room_id: "9"
  board_id: "2"
  debounce_ms: "50"
  can_cs_pin: "GPIO9"
  can_clk_pin: "GPIO18"
  can_mosi_pin: "GPIO19"
  can_miso_pin: "GPIO16"
  can_int_pin: "GPIO20"
  can_clock: "16MHZ"

esphome:
  name: ${node_name}
  friendly_name: "Master bedroom bed right"

rp2040:
  board: rpipico

logger:
  level: DEBUG

packages:
  base: !include ../common/base_node.yaml
  btn0: !include { file: ../common/button.yaml, vars: { button_index: "0", button_gpio: "2" } }
  btn1: !include { file: ../common/button.yaml, vars: { button_index: "1", button_gpio: "3" } }
