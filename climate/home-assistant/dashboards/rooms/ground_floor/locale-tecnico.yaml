# Locale Tecnico (Technical Room) - Detailed Room Dashboard
# Ground Floor
# Heating/Cooling: Fancoil only (heat-only system)

title: Locale Tecnico
path: locale-tecnico
icon: mdi:toolbox
type: sections

sections:
  - type: grid
    cards:
      - type: button
        name: Back to Ground Floor
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/ground-floor

  # Room Environment
  - type: grid
    title: Room Environment
    columns: 3
    cards:
      - type: tile
        entity: sensor.climate_control_locale_tecnico_room_temp_abstracted
        name: Temperature
        icon: mdi:thermometer

      - type: tile
        entity: sensor.climate_control_locale_tecnico_room_humidity_abstracted
        name: Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.climate_control_locale_tecnico_dew_point
        name: Dew Point
        icon: mdi:water-thermometer

  # Fancoil Control
  - type: grid
    title: Fancoil Heating/Cooling
    cards:
      - type: thermostat
        entity: climate.climate_control_pid_fancoil_locale_tecnico
        name: Fancoil Control
        features:
          - type: climate-hvac-modes
          - type: climate-preset-modes

      - type: tile
        entity: number.climate_control_fancoil_locale_tecnico_speed
        name: Fan Speed (0-10V)
        icon: mdi:fan-speed-3

      - type: tile
        entity: binary_sensor.climate_control_pid_fancoil_locale_tecnico_is_active
        name: Fancoil Active
        icon: mdi:fan

      - type: tile
        entity: sensor.climate_control_pid_fancoil_locale_tecnico_output_value
        name: PID Output
        icon: mdi:percent

  # Auto-tune
  - type: grid
    title: PID Auto-tune
    cards:
      - type: tile
        entity: button.climate_control_autotune_pid_fancoil_locale_tecnico
        name: Auto-tune Fancoil
        icon: mdi:tune-variant

  # Historical Data
  - type: grid
    title: Historical Data
    cards:
      - type: history-graph
        title: Temperature & Humidity Trend
        hours_to_show: 24
        entities:
          - entity: sensor.climate_control_locale_tecnico_room_temp_abstracted
          - entity: sensor.climate_control_locale_tecnico_room_humidity_abstracted
          - entity: sensor.climate_control_locale_tecnico_dew_point
