# =============================================================================
# Climate controller — on-device LVGL monitoring UI (T-Connect Pro touchscreen)
# =============================================================================
# Composed alongside boards/t-connect-pro-display.yaml (which declares the shared
# `panel_display` / `panel_touch` hardware) by the opt-in touchscreen wrapper
# devices/locals/climate-control-touch.yaml (which sets shared_spi_pins: "true").
#
# Layout: a 4-tab tabview on the 480x222 landscape panel.
#   Home    — season mode + demand + MEV + health + dew/boost diagnostics,
#             with season/MEV controls
#   Terra   — ground-floor zones (temp + heat/cool/idle) + setpoint control row
#   Primo   — first-floor zones + setpoint control row
#   Secondo — second-floor zone + setpoint control row
#
# Values are refreshed by a single 2 s `interval:` script (matches the Modbus
# poll cadence) rather than ~30 per-sensor triggers. Writes: the season select
# buttons, the MEV toggle, and (C8) the per-floor setpoint rows — [Zona >]
# cycles the floor's zones, +/- nudge that zone's PID target by 0.5°C (15-30°C).
#
# All bound ids are defined by packages already in devices/climate-control.yaml:
#   select.hp_mode + text_sensor.hp_mode_season (seasonal_mode.yaml)
#   binary_sensor.any_pid_requesting_heat / _cool (climate-control.yaml)
#   {slug}_temp_abstracted + {slug}_{radiant,fancoil}_pid_is_heating/_is_cooling
#   {slug}_temp_abstracted_sensor_tier  (failover_sensor.yaml: "CAN"/"HA"/"Emergency")
#   first_floor_mev_power / _fan_speed / _communication_error / _alarm_active (mev_modbus.yaml)
# =============================================================================

# Zone-row formatter (climate_ui::fmt_zone). Path is relative to the CLI-invoked
# file's dir (devices/locals/…), matching climate-control.yaml's own includes.
esphome:
  includes:
    - ../../climate/packages/ui/touch_ui_format.h

lvgl:
  displays: [panel_display]
  touchscreens: [panel_touch]
  buffer_size: 25%
  bg_color: 0x101418
  text_color: 0xEAEAEA
  widgets:
    - tabview:
        id: main_tabs
        position: top
        size: 26
        tabs:
          # ---------------------------------------------------------------- Home
          - name: "Home"
            id: tab_home
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 3
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label:
                        id: ui_season
                        text: "Mode: --"
                    - label:
                        id: ui_season_sub
                        text_color: 0x9AA0A6
                        text: ""
                    - label:
                        id: ui_demand
                        text: "Demand: --"
                    - label:
                        id: ui_mev
                        text: "MEV: --"
                    - label:
                        id: ui_health
                        text: "Health: --"
                    - label:
                        id: ui_dew
                        text_color: 0x9AA0A6
                        text: "Dew: --"
                    - label:
                        id: ui_boost
                        text_color: 0x9AA0A6
                        text: "Boost: --"
                    - obj:
                        width: 100%
                        height: 40
                        pad_all: 0
                        border_width: 0
                        bg_opa: TRANSP
                        layout:
                          type: flex
                          flex_flow: ROW
                        widgets:
                          - button:
                              id: btn_mode_heat
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x8A2A2A
                              widgets:
                                - label:
                                    align: CENTER
                                    text: "HEAT"
                              on_click:
                                - select.set:
                                    id: hp_mode
                                    option: "HEAT"
                          - button:
                              id: btn_mode_cool
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x24507A
                              widgets:
                                - label:
                                    align: CENTER
                                    text: "COOL"
                              on_click:
                                - select.set:
                                    id: hp_mode
                                    option: "COOL"
                          - button:
                              id: btn_mode_sani
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x4A4A4A
                              widgets:
                                - label:
                                    align: CENTER
                                    text: "SANI"
                              on_click:
                                - select.set:
                                    id: hp_mode
                                    option: "SANITARY_ONLY"
                          - button:
                              id: btn_mev_toggle
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x2F6F4F
                              widgets:
                                - label:
                                    align: CENTER
                                    text: "MEV"
                              on_click:
                                - switch.toggle: first_floor_mev_power
          # -------------------------------------------------------------- Ground
          - name: "Terra"
            id: tab_ground
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 3
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label: {id: ui_z_soggiorno, text: "Soggiorno"}
                    - label: {id: ui_z_cucina, text: "Cucina"}
                    - label: {id: ui_z_bagno_terra, text: "Bagno"}
                    - label: {id: ui_z_anticamera, text: "Anticamera"}
                    - label: {id: ui_z_locale_tecnico, text: "Locale Tecnico"}
                    - obj:
                        width: 100%
                        height: 32
                        pad_all: 0
                        border_width: 0
                        bg_opa: TRANSP
                        layout:
                          type: flex
                          flex_flow: ROW
                        widgets:
                          - button:
                              id: btn_zone_ground
                              flex_grow: 2
                              height: 100%
                              bg_color: 0x3A3F45
                              widgets:
                                - label: {align: CENTER, text: "Zona >"}
                              on_click:
                                - lambda: 'id(ui_sel_ground) = (id(ui_sel_ground) + 1) % 5;'
                                - script.execute: refresh_touch_ui
                          - button:
                              id: btn_set_minus_ground
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x24507A
                              widgets:
                                - label: {align: CENTER, text: "-"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_ground
                                    delta: -0.5
                          - label:
                              id: ui_set_ground
                              flex_grow: 3
                              text_align: CENTER
                              text: "--"
                          - button:
                              id: btn_set_plus_ground
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x8A2A2A
                              widgets:
                                - label: {align: CENTER, text: "+"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_ground
                                    delta: 0.5
          # --------------------------------------------------------------- First
          - name: "Primo"
            id: tab_first
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 3
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label: {id: ui_z_camera_nord, text: "Camera Nord"}
                    - label: {id: ui_z_camera_sud, text: "Camera Sud"}
                    - label: {id: ui_z_camera_ospiti, text: "Camera Ospiti"}
                    - label: {id: ui_z_camera_padronale, text: "Camera Padronale"}
                    - label: {id: ui_z_bagno_grande, text: "Bagno Grande"}
                    - label: {id: ui_z_bagno_ospiti, text: "Bagno Ospiti"}
                    - label: {id: ui_z_bagno_padronale, text: "Bagno Padronale"}
                    - label: {id: ui_z_lavanderia, text: "Lavanderia"}
                    - obj:
                        width: 100%
                        height: 32
                        pad_all: 0
                        border_width: 0
                        bg_opa: TRANSP
                        layout:
                          type: flex
                          flex_flow: ROW
                        widgets:
                          - button:
                              id: btn_zone_first
                              flex_grow: 2
                              height: 100%
                              bg_color: 0x3A3F45
                              widgets:
                                - label: {align: CENTER, text: "Zona >"}
                              on_click:
                                - lambda: 'id(ui_sel_first) = (id(ui_sel_first) + 1) % 8;'
                                - script.execute: refresh_touch_ui
                          - button:
                              id: btn_set_minus_first
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x24507A
                              widgets:
                                - label: {align: CENTER, text: "-"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_first
                                    delta: -0.5
                          - label:
                              id: ui_set_first
                              flex_grow: 3
                              text_align: CENTER
                              text: "--"
                          - button:
                              id: btn_set_plus_first
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x8A2A2A
                              widgets:
                                - label: {align: CENTER, text: "+"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_first
                                    delta: 0.5
          # -------------------------------------------------------------- Second
          - name: "Secondo"
            id: tab_second
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 3
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label: {id: ui_z_sottotetto, text: "Sottotetto"}
                    - obj:
                        width: 100%
                        height: 32
                        pad_all: 0
                        border_width: 0
                        bg_opa: TRANSP
                        layout:
                          type: flex
                          flex_flow: ROW
                        widgets:
                          - button:
                              id: btn_set_minus_second
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x24507A
                              widgets:
                                - label: {align: CENTER, text: "-"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_second
                                    delta: -0.5
                          - label:
                              id: ui_set_second
                              flex_grow: 3
                              text_align: CENTER
                              text: "--"
                          - button:
                              id: btn_set_plus_second
                              flex_grow: 1
                              height: 100%
                              bg_color: 0x8A2A2A
                              widgets:
                                - label: {align: CENTER, text: "+"}
                              on_click:
                                - script.execute:
                                    id: ui_adjust_second
                                    delta: 0.5

# -----------------------------------------------------------------------------
# Refresh: rebuild every label from current state on a 2 s cadence.
# -----------------------------------------------------------------------------
script:
  # Setpoint adjust (CLIMATE C8): each floor tab has a [Zona >] [-] set [+]
  # row. The selected zone cycles through the floor's zones; +/- nudge that
  # zone's PID target by 0.5°C, clamped to 15-30°C. Dual-mode zones share one
  # PID climate entity per circuit, so the nudge targets the circuit the zone
  # heats/cools with (radiant everywhere except the two fancoil-only zones).
  - id: ui_adjust_ground
    parameters:
      delta: float
    then:
      - lambda: |-
          esphome::climate::Climate *zones[] = {
            id(soggiorno_radiant_pid), id(cucina_radiant_pid),
            id(bagno_terra_radiant_pid), id(anticamera_radiant_pid),
            id(locale_tecnico_fancoil_pid)};
          auto *c = zones[id(ui_sel_ground)];
          float t = c->target_temperature + delta;
          if (t < 15.0f) t = 15.0f;
          if (t > 30.0f) t = 30.0f;
          auto call = c->make_call();
          call.set_target_temperature(t);
          call.perform();
      - script.execute: refresh_touch_ui
  - id: ui_adjust_first
    parameters:
      delta: float
    then:
      - lambda: |-
          esphome::climate::Climate *zones[] = {
            id(camera_nord_radiant_pid), id(camera_sud_radiant_pid),
            id(camera_ospiti_radiant_pid), id(camera_padronale_radiant_pid),
            id(bagno_grande_radiant_pid), id(bagno_ospiti_radiant_pid),
            id(bagno_padronale_radiant_pid), id(lavanderia_radiant_pid)};
          auto *c = zones[id(ui_sel_first)];
          float t = c->target_temperature + delta;
          if (t < 15.0f) t = 15.0f;
          if (t > 30.0f) t = 30.0f;
          auto call = c->make_call();
          call.set_target_temperature(t);
          call.perform();
      - script.execute: refresh_touch_ui
  - id: ui_adjust_second
    parameters:
      delta: float
    then:
      - lambda: |-
          auto *c = id(sottotetto_fancoil_pid);
          float t = c->target_temperature + delta;
          if (t < 15.0f) t = 15.0f;
          if (t > 30.0f) t = 30.0f;
          auto call = c->make_call();
          call.set_target_temperature(t);
          call.perform();
      - script.execute: refresh_touch_ui

  - id: refresh_touch_ui
    then:
      # ---- Home: season + demand + MEV + health ----
      - lvgl.label.update:
          id: ui_season
          text: !lambda 'return std::string("Mode: ") + id(hp_mode).current_option();'
      - lvgl.label.update:
          id: ui_season_sub
          text: !lambda 'return id(hp_mode_season).state;'
      - lvgl.label.update:
          id: ui_demand
          text: !lambda |-
            std::string h = id(any_pid_requesting_heat).state ? "ON" : "--";
            std::string c = id(any_pid_requesting_cool).state ? "ON" : "--";
            return "Heat " + h + "   Cool " + c;
      - lvgl.label.update:
          id: ui_mev
          text: !lambda |-
            char b[40];
            float sp = id(first_floor_mev_fan_speed).state;
            snprintf(b, sizeof(b), "MEV %s   Fan %.0f%%",
                     id(first_floor_mev_power).state ? "ON" : "off",
                     std::isnan(sp) ? 0.0f : sp);
            return std::string(b);
      - lvgl.label.update:
          id: ui_health
          text: !lambda |-
            // Count zones whose active failover tier is not the CAN primary.
            std::string tiers[] = {
              id(soggiorno_temp_abstracted_sensor_tier).state,
              id(cucina_temp_abstracted_sensor_tier).state,
              id(bagno_terra_temp_abstracted_sensor_tier).state,
              id(anticamera_temp_abstracted_sensor_tier).state,
              id(locale_tecnico_temp_abstracted_sensor_tier).state,
              id(camera_nord_temp_abstracted_sensor_tier).state,
              id(camera_sud_temp_abstracted_sensor_tier).state,
              id(camera_ospiti_temp_abstracted_sensor_tier).state,
              id(camera_padronale_temp_abstracted_sensor_tier).state,
              id(bagno_grande_temp_abstracted_sensor_tier).state,
              id(bagno_ospiti_temp_abstracted_sensor_tier).state,
              id(bagno_padronale_temp_abstracted_sensor_tier).state,
              id(lavanderia_temp_abstracted_sensor_tier).state,
              id(sottotetto_temp_abstracted_sensor_tier).state,
            };
            int fb = 0;
            for (auto &t : tiers) { if (!t.empty() && t != "CAN") fb++; }
            char b[56];
            snprintf(b, sizeof(b), "MEV %s   Alarm %s   Fallback %d/14",
                     id(first_floor_mev_communication_error).state ? "ERR" : "ok",
                     id(first_floor_mev_alarm_active).state ? "ON" : "off",
                     fb);
            return std::string(b);
      # ---- Home: dew-point protection + boost diagnostics (C8) ----
      - lvgl.label.update:
          id: ui_dew
          text: !lambda |-
            return "Dew GF " + climate_ui::fmt_or_dashes(id(ground_floor_max_dew_point).state) +
                   " min " + climate_ui::fmt_or_dashes(id(ground_floor_supply_temp_minimum).state) +
                   "  FF " + climate_ui::fmt_or_dashes(id(first_floor_max_dew_point).state) +
                   " min " + climate_ui::fmt_or_dashes(id(first_floor_supply_temp_minimum).state);
      - lvgl.label.update:
          id: ui_boost
          text: !lambda |-
            return std::string("Boost  Soggiorno ") +
                   (id(soggiorno_boost_active_sensor).state ? "ON" : "--") +
                   "   Cucina " +
                   (id(cucina_boost_active_sensor).state ? "ON" : "--");
      # ---- Setpoint rows (C8) ----
      - lvgl.label.update:
          id: ui_set_ground
          text: !lambda |-
            static const char *names[] = {"Soggiorno", "Cucina", "Bagno", "Anticamera", "Loc.Tecnico"};
            esphome::climate::Climate *zones[] = {
              id(soggiorno_radiant_pid), id(cucina_radiant_pid),
              id(bagno_terra_radiant_pid), id(anticamera_radiant_pid),
              id(locale_tecnico_fancoil_pid)};
            int i = id(ui_sel_ground);
            return climate_ui::fmt_setpoint(names[i], zones[i]->target_temperature);
      - lvgl.label.update:
          id: ui_set_first
          text: !lambda |-
            static const char *names[] = {"C.Nord", "C.Sud", "C.Ospiti", "C.Padron.",
                                          "B.Grande", "B.Ospiti", "B.Padron.", "Lavanderia"};
            esphome::climate::Climate *zones[] = {
              id(camera_nord_radiant_pid), id(camera_sud_radiant_pid),
              id(camera_ospiti_radiant_pid), id(camera_padronale_radiant_pid),
              id(bagno_grande_radiant_pid), id(bagno_ospiti_radiant_pid),
              id(bagno_padronale_radiant_pid), id(lavanderia_radiant_pid)};
            int i = id(ui_sel_first);
            return climate_ui::fmt_setpoint(names[i], zones[i]->target_temperature);
      - lvgl.label.update:
          id: ui_set_second
          text: !lambda 'return climate_ui::fmt_setpoint("Sottotetto", id(sottotetto_fancoil_pid).target_temperature);'
      # ---- Zone rows (ground) ----
      - lvgl.label.update: { id: ui_z_soggiorno,       text: !lambda 'return climate_ui::fmt_zone("Soggiorno", id(soggiorno_temp_abstracted).state, id(soggiorno_radiant_pid_is_heating).state, id(soggiorno_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_cucina,          text: !lambda 'return climate_ui::fmt_zone("Cucina", id(cucina_temp_abstracted).state, id(cucina_radiant_pid_is_heating).state, id(cucina_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_bagno_terra,     text: !lambda 'return climate_ui::fmt_zone("Bagno", id(bagno_terra_temp_abstracted).state, id(bagno_terra_radiant_pid_is_heating).state, id(bagno_terra_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_anticamera,      text: !lambda 'return climate_ui::fmt_zone("Anticamera", id(anticamera_temp_abstracted).state, id(anticamera_radiant_pid_is_heating).state, id(anticamera_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_locale_tecnico,  text: !lambda 'return climate_ui::fmt_zone("Locale Tecnico", id(locale_tecnico_temp_abstracted).state, id(locale_tecnico_fancoil_pid_is_heating).state, id(locale_tecnico_fancoil_pid_is_cooling).state);' }
      # ---- Zone rows (first) ----
      - lvgl.label.update: { id: ui_z_camera_nord,     text: !lambda 'return climate_ui::fmt_zone("Camera Nord", id(camera_nord_temp_abstracted).state, id(camera_nord_radiant_pid_is_heating).state, id(camera_nord_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_camera_sud,      text: !lambda 'return climate_ui::fmt_zone("Camera Sud", id(camera_sud_temp_abstracted).state, id(camera_sud_radiant_pid_is_heating).state, id(camera_sud_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_camera_ospiti,   text: !lambda 'return climate_ui::fmt_zone("Camera Ospiti", id(camera_ospiti_temp_abstracted).state, id(camera_ospiti_radiant_pid_is_heating).state, id(camera_ospiti_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_camera_padronale,text: !lambda 'return climate_ui::fmt_zone("Camera Padronale", id(camera_padronale_temp_abstracted).state, id(camera_padronale_radiant_pid_is_heating).state, id(camera_padronale_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_bagno_grande,    text: !lambda 'return climate_ui::fmt_zone("Bagno Grande", id(bagno_grande_temp_abstracted).state, id(bagno_grande_radiant_pid_is_heating).state, id(bagno_grande_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_bagno_ospiti,    text: !lambda 'return climate_ui::fmt_zone("Bagno Ospiti", id(bagno_ospiti_temp_abstracted).state, id(bagno_ospiti_radiant_pid_is_heating).state, id(bagno_ospiti_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_bagno_padronale, text: !lambda 'return climate_ui::fmt_zone("Bagno Padronale", id(bagno_padronale_temp_abstracted).state, id(bagno_padronale_radiant_pid_is_heating).state, id(bagno_padronale_radiant_pid_is_cooling).state);' }
      - lvgl.label.update: { id: ui_z_lavanderia,      text: !lambda 'return climate_ui::fmt_zone("Lavanderia", id(lavanderia_temp_abstracted).state, id(lavanderia_radiant_pid_is_heating).state, id(lavanderia_radiant_pid_is_cooling).state);' }
      # ---- Zone rows (second) ----
      - lvgl.label.update: { id: ui_z_sottotetto,      text: !lambda 'return climate_ui::fmt_zone("Sottotetto", id(sottotetto_temp_abstracted).state, id(sottotetto_fancoil_pid_is_heating).state, id(sottotetto_fancoil_pid_is_cooling).state);' }

interval:
  - interval: 2s
    then:
      - script.execute: refresh_touch_ui

# Shared zone-row formatter: "<name>  <temp>C  <state>" (temp blank when NaN).
globals:
  - id: _touch_ui_marker
    type: bool
    initial_value: 'false'
  # Selected zone index for each floor tab's setpoint control (C8)
  - id: ui_sel_ground
    type: int
    initial_value: '0'
  - id: ui_sel_first
    type: int
    initial_value: '0'
