# =============================================================================
# Component: pid_autotune_with_fancoil.yaml
# Purpose:   Safe PID autotune with fancoil and boost interference prevention.
#            Disables boost mode and turns off the fancoil PID before starting
#            the autotune procedure, ensuring clean tuning results.
#
# Required vars:
#   room_slug                - Room identifier for entity IDs (e.g., "living_room")
#   room_name                - Display name (e.g., "Living Room")
#   pid_id                   - PID climate entity to tune (e.g., "living_room_radiant_pid")
#   fancoil_pid_id           - Fancoil PID to disable during autotune
#
# Optional vars:
#   boost_state_select_id    - The boost coordinator's select (default:
#                              ${room_slug}_boost_state). Boost is ended via
#                              select.set so the coordinator's set_action runs
#                              end-to-end (releases the radiant override/PWM
#                              lock, syncs boost_active_global and the boost
#                              sensor) - never by writing the global directly,
#                              which would leave the select and the 100%
#                              radiant lock in place and corrupt the tune.
#
# Exposes:
#   button.{room_slug}_radiant_autotune - Press to start safe autotuning
#
# Note: Use pid_autotune.yaml for zones WITHOUT fancoils or boost coordinators.
#
# Example:
#   packages:
#     autotune: !include
#       file: packages/components/pid_autotune_with_fancoil.yaml
#       vars:
#         room_slug: "living_room"
#         room_name: "Living Room"
#         pid_id: "living_room_radiant_pid"
#         fancoil_pid_id: "living_room_fancoil_pid"
# =============================================================================

defaults:
  boost_state_select_id: ${room_slug}_boost_state

button:
  - platform: template
    name: "${room_name} Radiant Autotune"
    id: ${room_slug}_radiant_autotune
    icon: "mdi:tune"
    entity_category: config
    on_press:
      - logger.log:
          format: "[Autotune] Starting autotune for ${room_name} - disabling interferences"
          level: INFO
      # End boost through the coordinator so its set_action releases the
      # radiant override/PWM lock and syncs the global + boost sensor
      - select.set:
          id: ${boost_state_select_id}
          option: "Radiant Only"
      # Fancoil off even if boost was not active (set_action also does this
      # when it runs; explicit here because autotune requires it regardless)
      - climate.control:
          id: ${fancoil_pid_id}
          mode: "OFF"
      - logger.log:
          format: "[Autotune] Disabled fancoil ${fancoil_pid_id}"
          level: INFO
      # Delay to let things settle
      - delay: 2s
      # Start autotune
      - climate.pid.autotune: ${pid_id}
      - logger.log:
          format: "[Autotune] Autotune started for ${pid_id}"
          level: INFO
