defaults:
  safe_margin: 1.0
  fancoil_boost_threshold_default: 4.0
  fancoil_humidity_threshold_default: 60.0 # % RH - trigger boost to dehumidify
  predictive_boost_minutes_default: 20 # Minutes at saturation before predictive boost

packages:
  mixing_pump_ground_floor_radiant: !include
    file: ../../packages/components/mixing_pump.yaml
    vars:
      area_slug: "ground_floor_radiant"
      area_name: "Radiante Piano Terra"
      dallas_address: 0x81000000b3e6f628
      sensor_id: ground_floor_radiant_any_zone_open
      relay_id: relay_1
      output_id: analog_output_1
      one_wire_bus_id: one_wire_01
  # Weather-compensated HEAT-mode supply target (CLIMATE C3). COOL-mode
  # target stays owned by the dew-point protection below.
  # Curve set for a radiant FLOOR emitter (the first floor's radiant CEILING
  # runs a deliberately cooler set — see first-floor.yaml).
  weather_compensation: !include
    file: ../../packages/coordinators/weather_compensation.yaml
    vars:
      area_slug: "ground_floor"
      area_name: "Ground Floor"
      mixing_valve_pid_id: ground_floor_radiant_mixing_valve_pid
      outdoor_sensor: outdoor_temp_abstracted
      curve_slope_default: "0.8"
      curve_base_default: "30.0"
      supply_min_default: "24.0"
      supply_max_default: "40.0"
  direct_pump_ground_floor_fancoil: !include
    file: ../../packages/components/direct_pump.yaml
    vars:
      area_slug: "ground_floor_fancoil"
      area_name: "Fancoil Piano Terra"
      sensor_id: ground_floor_fancoil_any_zone_open
      relay_id: relay_2
  soggiorno: !include soggiorno.yaml
  cucina: !include cucina.yaml
  bagno: !include bagno.yaml
  anticamera: !include anticamera.yaml
  locale_tecnico: !include locale_tecnico.yaml

binary_sensor:
  - platform: template
    id: ground_floor_radiant_any_zone_open
    name: "Ground Floor Radiant Any Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(anticamera_radiant_pid_is_active) ||
             id(bagno_terra_radiant_pid_is_active) ||
             id(cucina_radiant_pid_is_active) ||
             id(soggiorno_radiant_pid_is_active);

  - platform: template
    id: ground_floor_fancoil_any_zone_open
    name: "Ground Floor Any Fancoil Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      // Include per-room boost states for explicit fancoil pump control during boost
      return id(soggiorno_boost_active) ||
             id(cucina_boost_active) ||
             id(cucina_fancoil_pid_is_active) ||
             id(locale_tecnico_fancoil_pid_is_active) ||
             id(soggiorno_fancoil_pid_is_active);

# Max dew point for ground floor radiant cooling protection
# Excludes Bagno due to shower-induced humidity spikes
# Only limits supply temp during cooling mode (hp_mode_summer = true)
sensor:
  - platform: combination
    id: ground_floor_max_dew_point
    name: "Max Dew Point Piano Terra"
    type: max
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    sources:
      - source: soggiorno_dew_point
      - source: cucina_dew_point
      - source: anticamera_dew_point
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(hp_mode_summer).state;"
            then:
              - climate.control:
                  id: ground_floor_radiant_mixing_valve_pid
                  target_temperature: !lambda "return id(ground_floor_supply_temp_minimum).state;"
              - logger.log:
                  format: "[Ground Floor Radiant] Dew point protection: supply temp min = %.1f°C"
                  args: ["id(ground_floor_supply_temp_minimum).state"]

  # Supply temperature minimum based on dew point protection
  # Shows the enforced minimum supply temperature (dew point + safety margin)
  - platform: template
    id: ground_floor_supply_temp_minimum
    name: "Ground Floor Supply Temp Minimum"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:thermometer-water"
    lambda: |-
      float dew_point = id(ground_floor_max_dew_point).state;
      float margin = id(ground_floor_radiant_safe_margin).state;
      if (std::isnan(dew_point) || std::isnan(margin)) return NAN;
      return dew_point + margin;
    update_interval: 30s

  # Max humidity across ground floor rooms for boost decisions
  # High humidity limits radiant cooling capacity (dew point constraint)
  # Fancoil boost can dehumidify while cooling
  # Note: This sensor is used by fancoil_boost_coordinator for boost decisions,
  # NOT for mixing valve control (dew point handles that)
  - platform: combination
    id: ground_floor_max_humidity
    name: "Max Humidity Piano Terra"
    type: max
    unit_of_measurement: "%"
    device_class: "humidity"
    state_class: "measurement"
    sources:
      - source: soggiorno_humidity_abstracted
      - source: cucina_humidity_abstracted
      - source: anticamera_humidity_abstracted

  # Time since last mode change (shows most recent room transition)
  # Epic 14: Tracks per-room timing independently
  - platform: template
    id: ground_floor_time_in_current_mode
    name: "Ground Floor Time In Current Mode"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: "mdi:timer"
    lambda: |-
      // Prefer the persisted epoch stamps (CLIMATE C9): they survive reboots,
      // unlike the millis() globals, which reset with the uptime counter.
      auto now_wall = id(sntp_time).utcnow();
      if (now_wall.is_valid()) {
        uint32_t now_epoch = (uint32_t) now_wall.timestamp;
        uint32_t min_elapsed_s = UINT32_MAX;
        uint32_t sog = id(soggiorno_last_mode_change_epoch);
        uint32_t cuc = id(cucina_last_mode_change_epoch);
        if (sog != 0 && sog <= now_epoch)
          min_elapsed_s = std::min(min_elapsed_s, now_epoch - sog);
        if (cuc != 0 && cuc <= now_epoch)
          min_elapsed_s = std::min(min_elapsed_s, now_epoch - cuc);
        if (min_elapsed_s != UINT32_MAX)
          return min_elapsed_s / 60.0;
      }

      // Fallback: millis-based (pre-C9 behavior; resets on reboot)
      uint32_t now = millis();
      uint32_t soggiorno_time = id(soggiorno_last_mode_change_time);
      uint32_t cucina_time = id(cucina_last_mode_change_time);

      // Find most recent change (minimum elapsed time)
      uint32_t min_elapsed = UINT32_MAX;
      if (soggiorno_time != 0) {
        min_elapsed = std::min(min_elapsed, now - soggiorno_time);
      }
      if (cucina_time != 0) {
        min_elapsed = std::min(min_elapsed, now - cucina_time);
      }

      if (min_elapsed == UINT32_MAX) return 0.0;
      return min_elapsed / 60000.0;
    update_interval: 60s

# On-controller tuning numbers (CLIMATE C2, Epic 12 revival): these replace the
# former HA input_number imports + "effective sensor with fallback" pattern.
# The values live on the controller (restore_value: persisted in flash across
# reboots) and are exposed to HA for tuning — but the dew-point protection and
# boost thresholds no longer degrade to compile-time defaults when HA is down.
# The safe margin feeds ground_floor_supply_temp_minimum (dew point + margin),
# the condensation-safety floor for radiant cooling — the one loop that must
# stay fully autonomous.
number:
  - platform: template
    id: ground_floor_radiant_safe_margin
    name: "Ground Floor Radiant Safe Margin"
    unit_of_measurement: "°C"
    device_class: "temperature"
    icon: "mdi:shield-half-full"
    min_value: 0.5
    max_value: 5.0
    step: 0.1
    initial_value: ${safe_margin}
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    id: ground_floor_fancoil_boost_threshold
    name: "Ground Floor Fancoil Boost Threshold"
    unit_of_measurement: "°C"
    device_class: "temperature"
    icon: "mdi:thermometer-alert"
    min_value: 0.5
    max_value: 10.0
    step: 0.5
    initial_value: ${fancoil_boost_threshold_default}
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    id: ground_floor_fancoil_humidity_threshold
    name: "Ground Floor Fancoil Humidity Threshold"
    unit_of_measurement: "%"
    icon: "mdi:water-percent-alert"
    min_value: 30
    max_value: 90
    step: 1
    initial_value: ${fancoil_humidity_threshold_default}
    restore_value: true
    optimistic: true
    entity_category: config

  - platform: template
    id: ground_floor_fancoil_predictive_boost_minutes
    name: "Ground Floor Fancoil Predictive Boost Minutes"
    unit_of_measurement: "min"
    icon: "mdi:timer-alert"
    min_value: 1
    max_value: 120
    step: 1
    initial_value: ${predictive_boost_minutes_default}
    restore_value: true
    optimistic: true
    entity_category: config
