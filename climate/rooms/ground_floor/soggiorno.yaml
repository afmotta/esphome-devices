# ============================================================================
# Soggiorno
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor (primary) + Fancoil (boost)
# ============================================================================
defaults:
  room_slug: "soggiorno"
  room_name: "Soggiorno"
  temperature_sensor: soggiorno_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_soggiorno_temperature"
      ha_humidity_sensor_id: "sensor.room_soggiorno_humidity"

  # Window open => fancoil off (CLIMATE C4; sensor map: docs/window-sensors-map.md)
  window_guard: !include
    file: ../../packages/components/window_guard.yaml
    vars:
      ha_window_sensor_id: "binary_sensor.soggiorno_window"
      guarded_pid_id: soggiorno_fancoil_pid

  radiant: !include
    file: ../../packages/components/radiant.yaml
    vars:
      relay_id: relay_9
      kp: 0.8
      ki: 0.005
      kd: 0.05

  fancoil: !include
    file: ../../packages/components/fancoil.yaml
    vars:
      output_id: analog_output_3

  fancoil_boost_coordinator: !include
    file: ../../packages/coordinators/fancoil_boost.yaml
    vars:
      zone_slug: ${room_slug}
      zone_name: ${room_name}
      temperature_sensor: ${temperature_sensor}
      humidity_sensor: ${room_slug}_humidity_abstracted
      radiant_pid_id: ${room_slug}_radiant_pid
      radiant_pid_cool_sensor: ${room_slug}_radiant_pid_cool
      fancoil_pid_id: ${room_slug}_fancoil_pid
      radiant_override_value_id: ${room_slug}_radiant_override_value
      radiant_override_switch_id: ${room_slug}_radiant_override
      radiant_pwm_id: ${room_slug}_radiant_output
      cooling_mode_sensor: hp_mode_summer
      temp_threshold_sensor: ground_floor_fancoil_boost_threshold
      humidity_threshold_sensor: ground_floor_fancoil_humidity_threshold
      predictive_minutes_sensor: ground_floor_fancoil_predictive_boost_minutes

  autotune: !include
    file: ../../packages/components/pid_autotune_with_fancoil.yaml
    vars:
      pid_id: soggiorno_radiant_pid
      fancoil_pid_id: soggiorno_fancoil_pid

  autotune_fancoil: !include
    file: ../../packages/components/pid_autotune.yaml
    vars:
      pid_id: soggiorno_fancoil_pid
      pid_name: "Soggiorno Fancoil"
