defaults:
  safe_margin: 1.0

packages:
  mixing_pump_primo_piano: !include
    file: ../../packages/components/mixing_pump.yaml
    vars:
      area_slug: "first_floor_radiant"
      area_name: "Primo Piano"
      dallas_address: 0xe9000000b366ed28
      sensor_id: first_floor_any_zone_open
      relay_id: relay_3
      output_id: analog_output_2
      one_wire_bus_id: one_wire_01
  # Weather-compensated HEAT-mode supply target (CLIMATE C3). COOL-mode
  # target stays owned by the dew-point protection below.
  # Curve set for a radiant CEILING emitter: ceiling panels sit close to
  # head height, so surface comfort caps the supply well below what the
  # ground floor's radiant FLOOR tolerates — cooler base, gentler slope,
  # hard ceiling at 33°C.
  weather_compensation: !include
    file: ../../packages/coordinators/weather_compensation.yaml
    vars:
      area_slug: "first_floor"
      area_name: "First Floor"
      mixing_valve_pid_id: first_floor_radiant_mixing_valve_pid
      outdoor_sensor: outdoor_temp_abstracted
      curve_slope_default: "0.6"
      curve_base_default: "27.0"
      supply_min_default: "23.0"
      supply_max_default: "33.0"
      supply_max_limit: "34.0"
  # MEV Modbus Control - Epic 18
  # Replaces relay-based mev.yaml with Modbus-based mev_modbus.yaml
  # Frees relays 18-21 for future use
  first_floor_mev: !include
    file: ../../mev_modbus.yaml
    vars:
      mev_slug: "first_floor_mev"
      mev_name: "MEV Primo Piano"
      modbus_bus_id: rs485_bus
      fan_speed_output: analog_output_7
      co2_sensor: first_floor_max_co2
      voc_sensor: first_floor_max_voc_index
      nox_sensor: first_floor_max_nox_index
      pm1_0_sensor: first_floor_max_pm1_0
      pm2_5_sensor: first_floor_max_pm2_5
      pm4_0_sensor: first_floor_max_pm4_0
      pm10_sensor: first_floor_max_pm10
      humidity_sensor: first_floor_max_humidity
  bagno_grande: !include bagno_grande.yaml
  bagno_ospiti: !include bagno_ospiti.yaml
  bagno_padronale: !include bagno_padronale.yaml
  camera_nord: !include camera_nord.yaml
  camera_sud: !include camera_sud.yaml
  camera_ospiti: !include camera_ospiti.yaml
  camera_padronale: !include camera_padronale.yaml
  lavanderia: !include lavanderia.yaml
  max_co2: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: co2
      sensor_label: "CO₂"
      source_suffix: co2
      accuracy_decimals: "0"
      unit_of_measurement: ppm
      device_class: carbon_dioxide
  max_voc_index: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: voc_index
      sensor_label: "VOC Index"
      source_suffix: voc_index
      accuracy_decimals: "0"
      unit_of_measurement: ""
      device_class: ""
  max_nox_index: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: nox_index
      sensor_label: "NOx Index"
      source_suffix: nox_index
      accuracy_decimals: "0"
      unit_of_measurement: ""
      device_class: ""
  max_pm1_0: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: pm1_0
      sensor_label: "PM1.0"
      source_suffix: pm1_0
      accuracy_decimals: "1"
      unit_of_measurement: ug/m3
      device_class: ""
  max_pm2_5: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: pm2_5
      sensor_label: "PM2.5"
      source_suffix: pm2_5
      accuracy_decimals: "1"
      unit_of_measurement: ug/m3
      device_class: ""
  max_pm4_0: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: pm4_0
      sensor_label: "PM4.0"
      source_suffix: pm4_0
      accuracy_decimals: "1"
      unit_of_measurement: ug/m3
      device_class: ""
  max_pm10: !include
    file: ../../packages/first_floor_air_quality_max_sensor.yaml
    vars:
      sensor_id_suffix: pm10
      sensor_label: "PM10"
      source_suffix: pm10
      accuracy_decimals: "1"
      unit_of_measurement: ug/m3
      device_class: ""

binary_sensor:
  - platform: template
    id: first_floor_any_zone_open
    name: "First Floor Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(bagno_padronale_radiant_pid_is_active)||
             id(bagno_grande_radiant_pid_is_active)||
             id(bagno_ospiti_radiant_pid_is_active)||
             id(lavanderia_radiant_pid_is_active)||
             id(camera_nord_radiant_pid_is_active)||
             id(camera_sud_radiant_pid_is_active)||
             id(camera_padronale_radiant_pid_is_active)||
             id(camera_ospiti_radiant_pid_is_active);

sensor:
  # Max Humidity for MEV Cascade Control
  - platform: combination
    id: first_floor_max_humidity
    name: "First Floor Max Humidity"
    type: max
    unit_of_measurement: "%"
    device_class: humidity
    state_class: "measurement"
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    sources:
      - source: bagno_grande_humidity_abstracted
      - source: bagno_ospiti_humidity_abstracted
      - source: bagno_padronale_humidity_abstracted
      - source: camera_nord_humidity_abstracted
      - source: camera_sud_humidity_abstracted
      - source: camera_ospiti_humidity_abstracted
      - source: camera_padronale_humidity_abstracted
      - source: lavanderia_humidity_abstracted

  # ============================================================================
  # Temperature/Humidity Infrastructure Sensors
  # ============================================================================

  # Supply temperature minimum based on dew point protection
  # Shows the enforced minimum supply temperature (dew point + safety margin)
  - platform: template
    id: first_floor_supply_temp_minimum
    name: "First Floor Supply Temp Minimum"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:thermometer-water"
    lambda: |-
      float dew_point = id(first_floor_max_dew_point).state;
      float margin = id(first_floor_radiant_safe_margin).state;
      if (std::isnan(dew_point) || std::isnan(margin)) return NAN;
      return dew_point + margin;
    update_interval: 30s

  - platform: combination
    id: first_floor_max_dew_point
    name: "Max Dew Point Primo piano"
    type: max
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    sources:
      - source: camera_ospiti_dew_point
      - source: camera_nord_dew_point
      - source: camera_padronale_dew_point
      - source: camera_sud_dew_point
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(hp_mode_summer).state;"
            then:
              - climate.control:
                  id: first_floor_radiant_mixing_valve_pid
                  target_temperature: !lambda "return id(first_floor_supply_temp_minimum).state;"
              - logger.log:
                  format: "[First Floor Radiant] Dew point protection: supply temp min = %.1f°C"
                  args: ["id(first_floor_supply_temp_minimum).state"]

# On-controller safe margin (CLIMATE C2, Epic 12 revival): replaces the former
# HA input_number import + fallback pattern. Persisted in flash, HA-tunable,
# and feeds first_floor_supply_temp_minimum (dew point + margin) — the
# condensation-safety floor that must not degrade when HA is down.
number:
  - platform: template
    id: first_floor_radiant_safe_margin
    name: "First Floor Radiant Safe Margin"
    unit_of_measurement: "°C"
    device_class: "temperature"
    icon: "mdi:shield-half-full"
    min_value: 0.5
    max_value: 5.0
    step: 0.1
    initial_value: ${safe_margin}
    restore_value: true
    optimistic: true
    entity_category: config
