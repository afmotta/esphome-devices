# ============================================================================
# Sottotetto
# Second Floor
# ============================================================================
# Heating: Fancoil
# Cooling: Fancoil
# Condensation protection: this zone has no radiant/supply-water cooling loop;
# room_sensors.yaml still declares sottotetto_dew_point for dashboard visibility,
# but there is no second-floor supply-temperature minimum to enforce here.
# ============================================================================
defaults:
  room_slug: "sottotetto"
  room_name: "Sottotetto"
  temperature_sensor: sottotetto_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_sottotetto_temperature"
      ha_humidity_sensor_id: "sensor.room_sottotetto_humidity"

  fancoil: !include
    file: ../../packages/components/fancoil.yaml
    vars:
      output_id: analog_output_6
