packages:
  # board: !include "../distribuzione/a16.yaml"
  base: !include ../../components/base.yaml
  wifi: !include ../../components/wifi.yaml
  slow_pwm_soggiorno: !include
    file: ../../components/dual_pid.yaml
    vars:
      circuit_name: "Soggiorno"
      circuit_slug: "soggiorno"
      output: slow_pwm_soggiorno
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: fake_switch
  slow_pwm_cucina: !include
    file: ../../components/dual_pid.yaml
    vars:
      circuit_name: "Cucina"
      circuit_slug: "cucina"
      output: slow_pwm_cucina
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: fake_switch
  slow_pwm_bagno: !include
    file: ../../components/dual_pid.yaml
    vars:
      circuit_name: "Bagno"
      circuit_slug: "bagno"
      output: slow_pwm_bagno
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: fake_switch
  slow_pwm_anticamera: !include
    file: ../../components/dual_pid.yaml
    vars:
      circuit_name: "Anticamera"
      circuit_slug: "anticamera"
      output: slow_pwm_anticamera
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: fake_switch

uart:
  - id: rs485
    tx_pin: GPIO13
    rx_pin: GPIO16
    baud_rate: 9600

i2c:
  sda: GPIO4
  scl:
    number: GPIO5
    ignore_strapping_warning: true

pcf8574:
  - id: inputs_1_8
    address: 0x22
    pcf8575: false
  - id: inputs_9_16
    address: 0x21
    pcf8575: false
  - id: outputs_1_8
    address: 0x24
    pcf8575: false
  - id: outputs_9_16
    address: 0x25
    pcf8575: false

binary_sensor:
  - platform: gpio
    name: "1-Wire Bus 01"
    id: one_wire_bus_1
    pin:
      number: GPIO32
      inverted: true

  - platform: gpio
    name: "1-Wire Bus 02"
    pin:
      number: GPIO33
      inverted: true

  - platform: gpio
    name: "1-Wire Bus 03"
    pin:
      number: GPIO14
      inverted: true

  - platform: gpio
    name: "Input 01"
    id: input_01
    pin:
      pcf8574: inputs_1_8
      number: 0
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 02"
    id: input_02
    pin:
      pcf8574: inputs_1_8
      number: 1
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 03"
    id: input_03
    pin:
      pcf8574: inputs_1_8
      number: 2
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 04"
    id: input_04
    pin:
      pcf8574: inputs_1_8
      number: 3
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 05"
    id: input_05
    pin:
      pcf8574: inputs_1_8
      number: 4
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 06"
    id: input_06
    pin:
      pcf8574: inputs_1_8
      number: 5
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 07"
    id: input_07
    pin:
      pcf8574: inputs_1_8
      number: 6
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 08"
    id: input_08
    pin:
      pcf8574: inputs_1_8
      number: 7
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 09"
    id: input_09
    pin:
      pcf8574: inputs_9_16
      number: 0
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 10"
    id: input_10
    pin:
      pcf8574: inputs_9_16
      number: 1
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 11"
    id: input_11
    pin:
      pcf8574: inputs_9_16
      number: 2
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 12"
    id: input_12
    pin:
      pcf8574: inputs_9_16
      number: 3
      mode: INPUT
      inverted: true

  - platform: gpio
    name: "Input 13"
    id: input_13
    pin:
      pcf8574: inputs_9_16
      number: 4
      mode: INPUT
