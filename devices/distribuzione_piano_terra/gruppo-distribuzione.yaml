switch:
  - platform: gpio
    name: "Relay 01"
    id: relay_01
    pin:
      pcf8574: outputs_1_8
      number: 0
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Relay 02"
    id: relay_02
    pin:
      pcf8574: outputs_1_8
      number: 1
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Relay 03"
    id: relay_03
    pin:
      pcf8574: outputs_1_8
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    name: "Relay 04"
    id: relay_04
    pin:
      pcf8574: outputs_1_8
