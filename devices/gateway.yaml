# =============================================================================
# gateway.yaml — CAN Bus ↔ Home Assistant bridge (composition entry point)
# =============================================================================
# Hardware: Waveshare ESP32-S3-RS485-CAN
# Role:     Composes two systems' packages onto one physical device (AD-4;
#           AD-7 as amended 2026-07-06):
#             canbus/packages/health.yaml   — bus + transport health (infra)
#             lighting/packages/buttons.yaml — button events + ha_ready gate
#           This file owns only identity, board, network, api encryption/OTA,
#           the shared protocol-header includes, and substitution overrides.
#           The physical split into separate devices is deferred to ADR-0013's
#           relay-hardware decision; until then this single entry point hosts
#           both package sets.
#
# PACKAGE ORDER: keep canbus (defines the can0 bus) before lighting
# (`!extend`s it). Empirically ESPHome 2026.5.0 resolves !extend regardless of
# package order, so this is defensive convention expressing the real dependency
# direction — do not rely on the order-tolerance across ESPHome upgrades.
# =============================================================================

substitutions:
  # Tunable on hardware to resolve ADR-0003 open item 2 (values are milliseconds).
  ha_heartbeat_ttl_ms: "15000"
  ack_timeout_ms: "500"
  # Aliveness: a mapped node is LOST after 3 missed 30 s heartbeats (ADR-0011 §1).
  node_lost_timeout_ms: "90000"
  # CAN transceiver pins on this board.
  can_tx_pin: GPIO15
  can_rx_pin: GPIO16

packages:
  # canbus first: defines can0 (see PACKAGE ORDER above).
  health: !include ../canbus/packages/health.yaml
  buttons: !include ../lighting/packages/buttons.yaml

esphome:
  name: canbus-gateway
  friendly_name: "CAN Bus Gateway"
  includes:
    - ../canbus/firmware/protocol/canbus_protocol.h
    - ../canbus/firmware/protocol/node_map.h   # GENERATED central node_id -> room/board/name map (ADR-0007)
    - ../canbus/firmware/protocol/ha_arbitration.h   # ha_ready + pending-ACK pure logic (ADR-0003)
    - ../canbus/firmware/protocol/node_health.h   # gateway-resident aliveness pure logic (ADR-0011 §1)
    - ../canbus/firmware/protocol/bindings.h   # GENERATED binding-manifest hash (ADR-0009 §3)

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# --------------- Logging ---------------
logger:
  level: DEBUG

# --------------- Network: WiFi ---------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --------------- Home Assistant API ---------------
# Encryption only — the arbitration services/automations come from
# lighting/packages/buttons.yaml and merge into this block.
api:
  encryption:
    key: !secret api_encryption_key

ota:
  # ADR-0010 §5: authenticate OTA — the gateway is the most privileged device on the LAN,
  # so an unauthenticated push is the one bus-external defect the security ADR found.
  - platform: esphome
    password: !secret ota_password
