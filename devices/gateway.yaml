# =============================================================================
# gateway.yaml — CAN Bus ↔ Home Assistant bridge (composition entry point)
# =============================================================================
# Hardware: LilyGO T-Connect Pro
# Role:     Composes two systems' packages onto one physical device (AD-4;
#           AD-7 as amended 2026-07-06):
#             canbus/packages/health.yaml   — bus + transport health (infra)
#             lighting/packages/buttons.yaml — button events + ha_ready gate
#           This file owns identity/network-mode substitutions, api
#           encryption/OTA passwords, the shared protocol-header includes,
#           and the relay bank. The board file (boards/t-connect-pro.yaml)
#           owns the physical network implementation (Ethernet vs WiFi
#           pins), esp32/api/ota scaffolding. Per ADR-0014, the physical
#           split deferred by ADR-0013 resolves as: no further split — hvac
#           is already a separate physical device; lighting + canbus
#           continue sharing this entry point.
#
# PACKAGE ORDER: keep canbus (defines the can0 bus) before lighting
# (`!extend`s it). Empirically ESPHome 2026.5.0 resolves !extend regardless of
# package order, so this is defensive convention expressing the real dependency
# direction — do not rely on the order-tolerance across ESPHome upgrades.
# =============================================================================

substitutions:
  # Tunable on hardware to resolve ADR-0003 open item 2 (values are milliseconds).
  ha_heartbeat_ttl_ms: "15000"
  ack_timeout_ms: "500"
  # Aliveness: a mapped node is LOST after 3 missed 30 s heartbeats (ADR-0011 §1).
  node_lost_timeout_ms: "90000"
  logger_level: INFO
  # CAN transceiver pins on this board (T-Connect Pro onboard TWAI, per ADR-0014).
  can_tx_pin: GPIO6
  can_rx_pin: GPIO7
  # Encryption only — the arbitration services/automations come from
  # lighting/packages/buttons.yaml and merge onto the board file's api: block.
  encryption_key: !secret api_encryption_key
  # ADR-0010 §5: authenticate OTA — the gateway is the most privileged device
  # on the LAN, so an unauthenticated push is the one bus-external defect the
  # security ADR found.
  ota_password: !secret ota_password
  # `defaults:` (climate-control.yaml's pattern) only resolves for a file
  # loaded via `!include` — it is a no-op on a file compiled directly, which
  # is how the gateway (no locals/remotes wrapper, by design) is built. These
  # go in `substitutions:` instead so the board file's ${device_name}/
  # ${friendly_name} actually resolve.
  device_name: canbus-gateway
  friendly_name: "CAN Bus Gateway"

packages:
  # Board first: provides modbus_uart (consumed by the relays package below)
  # and the network/api/ota scaffolding the other packages extend.
  base: !include
    file: ../boards/t-connect-pro.yaml
    vars:
      enable_ethernet: true
  # canbus next: defines can0 (see PACKAGE ORDER above) before lighting !extends it.
  health: !include ../canbus/packages/health.yaml
  buttons: !include ../lighting/packages/buttons.yaml
  # Lighting-owned bank (0-based relay_0..relay_31 natively, each channel
  # self-registers into relay_store() for the ADR-0013 fallback); wraps
  # the shared per-switch hardware driver.
  relays: !include
    file: ../lighting/packages/relay_bank.yaml
    vars:
      controller_id: relay_board_1
      modbus_address: 0x2
      modbus_bus_id: rs485_bus
      update_interval: 2s

esphome:
  includes:
    - ../canbus/protocol/canbus_protocol.h
    - ../canbus/protocol/node_map.h   # GENERATED central node_id -> room/board/name map (ADR-0007)
    - ../canbus/protocol/ha_arbitration.h   # ha_ready + pending-ACK pure logic (ADR-0003)
    - ../canbus/protocol/node_health.h   # gateway-resident aliveness pure logic (ADR-0011 §1)
    - ../canbus/protocol/bindings.h   # GENERATED binding-manifest hash (ADR-0009 §3)
    - ../lighting/protocol/binding_actuation.h   # fallback gesture/bounds pure logic (ADR-0013 §1-2)
    - ../lighting/protocol/relay_store.h   # relay-id -> Switch* glue (ADR-0013 §1-2)

# --------------- Logging ---------------
logger:
  level: ${logger_level}

modbus:
  id: rs485_bus
  uart_id: modbus_uart
