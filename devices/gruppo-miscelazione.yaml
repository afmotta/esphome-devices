substitutions:
  use_modbus: "false" # Feature flag: set to "true" to enable Modbus master

packages:
  base: !include ../boards/a6.yaml
  wifi: !include ../boards/wifi.yaml
  modbus_master: !include ../components/modbus_master.yaml
  modbus_test: !include ../components/modbus_test.yaml
  modbus_master_registers: !include
    file: ../components/modbus_master_registers.yaml
    vars:
      dallas_sensor_id: dallas_0x81000000b3e6f628
      climate_mode_sensor_id: climate_mode
  mixing_valve_terra: !include
    file: ../components/mixing_valve.yaml
    vars:
      circuit_name: "Piano Terra"
      circuit_slug: piano_terra
      sensor: dallas_0x81000000b3e6f628
      switch: relay_1
      output: dac_1
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      trigger: input_1
  mixing_valve_primo: !include
    file: ../components/mixing_valve.yaml
    vars:
      circuit_name: "Primo Piano"
      circuit_slug: primo_piano
      sensor: dallas_0xe9000000b366ed28
      switch: relay_2
      output: dac_2
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      trigger: input_2
  # Ground floor fancoils via 0-10V Modbus adapter (address 0x2)
  ground_floor_fancoils: !include
    file: ../components/ground_floor_fancoils.yaml
  # Second floor fancoil via 0-10V Modbus adapter (address 0x3)
  second_floor_fancoils: !include
    file: ../components/second_floor_fancoils.yaml

sensor:
  - platform: dallas_temp
    address: 0x81000000b3e6f628
    name: "Dallas 0x81000000b3e6f628"
    id: dallas_0x81000000b3e6f628
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
  - platform: dallas_temp
    address: 0xe9000000b366ed28
    name: "Temperatura Mandata 0xe9000000b366ed28"
    id: dallas_0xe9000000b366ed28
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
  # Temperature sensors from Home Assistant for fancoil control
  - platform: homeassistant
    name: "Termometro Soggiorno Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_soggiorno_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Pranzo Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_pranzo_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Cucina Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_cucina_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Tecnico Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_tecnico_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Sottotetto Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_sottotetto_temperature
    internal: true

text_sensor:
  - platform: homeassistant
    id: climate_mode
    name: "Climate Mode"
    entity_id: sensor.thermostat_mode
    internal: true
