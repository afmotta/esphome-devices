defaults:
  device_name: gruppo-miscelazione
  friendly_name: "Gruppo Miscelazione"

packages:
  base: !include ../boards/a6.yaml
  wifi: !include ../boards/wifi.yaml
  mixing_valve_1: !include ../components/mixing_valve.yaml
    vars:
      valve_id: "ground_floor"
      valve_name: "Miscelatrice Piano Terra"
      dallas_address: 0x81000000b3e6f628
  mixing_valve_2: !include ../components/mixing_valve.yaml
    vars:
      valve_id: "first_floor"
      valve_name: "Miscelatrice Primo Piano"
      dallas_address: 0xe9000000b366ed28

modbus:
  id: rs485_bus
  uart_id: rs485

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    providers:
      - name: distribuzione-piano-terra
      - name: distribuzione-primo-piano

binary_sensor:
  - platform: packet_transport
    id: piano_terra_any_radiant_zone_open
    provider: distribuzione-piano-terra
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "Ground Floor Any Radiant Zone OPEN"
              - switch.turn_on: relay_1
            else:
              - logger.log:
                  format: "Ground Floor Any Radiant Zone CLOSED"
              - switch.turn_off: relay_1
  - platform: packet_transport
    id: piano_terra_any_fancoil_zone_open
    provider: distribuzione-piano-terra
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "Ground Floor Any Fancoil Zone OPEN"
              - switch.turn_on: relay_2
            else:
              - logger.log:
                  format: "Ground Floor Any Fancoil Zone CLOSED"
              - switch.turn_off: relay_2
  - platform: packet_transport
    id: any_zone_open_primo_piano
    provider: distribuzione-primo-piano
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "First Floor Any Zone OPEN"
              - switch.turn_on: relay_3
            else:
              - logger.log:
                  format: "First Floor Any Zone CLOSED"
              - switch.turn_off: relay_3
