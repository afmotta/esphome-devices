packages:
  base: !include ../boards/a6.yaml
  wifi: !include ../boards/wifi.yaml
  # Ground floor fancoils via 0-10V Modbus adapter (address 0x2)
  ground_floor_fancoils: !include
    file: ../components/ground_floor_fancoils.yaml
  # Second floor fancoil via 0-10V Modbus adapter (address 0x3)
  second_floor_fancoils: !include
    file: ../components/second_floor_fancoils.yaml
  # PID sensors for mixing groups
  pid_sensors_mixing_ground_floor: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_mixing_ground_floor
      pid_name: "PID Miscelatrice Piano Terra"
  pid_sensors_mixing_first_floor: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_mixing_first_floor
      pid_name: "PID Miscelatrice Primo Piano"

# Modbus RTU bus for 0-10V adapters
modbus:
  id: rs485_bus
  uart_id: rs485

sensor:
  - platform: dallas_temp
    address: 0x81000000b3e6f628
    name: "Dallas 0x81000000b3e6f628"
    id: dallas_0x81000000b3e6f628
    unit_of_measurement: "°C"
    one_wire_id: one_wire_01
  - platform: dallas_temp
    address: 0xe9000000b366ed28
    name: "Temperatura Mandata 0xe9000000b366ed28"
    id: dallas_0xe9000000b366ed28
    unit_of_measurement: "°C"
    one_wire_id: one_wire_01
  # Temperature sensors from Home Assistant for fancoil control
  - platform: homeassistant
    name: "Termometro Soggiorno Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_soggiorno_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Pranzo Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_pranzo_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Cucina Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_cucina_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Tecnico Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_tecnico_temperature
    internal: true
  - platform: homeassistant
    name: "Termometro Sottotetto Temperature"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_sottotetto_temperature
    internal: true

text_sensor:
  - platform: homeassistant
    id: climate_mode
    name: "Climate Mode"
    entity_id: sensor.thermostat_mode
    internal: true
    on_value:
      # Mode coordination: update PID climate modes based on global climate_mode
      - lambda: |-
          auto mode = CLIMATE_MODE_OFF;
          if (id(climate_mode).state == "HEAT") {
            mode = CLIMATE_MODE_HEAT;
          } else if (id(climate_mode).state == "COOL") {
            mode = CLIMATE_MODE_COOL;
          }

          // Update Piano Terra PID
          auto call_terra = id(pid_mixing_ground_floor).make_call();
          call_terra.set_mode(mode);
          call_terra.perform();

          // Update Primo Piano PID
          auto call_primo = id(pid_mixing_first_floor).make_call();
          call_primo.set_mode(mode);
          call_primo.perform();

# Simplified PID Climate Controllers (Epic 2 Story 2.1)
# Replaces dual_pid.yaml pattern with single PID per circuit
climate:
  - platform: pid
    id: pid_mixing_ground_floor
    name: "PID Miscelatrice Piano Terra"
    sensor: dallas_0x81000000b3e6f628
    default_target_temperature: 28.0
    heat_output: dac_1
    cool_output: dac_1
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5
    on_state:
      # Relay control: turn on when PID active, off when idle
      - lambda: |-
          if (x.mode == CLIMATE_MODE_OFF) {
            id(relay_1).turn_off();
          } else {
            id(relay_1).turn_on();
          }

  - platform: pid
    id: pid_mixing_first_floor
    name: "PID Miscelatrice Primo Piano"
    sensor: dallas_0xe9000000b366ed28
    default_target_temperature: 28.0
    heat_output: dac_2
    cool_output: dac_2
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5
    on_state:
      # Relay control: turn on when PID active, off when idle
      - lambda: |-
          if (x.mode == CLIMATE_MODE_OFF) {
            id(relay_2).turn_off();
          } else {
            id(relay_2).turn_on();
          }
