defaults:
  device_name: gruppo-miscelazione
  friendly_name: "Gruppo Miscelazione"

packages:
  base: !include ../boards/a6.yaml
  wifi: !include ../boards/wifi.yaml
  mixing_pump_radiant_piano_terra: !include
    file: ../components/mixing_pump.yaml
    vars:
      area_slug: "ground_floor_radiant"
      area_name: "Radiante Piano Terra"
      dallas_address: 0x81000000b3e6f628
      udp_provider: distribuzione-piano-terra
      udp_sensor_id: piano_terra_any_radiant_zone_open
      relay_id: relay_1
      dac_output: dac_1
  direct_pump_fancoil_piano_terra: !include
    file: ../components/direct_pump.yaml
    vars:
      area_slug: "ground_floor_fancoil"
      area_name: "Fancoil Piano Terra"
      udp_provider: distribuzione-piano-terra
      udp_sensor_id: piano_terra_any_fancoil_zone_open
      relay_id: relay_2
  mixing_pump_primo_piano: !include
    file: ../components/mixing_pump.yaml
    vars:
      area_slug: "primo_piano"
      area_name: "Primo Piano"
      dallas_address: 0xe9000000b366ed28
      udp_provider: distribuzione-primo-piano
      udp_sensor_id: any_zone_open_primo_piano
      relay_id: relay_3
      dac_output: dac_2
  direct_pump_fancoil_secondo_piano: !include
    file: ../components/direct_pump.yaml
    vars:
      area_slug: "fancoil_secondo_piano"
      area_name: "Fancoil Secondo Piano"
      udp_provider: distribuzione-primo-piano
      udp_sensor_id: any_zone_open_fancoil_secondo_piano
      relay_id: relay_4
  # direct_pump_mev_primo_piano: !include
  #   file: ../components/direct_pump.yaml
  #   vars:
  #     area_slug: "mev_primo_piano"
  #     area_name: "MEV Primo Piano"
  #     udp_provider: distribuzione-primo-piano
  #     udp_sensor_id: mev_primo_piano_integration_active
  #     relay_id: relay_5

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    providers:
      - name: distribuzione-piano-terra
      - name: distribuzione-primo-piano
