defaults:
  device_name: gruppo-miscelazione
  friendly_name: "Gruppo Miscelazione"

packages:
  base: !include ../boards/a6.yaml
  wifi: !include ../boards/wifi.yaml
  pid_sensor_mixing_ground_floor: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_mixing_ground_floor
      pid_name: "PID Miscelatrice Piano Terra"
  pid_sensors_mixing_first_floor: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_mixing_first_floor
      pid_name: "PID Miscelatrice Primo Piano"

# Modbus RTU bus for 0-10V adapters
modbus:
  id: rs485_bus
  uart_id: rs485

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    update_interval: 10s
    sensors:
      - id: dallas_0x81000000b3e6f628
        broadcast_id: mixing_output_ground_floor_temperature
      - id: dallas_0xe9000000b366ed28
        broadcast_id: mixing_output_first_floor_temperature
    providers:
      - name: distribuzione-piano-terra
      - name: distribuzione-primo-piano

# Epic 10: Binary sensor entities for UDP-received zone demand (Story 10.4)
# These expose the packet_transport received values to Home Assistant and relay control logic
binary_sensor:
  - platform: packet_transport
    id: piano_terra_any_radiant_zone_open
    provider: distribuzione-piano-terra
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "Ground Floor Any Radiant Zone OPEN"
              - switch.turn_on: relay_1
            else:
              - logger.log:
                  format: "Ground Floor Any Radiant Zone CLOSED"
              - switch.turn_off: relay_1
  - platform: packet_transport
    id: piano_terra_any_fancoil_zone_open
    provider: distribuzione-piano-terra
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "Ground Floor Any Fancoil Zone OPEN"
              - switch.turn_on: relay_2
            else:
              - logger.log:
                  format: "Ground Floor Any Fancoil Zone CLOSED"
              - switch.turn_off: relay_2
  - platform: packet_transport
    id: primo_piano_any_zone_open
    provider: distribuzione-primo-piano
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"
            then:
              - logger.log:
                  format: "First Floor Any Zone OPEN"
              - switch.turn_on: relay_3
            else:
              - logger.log:
                  format: "First Floor Any Zone CLOSED"
              - switch.turn_off: relay_3

sensor:
  - platform: dallas_temp
    address: 0x81000000b3e6f628
    name: "Dallas 0x81000000b3e6f628"
    id: dallas_0x81000000b3e6f628
    unit_of_measurement: "°C"
    one_wire_id: one_wire_01
  - platform: dallas_temp
    address: 0xe9000000b366ed28
    name: "Temperatura Mandata 0xe9000000b366ed28"
    id: dallas_0xe9000000b366ed28
    unit_of_measurement: "°C"
    one_wire_id: one_wire_01

climate:
  - platform: pid
    id: pid_mixing_ground_floor
    name: "PID Miscelatrice Piano Terra"
    sensor: dallas_0x81000000b3e6f628
    default_target_temperature: 28.0
    heat_output: dac_1
    cool_output: dac_1
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5

  - platform: pid
    id: pid_mixing_first_floor
    name: "PID Miscelatrice Primo Piano"
    sensor: dallas_0xe9000000b366ed28
    default_target_temperature: 28.0
    heat_output: dac_2
    cool_output: dac_2
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5
