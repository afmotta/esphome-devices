defaults:
  device_name: climate-control
  friendly_name: "Climate Control"

packages:
  base: !include
    file: ../boards/waveshare-s3.yaml
    vars:
      enable_ethernet: true
  analog_outputs_1: !include
    file: ../components/modbus_analog_outputs_board.yaml
    vars:
      controller_id: analog_outputs_board_1
      modbus_address: 0x1
      modbus_bus_id: rs485_bus
      update_interval: 2s
      id_offset: 0
      controller_name: "Analog Outputs Board 1"
  relays_1: !include
    file: ../components/modbus_relay_board.yaml
    vars:
      controller_id: relay_board_1
      modbus_address: 0x2
      modbus_bus_id: rs485_bus
      update_interval: 2s
      id_offset: 8
      controller_name: "Relay Board 1"
  relays_2: !include
    file: ../components/modbus_relay_board.yaml
    vars:
      controller_id: relay_board_2
      modbus_address: 0x3
      modbus_bus_id: rs485_bus
      update_interval: 2s
      id_offset: 16
      controller_name: "Relay Board 2"
  ground_floor: !include ../components/rooms/ground_floor/ground-floor.yaml
  first_floor: !include ../components/rooms/first_floor/first-floor.yaml
  second_floor: !include ../components/rooms/second_floor/second-floor.yaml
  seasonal_mode: !include ../components/seasonal_mode.yaml

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    providers:
      - name: room-sensor-soggiorno
      - name: room-sensor-cucina
      - name: room-sensor-bagno
      - name: room-sensor-anticamera
      - name: room-sensor-locale-tecnico
      - name: room-sensor-bagno-grande
      - name: room-sensor-bagno-ospiti
      - name: room-sensor-bagno-padronale
      - name: room-sensor-camera-nord
      - name: room-sensor-camera-sud
      - name: room-sensor-camera-ospiti
      - name: room-sensor-camera-padronale
      - name: room-sensor-lavanderia
      - name: room-sensor-sottotetto

modbus:
  id: rs485_bus
  uart_id: modbus_uart

one_wire:
  - platform: gpio
    pin: GPIO21
    id: one_wire_01

binary_sensor:
  - id: !extend any_pid_requesting_heat
    lambda: |-
      return id(pid_radiant_soggiorno_is_heating).state ||
             id(pid_radiant_cucina_is_heating).state ||
             id(pid_radiant_bagno_terra_is_heating).state ||
             id(pid_radiant_anticamera_is_heating).state ||
             id(pid_radiant_bagno_grande_is_heating).state ||
             id(pid_radiant_bagno_ospiti_is_heating).state ||
             id(pid_radiant_bagno_padronale_is_heating).state ||
             id(pid_radiant_camera_nord_is_heating).state ||
             id(pid_radiant_camera_sud_is_heating).state ||
             id(pid_radiant_camera_ospiti_is_heating).state ||
             id(pid_radiant_camera_padronale_is_heating).state ||
             id(pid_radiant_lavanderia_is_heating).state ||
             id(pid_fancoil_soggiorno_is_heating).state ||
             id(pid_fancoil_cucina_is_heating).state ||
             id(pid_fancoil_locale_tecnico_is_heating).state ||
             id(pid_fancoil_sottotetto_is_heating).state;

  - id: !extend any_pid_requesting_cool
    lambda: |-
      return id(pid_radiant_soggiorno_is_cooling).state ||
             id(pid_radiant_cucina_is_cooling).state ||
             id(pid_radiant_anticamera_is_cooling).state ||
             id(pid_radiant_camera_nord_is_cooling).state ||
             id(pid_radiant_camera_sud_is_cooling).state ||
             id(pid_radiant_camera_ospiti_is_cooling).state ||
             id(pid_radiant_camera_padronale_is_cooling).state ||
             id(pid_fancoil_soggiorno_is_cooling).state ||
             id(pid_fancoil_cucina_is_cooling).state ||
             id(pid_fancoil_locale_tecnico_is_cooling).state ||
             id(pid_fancoil_sottotetto_is_cooling).state;

script:
  - id: !extend apply_hp_mode_to_all_pids
    then:
      - lambda: |-
          std::string mode_str = id(hp_mode).state;

          auto set_mode = [&](climate::PIDClimate* climate_obj, bool supports_cooling) {
              auto call = climate_obj->make_call();
              if (mode_str == "SANITARY_ONLY") {
                  call.set_mode(climate::CLIMATE_MODE_OFF);
              } else if (mode_str == "COOL") {
                  call.set_mode(supports_cooling ? climate::CLIMATE_MODE_COOL : climate::CLIMATE_MODE_OFF);
              } else {
                  call.set_mode(climate::CLIMATE_MODE_HEAT);
              }
              call.perform();
          };

          set_mode(id(pid_radiant_soggiorno), true);
          set_mode(id(pid_radiant_cucina), true);
          set_mode(id(pid_radiant_bagno_terra), false);
          set_mode(id(pid_radiant_anticamera), true);
          set_mode(id(pid_radiant_bagno_grande), false);
          set_mode(id(pid_radiant_bagno_ospiti), false);
          set_mode(id(pid_radiant_bagno_padronale), false);
          set_mode(id(pid_radiant_camera_nord), true);
          set_mode(id(pid_radiant_camera_sud), true);
          set_mode(id(pid_radiant_camera_ospiti), true);
          set_mode(id(pid_radiant_camera_padronale), true);
          set_mode(id(pid_radiant_lavanderia), false);
          set_mode(id(pid_fancoil_soggiorno), true);
          set_mode(id(pid_fancoil_cucina), true);
          set_mode(id(pid_fancoil_locale_tecnico), true);
          set_mode(id(pid_fancoil_sottotetto), true);
