defaults:
  device_name: climate-control
  friendly_name: "Climate Control"
  seasonal_mode_id: hp_mode

esphome:
  # This file is never compiled directly — it only resolves through the
  # one-level-deeper devices/locals/*.yaml or devices/remotes/*.yaml wrapper
  # (its `defaults:` substitutions are a no-op otherwise, same as noted in
  # devices/gateway.yaml). ESPHome resolves `includes:` relative to the
  # top-level CLI-invoked file's directory (esphome/core CORE.config_dir),
  # not this file's own directory, so these need one extra `../` versus
  # devices/gateway.yaml's `../canbus/protocol/...` (which IS compiled
  # directly from devices/).
  includes:
    - ../../canbus/protocol/canbus_protocol.h
    - ../../hvac/protocol/generated_can_sensor_routes.h
    - ../../hvac/protocol/can_sensor_receiver.h

packages:
  base: !include
    file: ../boards/t-connect-pro.yaml
    vars:
      enable_ethernet: true
  # Publish-only HVAC-1.3 composition (routes before receiver: the receiver's
  # on_frame action calls can_sensor_route_publish/_nan scripts, which must
  # already be defined). Every registered sensors=1 node's temp/humidity
  # frames land on the static `sensor:` entities declared per-room in
  # hvac/room_sensors.yaml (HVAC-1.4); everything else (SEN66 kit,
  # particulates, VOC/NOx, CO2 — HVAC-1.5 scope) is still declared by
  # can_routes itself, scoped to registered nodes only.
  can_routes: !include ../hvac/packages/generated/can_sensor_routes.yaml
  can_receiver: !include ../hvac/packages/can_sensor_receiver.yaml
  analog_outputs_1: !include
    file: ../vesta/packages/devices/modbus-io/modbus_analog_outputs_board.yaml
    vars:
      controller_id: analog_outputs_board_1
      modbus_address: 0x1
      modbus_bus_id: rs485_bus
      update_interval: 2s
      id_offset: 0
      controller_name: "Analog Outputs Board 1"
  relays: !include
    file: ../vesta/packages/devices/modbus-io/modbus_relay_board_32ch.yaml
    vars:
      controller_id: relay_board_1
      modbus_address: 0x2
      modbus_bus_id: rs485_bus
      update_interval: 2s
      id_offset: 0
      controller_name: "Relay Board 1"
  ground_floor: !include ../hvac/rooms/ground_floor/ground-floor.yaml
  first_floor: !include ../hvac/rooms/first_floor/first-floor.yaml
  second_floor: !include ../hvac/rooms/second_floor/second-floor.yaml
  seasonal_mode: !include
    file: ../vesta/packages/coordinators/seasonal_mode.yaml
    vars:
      seasonal_mode_id: hp_mode
      seasonal_mode_name: "Heat Pump Mode"
      time_id: sntp_time

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    providers:
      - name: room-sensor-soggiorno
      - name: room-sensor-cucina
      - name: room-sensor-bagno
      - name: room-sensor-anticamera
      - name: room-sensor-locale-tecnico
      - name: room-sensor-bagno-grande
      - name: room-sensor-bagno-ospiti
      - name: room-sensor-bagno-padronale
      - name: room-sensor-camera-nord
      - name: room-sensor-camera-sud
      - name: room-sensor-camera-ospiti
      - name: room-sensor-camera-padronale
      - name: room-sensor-lavanderia
      - name: room-sensor-sottotetto

modbus:
  id: rs485_bus
  uart_id: modbus_uart

one_wire:
  - platform: ds2484
    id: one_wire_01
    i2c_id: i2cbus
    address: 0x18

time:
  - platform: sntp
    id: sntp_time

binary_sensor:
  # Keep these manual demand aggregates in sync with every PID diagnostic produced by
  # hvac/rooms/**. scripts/verify_seasonal_mode_aggregation.py enforces completeness.
  - id: !extend any_pid_requesting_heat
    lambda: |-
      return id(soggiorno_radiant_pid_is_heating).state ||
             id(cucina_radiant_pid_is_heating).state ||
             id(bagno_terra_radiant_pid_is_heating).state ||
             id(anticamera_radiant_pid_is_heating).state ||
             id(bagno_grande_radiant_pid_is_heating).state ||
             id(bagno_ospiti_radiant_pid_is_heating).state ||
             id(bagno_padronale_radiant_pid_is_heating).state ||
             id(camera_nord_radiant_pid_is_heating).state ||
             id(camera_sud_radiant_pid_is_heating).state ||
             id(camera_ospiti_radiant_pid_is_heating).state ||
             id(camera_padronale_radiant_pid_is_heating).state ||
             id(lavanderia_radiant_pid_is_heating).state ||
             id(soggiorno_fancoil_pid_is_heating).state ||
             id(cucina_fancoil_pid_is_heating).state ||
             id(locale_tecnico_fancoil_pid_is_heating).state ||
             id(sottotetto_fancoil_pid_is_heating).state;

  - id: !extend any_pid_requesting_cool
    lambda: |-
      return id(soggiorno_radiant_pid_is_cooling).state ||
             id(cucina_radiant_pid_is_cooling).state ||
             id(anticamera_radiant_pid_is_cooling).state ||
             id(camera_nord_radiant_pid_is_cooling).state ||
             id(camera_sud_radiant_pid_is_cooling).state ||
             id(camera_ospiti_radiant_pid_is_cooling).state ||
             id(camera_padronale_radiant_pid_is_cooling).state ||
             id(soggiorno_fancoil_pid_is_cooling).state ||
             id(cucina_fancoil_pid_is_cooling).state ||
             id(locale_tecnico_fancoil_pid_is_cooling).state ||
             id(sottotetto_fancoil_pid_is_cooling).state;
