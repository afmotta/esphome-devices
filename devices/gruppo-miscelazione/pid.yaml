defaults:
  mode: "heat"
  mode_mapping:
    heat: "cool"
    cool: "heat"

packages:
  sensori_pid_cool: !include
    file: sensori_pid.yaml
    vars:
      pid_id: pid_${mode}_${circuit_slug}
      pid_name: "PID ${mode} ${circuit_name}"

climate:
  - platform: pid
    id: pid_${mode}_${circuit_slug}
    name: "Miscelatrice ${circuit_name} ${mode}"
    sensor: temperatura_mandata_${circuit_slug}
    default_target_temperature: ${default_temperature}
    control_parameters:
      kp: ${kp}
      ki: ${ki}
      kd: ${kd}
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5
    on_state:
      lambda: |-
        if (x.mode == CLIMATE_MODE_OFF && id(pid_${mode_mapping[mode]}_${circuit_slug}).mode == CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_off();
        } else if (x.mode != CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_on();
          auto call = id(pid_${mode_mapping[mode]}_${circuit_slug}).make_call();
          call.set_mode("OFF");
          call.perform();
        }
