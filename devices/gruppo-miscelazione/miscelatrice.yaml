packages:
  pid_heat: !include
    file: pid.yaml
    vars:
      mode: "heat"
      circuit_name: ${circuit_name}
      circuit_slug: ${circuit_slug}
      default_temperature: ${heat_default_temperature}
      kp: ${heat_kp}
      ki: ${heat_ki}
      kd: ${heat_kd}
      sensor: ${sensor}
      switch: ${switch}
  pid_cool: !include
    file: pid.yaml
    vars:
      mode: "cool"
      circuit_name: ${circuit_name}
      circuit_slug: ${circuit_slug}
      default_temperature: ${cool_default_temperature}
      kp: ${cool_kp}
      ki: ${cool_ki}
      kd: ${cool_kd}
      sensor: ${sensor}
      switch: ${switch}

climate:
  - id: !extend pid_${circuit_slug}_heat
    heat_output: ${output}
  - id: !extend pid_${circuit_slug}_cool
    cool_output: ${output}
