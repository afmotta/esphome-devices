switch:
  - platform: gpio
    name: "Pompa Miscelatrice ${circuit_name}"
    id: pump_${circuit_slug}
    pin:
      pcf8574: outputs
      number: ${relay_number}
      mode: OUTPUT
      inverted: true

sensor:
  - platform: dallas_temp
    address: ${sensor_address}
    name: "Temperatura Mandata ${circuit_name}"
    id: temperatura_mandata_${circuit_slug}
    unit_of_measurement: "°C"

climate:
  - platform: pid
    id: pid_heat_${circuit_slug}
    name: "Miscelatrice ${circuit_name} Riscaldamento"
    sensor: temperatura_mandata_${circuit_slug}
    heat_output: ${dac}
    default_target_temperature: 20.0
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 7
      max_temperature: 40
      temperature_step: 0.5
    on_state:
      lambda: |-
        if (x.mode == CLIMATE_MODE_OFF && id(pid_cool_${circuit_slug}).mode == CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_off();
        } else if (x.mode != CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_on();
          auto call = id(pid_cool_${circuit_slug}).make_call();
          call.set_mode("OFF");
          call.perform();
        }

  - platform: pid
    id: pid_cool_${circuit_slug}
    name: "Miscelatrice ${circuit_name} Raffrescamento"
    sensor: temperatura_mandata_${circuit_slug}
    cool_output: ${dac}
    default_target_temperature: 20.0
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.0
    visual:
      min_temperature: 7
      max_temperature: 40
      temperature_step: 0.5
    on_state:
      lambda: |-
        if (x.mode == CLIMATE_MODE_OFF && id(pid_heat_${circuit_slug}).mode == CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_off();
        } else if (x.mode != CLIMATE_MODE_OFF) {
          id(pump_${circuit_slug}).turn_on();
          auto call = id(pid_heat_${circuit_slug}).make_call();
          call.set_mode("OFF");
          call.perform();
        }

packages:
  sensori_pid_heat: !include
    file: sensori_pid.yaml
    vars:
      pid_id: pid_heat_${circuit_slug}
      pid_name: "PID Caldo ${circuit_name} "
  sensori_pid_cool: !include
    file: sensori_pid.yaml
    vars:
      pid_id: pid_cool_${circuit_slug}
      pid_name: "PID Freddo ${circuit_name}"
