packages:
  dallas: !include
    file: ../../components/dallas.yaml
    vars:
      bus: ${sensor_bus}
      address: ${sensor_address}
  pid_heat: !include
    file: ../../components/pid.yaml
    vars:
      mode: "heat"
      circuit_name: ${circuit_name}
      circuit_slug: ${circuit_slug}
      default_temperature: ${heat.default_temperature}
      kp: ${heat.kp}
      ki: ${heat.ki}
      kd: ${heat.kd}
      sensor: dallas_${sensor_address}
      switch: pump_${circuit_slug}
  pid_cool: !include
    file: ../../components/pid.yaml
    vars:
      mode: "cool"
      circuit_name: ${circuit_name}
      circuit_slug: ${circuit_slug}
      default_temperature: ${cool.default_temperature}
      kp: ${cool.kp}
      ki: ${cool.ki}
      kd: ${cool.kd}
      sensor: dallas_${sensor_address}
      switch: pump_${circuit_slug}

output:
  - platform: esp32_dac
    pin: ${dac_pin}
    id: dac_${circuit_slug}

switch:
  - platform: gpio
    name: "Pompa Miscelatrice ${circuit_name}"
    id: pump_${circuit_slug}
    pin:
      pcf8574: outputs
      number: ${relay_id}
      mode: OUTPUT
      inverted: true

climate:
  - id: !extend pid_${circuit_slug}_heat
    heat_output: dac_${circuit_slug}
  - id: !extend pid_${circuit_slug}_cool
    cool_output: dac_${circuit_slug}
