esphome:
  name: kincony-a6-gruppo-miscelazione
  friendly_name: "Gruppo Miscelazione"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}

# ethernet:
#   type: W5500
#   clk_pin: GPIO18
#   mosi_pin: GPIO23
#   miso_pin: GPIO19
#   cs_pin: GPIO5

logger:

api:
  encryption:
    key: ${encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

packages:
  pid_terra: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Piano Terra"
      circuit_slug: piano_terra
      sensor_address: 0x81000000b3e6f628
      sensor_bus: one_wire_01
      relay_id: 0
      dac_pin: GPIO26
      heat:
        default_temperature: 28.0
        kp: 0.2
        ki: 0.01
        kd: 0.0
      cool:
        default_temperature: 22.0
        kp: 0.2
        ki: 0.01
        kd: 0.0
  pid_primo: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Primo Piano"
      circuit_slug: primo_piano
      sensor_address: 0xe9000000b366ed28
      sensor_bus: one_wire_01
      relay_id: 1
      dac_pin: GPIO25
      heat:
        default_temperature: 28.0
        kp: 0.2
        ki: 0.01
        kd: 0.0
      cool:
        default_temperature: 22.0
        kp: 0.2
        ki: 0.01
        kd: 0.0

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
  - id: rs232
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600

i2c:
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true

pcf8574:
  - id: inputs
    address: 0x22
  - id: outputs
    address: 0x24

one_wire:
  - platform: gpio
    pin: GPIO32
    id: one_wire_01
  # - platform: gpio
  #   pin: GPIO33

sensor:
  - platform: dallas_temp
    address: 0x81000000b3e6f628
    name: "Dallas 0x81000000b3e6f628"
    id: temperatura_0x81000000b3e6f628
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
  - platform: dallas_temp
    address: 0xe9000000b366ed28
    name: "Temperatura Mandata 0xe9000000b366ed28"
    id: temperatura_0xe9000000b366ed28
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
