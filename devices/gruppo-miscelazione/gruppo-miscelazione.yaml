# === Uscite DAC 0–10V ===
output:
  - platform: esp32_dac
    pin: GPIO26
    id: dac1
  - platform: esp32_dac
    pin: GPIO25
    id: dac2

# === Target configurabili da HA ===
number:
  - platform: template
    id: target_c1
    name: "Target Circuito 1"
    optimistic: true
    min_value: 18
    max_value: 30
    step: 0.5
    initial_value: 22

  - platform: template
    id: target_c2
    name: "Target Circuito 2"
    optimistic: true
    min_value: 18
    max_value: 30
    step: 0.5
    initial_value: 22
