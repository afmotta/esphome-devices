#   mosi_pin: GPIO23
#   miso_pin: GPIO19
#   cs_pin: GPIO5

packages:
  base: !include ../../components/base.yaml
  wifi: !include ../../components/wifi.yaml
  pid_terra: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Piano Terra"
      circuit_slug: piano_terra
      sensor_address: 0x81000000b3e6f628
      sensor_bus: one_wire_01
      relay_id: 0
      dac_pin: GPIO26
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
  pid_primo: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Primo Piano"
      circuit_slug: primo_piano
      sensor_address: 0xe9000000b366ed28
      sensor_bus: one_wire_01
      relay_id: 1
      dac_pin: GPIO25
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
  - id: rs232
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600

i2c:
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true

pcf8574:
  - id: inputs
    address: 0x22
  - id: outputs
    address: 0x24

one_wire:
  - platform: gpio
    pin: GPIO32
    id: one_wire_01
  # - platform: gpio
  #   pin: GPIO33

sensor:
  - platform: dallas_temp
    address: 0x81000000b3e6f628
    name: "Dallas 0x81000000b3e6f628"
    id: temperatura_0x81000000b3e6f628
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
  - platform: dallas_temp
    address: 0xe9000000b366ed28
    name: "Temperatura Mandata 0xe9000000b366ed28"
    id: temperatura_0xe9000000b366ed28
    unit_of_measurement: "°C"
    internal: true
    one_wire_id: one_wire_01
