esphome:
  name: kincony-a6-gruppo-miscelazione
  friendly_name: "Gruppo Miscelazione"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

packages:
  pid_terra: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Piano Terra"
      circuit_slug: piano_terra
      summer_default: 22.0
      winter_default: 22.0
      sensor_address: 0x81000000b3e6f628
      is_summer: id(summer_mode).state
      relay_number: 0
      dac: dac1
  pid_primo: !include
    file: ./miscelatrice.yaml
    vars:
      circuit_name: "Primo Piano"
      circuit_slug: primo_piano
      summer_default: 22.0
      winter_default: 22.0
      sensor_address: 0xe9000000b366ed28
      is_summer: id(summer_mode).state
      relay_number: 1
      dac: dac2

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

uart:
  - id: rs485
    tx_pin: GPIO27
    rx_pin: GPIO14
    baud_rate: 9600
  - id: rs232
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600

# ethernet:
#   type: W5500
#   clk_pin: GPIO18
#   mosi_pin: GPIO23
#   miso_pin: GPIO19
#   cs_pin: GPIO5

i2c:
  sda: GPIO4
  scl:
    number: GPIO15
    ignore_strapping_warning: true

pcf8574:
  - id: inputs
    address: 0x22
  - id: outputs
    address: 0x24

# time:
#   - platform: ds1307
#     id: rtc_time

one_wire:
  - platform: gpio
    pin: GPIO32
  # - platform: gpio
  #   pin: GPIO33

binary_sensor:
  - platform: homeassistant
    id: summer_mode
    entity_id: input_boolean.summer_mode
    internal: false
  - platform: homeassistant
    id: ha_status
    entity_id: binary_sensor.ha_online
    internal: true
  - platform: gpio
    name: "KC868-A6-IN-1"
    pin:
      pcf8574: inputs
      number: 0
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "KC868-A6-IN-2"
    pin:
      pcf8574: inputs
      number: 1
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "KC868-A6-IN-3"
    pin:
      pcf8574: inputs
      number: 2
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "KC868-A6-IN-4"
    pin:
      pcf8574: inputs
      number: 3
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "KC868-A6-IN-5"
    pin:
      pcf8574: inputs
      number: 4
      mode: INPUT
      inverted: true
  - platform: gpio
    name: "KC868-A6-IN-6"
    pin:
      pcf8574: inputs
      number: 5
      mode: INPUT
      inverted: true

