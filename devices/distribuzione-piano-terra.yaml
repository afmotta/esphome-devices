packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml

  # Note: emergency_shutdown component temporarily removed - needs refactoring for slow_pwm outputs
  # TODO: Re-add emergency_shutdown after component is updated to work with slow_pwm

  room_soggiorno: !include
    file: ../components/rooms/ground_floor/soggiorno.yaml
  room_cucina: !include
    file: ../components/rooms/ground_floor/cucina.yaml
  room_bagno: !include
    file: ../components/rooms/ground_floor/bagno.yaml
  room_anticamera: !include
    file: ../components/rooms/ground_floor/anticamera.yaml

modbus:
  id: rs485_bus
  uart_id: rs485

switch:
  - platform: template
    id: remote_switch
    optimistic: true
    on_turn_on:
      then:
        - script.execute: switch_management
    on_turn_off:
      then:
        - script.execute: switch_management

text_sensor:
  - platform: homeassistant
    id: climate_mode
    name: "Climate Mode"
    entity_id: sensor.thermostat_mode
    internal: true
    on_value:
      # Mode coordination: update all zone PID climate modes based on global climate_mode
      - lambda: |-
          auto mode = CLIMATE_MODE_OFF;
          if (id(climate_mode).state == "HEAT") {
            mode = CLIMATE_MODE_HEAT;
          } 
          // else if (id(climate_mode).state == "COOL") {
          //   mode = CLIMATE_MODE_COOL;
          // }

          // Update all zone PIDs
          auto call_soggiorno = id(pid_soggiorno).make_call();
          call_soggiorno.set_mode(mode);
          call_soggiorno.perform();

          auto call_cucina = id(pid_cucina).make_call();
          call_cucina.set_mode(mode);
          call_cucina.perform();

          auto call_bagno = id(pid_bagno).make_call();
          call_bagno.set_mode(mode);
          call_bagno.perform();

          auto call_anticamera = id(pid_anticamera).make_call();
          call_anticamera.set_mode(mode);
          call_anticamera.perform();

script:
  - id: switch_management
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              return id(pid_anticamera).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_anticamera).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_soggiorno).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_soggiorno).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_bagno).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_bagno).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_cucina).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_cucina).action == climate::CLIMATE_ACTION_COOLING;
          then:
            - switch.turn_on: relay_16
          else:
            - switch.turn_off: relay_16
