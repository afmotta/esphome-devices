substitutions:
  use_modbus: "false" # Feature flag: set to "true" to enable Modbus slave
  slave_address: "0x2" # Modbus slave address

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  modbus_slave: !include ../components/modbus_slave.yaml
  slow_pwm_soggiorno: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Soggiorno"
      circuit_slug: "soggiorno"
      output: slow_pwm_soggiorno
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch
  slow_pwm_cucina: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Cucina"
      circuit_slug: "cucina"
      output: slow_pwm_cucina
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch
  slow_pwm_bagno: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Bagno"
      circuit_slug: "bagno"
      output: slow_pwm_bagno
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch
  slow_pwm_anticamera: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Anticamera"
      circuit_slug: "anticamera"
      output: slow_pwm_anticamera
      sensor: termometro_soggiorno_temperature
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch

switch:
  - platform: template
    id: remote_switch
    optimistic: true
    on_turn_on:
      then:
        - script.execute: switch_management
    on_turn_off:
      then:
        - script.execute: switch_management

sensor:
  - platform: homeassistant
    name: "Temperature Sensor From Home Assistant"
    entity_id: sensor.termometro_soggiorno_temperature
    id: termometro_soggiorno_temperature

output:
  - platform: slow_pwm
    id: slow_pwm_soggiorno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_07
      - switch.turn_on: relay_06
      - switch.turn_on: relay_05
    turn_off_action:
      - switch.turn_off: relay_07
      - switch.turn_off: relay_06
      - switch.turn_off: relay_05
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
  - platform: slow_pwm
    id: slow_pwm_bagno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03
  - platform: slow_pwm
    id: slow_pwm_anticamera
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_04
    turn_off_action:
      - switch.turn_off: relay_04

script:
  - id: switch_management
    mode: queued
    then:
      - if:
          condition:
            any:
              - switch.is_on: relay_01
              - switch.is_on: relay_02
              - switch.is_on: relay_03
              - switch.is_on: relay_04
              - switch.is_on: relay_05
              - switch.is_on: relay_06
              - switch.is_on: relay_07
          then:
            - switch.turn_on: relay_16
          else:
            - switch.turn_off: relay_16
