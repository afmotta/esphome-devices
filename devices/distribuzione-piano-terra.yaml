defaults:
  device_name: distribuzione-piano-terra
  friendly_name: "Distribuzione Piano Terra"

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  soggiorno: !include ../components/rooms/ground_floor/soggiorno.yaml
  cucina: !include ../components/rooms/ground_floor/cucina.yaml
  bagno: !include ../components/rooms/ground_floor/bagno.yaml
  anticamera: !include ../components/rooms/ground_floor/anticamera.yaml
  sala_pranzo: !include ../components/rooms/ground_floor/sala_pranzo.yaml
  locale_tecnico: !include ../components/rooms/ground_floor/locale_tecnico.yaml

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    update_interval: 5s
    binary_sensors:
      - piano_terra_any_radiant_zone_open
      - piano_terra_any_fancoil_zone_open
    providers:
      - name: soggiorno_room_sensor
      - name: cucina_room_sensor
      - name: bagno_room_sensor
      - name: anticamera_room_sensor
      - name: sala_pranzo_room_sensor
      - name: locale_tecnico_room_sensor

modbus:
  id: rs485_bus
  uart_id: rs485

modbus_controller:
  - id: modbus_0_10v_adapter_fancoils_ground_floor
    address: 0x2
    modbus_id: rs485_bus
    update_interval: 5s

# ============================================================================
# UDP ROOM SENSOR RECEIVERS
# ============================================================================
# Receives temperature/humidity broadcasts from ESP32 room sensors
# Sensors marked internal: true (used by sensor_failover_3tier component)
# Provider naming: {zone_slug}_room_sensor
# Sensor ID naming: {zone_slug}_udp_temperature, {zone_slug}_udp_humidity

sensor:
  # Soggiorno UDP Receivers
  - platform: packet_transport
    id: soggiorno_udp_temperature
    provider: room_sensor_soggiorno
    internal: true
  - platform: packet_transport
    id: soggiorno_udp_humidity
    provider: room_sensor_soggiorno
    internal: true

  # Cucina UDP Receivers
  - platform: packet_transport
    id: cucina_udp_temperature
    provider: room_sensor_cucina
    internal: true
  - platform: packet_transport
    id: cucina_udp_humidity
    provider: room_sensor_cucina
    internal: true

  # Bagno (Terra) UDP Receivers
  - platform: packet_transport
    id: bagno_terra_udp_temperature
    provider: room_sensor_bagno_terra
    internal: true
  - platform: packet_transport
    id: bagno_terra_udp_humidity
    provider: room_sensor_bagno_terra
    internal: true

  # Anticamera UDP Receivers
  - platform: packet_transport
    id: anticamera_udp_temperature
    provider: room_sensor_anticamera
    internal: true
  - platform: packet_transport
    id: anticamera_udp_humidity
    provider: room_sensor_anticamera
    internal: true

  # Sala Pranzo UDP Receivers
  - platform: packet_transport
    id: sala_pranzo_udp_temperature
    provider: room_sensor_sala_pranzo
    internal: true
  - platform: packet_transport
    id: sala_pranzo_udp_humidity
    provider: room_sensor_sala_pranzo
    internal: true

  # Locale Tecnico UDP Receivers
  - platform: packet_transport
    id: locale_tecnico_udp_temperature
    provider: room_sensor_locale_tecnico
    internal: true
  - platform: packet_transport
    id: locale_tecnico_udp_humidity
    provider: room_sensor_locale_tecnico
    internal: true

binary_sensor:
  - platform: template
    id: piano_terra_any_radiant_zone_open
    name: "Ground Floor Any Radiant Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(pid_radiant_anticamera).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_anticamera).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_bagno_terra).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_bagno_terra).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_cucina).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_cucina).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_soggiorno).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_soggiorno).action == climate::CLIMATE_ACTION_COOLING;

  - platform: template
    id: piano_terra_any_fancoil_zone_open
    name: "Ground Floor Any Fancoil Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(pid_fancoil_cucina).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_fancoil_cucina).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_fancoil_sala_pranzo).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_fancoil_sala_pranzo).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_fancoil_soggiorno).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_fancoil_soggiorno).action == climate::CLIMATE_ACTION_COOLING;
