substitutions:
  use_modbus: "false" # Feature flag: set to "true" to enable Modbus slave
  slave_address: "0x2" # Modbus slave address
  master_address: "0x1" # Modbus master address

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  modbus_slave: !include ../components/modbus_slave.yaml
  modbus_slave_registers: !include
    file: ../components/modbus_slave_registers.yaml
    vars:
      master_address: ${master_address}

  # Room sensors for all 4 ground floor zones
  room_sensor_soggiorno: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Soggiorno"
      zone_slug: "soggiorno"
      sensor_register_temp: 0x0190 # Register 400
      sensor_register_humidity: 0x0191 # Register 401
      modbus_controller_id: modbus_slave

  room_sensor_cucina: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Cucina"
      zone_slug: "cucina"
      sensor_register_temp: 0x0192 # Register 402
      sensor_register_humidity: 0x0193 # Register 403
      modbus_controller_id: modbus_slave

  room_sensor_bagno: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Bagno"
      zone_slug: "bagno"
      sensor_register_temp: 0x0194 # Register 404
      sensor_register_humidity: 0x0195 # Register 405
      modbus_controller_id: modbus_slave

  room_sensor_anticamera: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Anticamera"
      zone_slug: "anticamera"
      sensor_register_temp: 0x0196 # Register 406
      sensor_register_humidity: 0x0197 # Register 407
      modbus_controller_id: modbus_slave

  # Legacy failover (keeping for backwards compatibility during transition)
  temperature_failover: !include
    file: ../components/sensor_failover.yaml
    vars:
      sensor_id: "termometro_soggiorno_temperature"
      modbus_sensor_id: "modbus_piano_terra_temperature"
      ha_sensor_id: "ha_termometro_soggiorno_temperature"
      device_class: "temperature"
      unit_of_measurement: "°C"
      accuracy_decimals: 1

  emergency_shutdown: !include ../components/emergency_shutdown.yaml

  # PID controllers now use room temperature sensors (via room_temp_abstracted)
  slow_pwm_soggiorno: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Soggiorno"
      circuit_slug: "soggiorno"
      output: slow_pwm_soggiorno
      sensor: soggiorno_room_temp_abstracted # Changed from termometro_soggiorno_temperature_abstracted
      heat_default_temperature: 22.0 # Changed from 28.0 (room temp target, not supply temp)
      heat_kp: 0.8 # Increased from 0.2 (room temp responds slower)
      heat_ki: 0.005 # Increased from 0.01
      heat_kd: 0.05 # Increased from 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.8 # Increased from 0.2
      cool_ki: 0.005 # Increased from 0.01
      cool_kd: 0.05 # Increased from 0.0
      switch: remote_switch

  slow_pwm_cucina: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Cucina"
      circuit_slug: "cucina"
      output: slow_pwm_cucina
      sensor: cucina_room_temp_abstracted # Changed from termometro_soggiorno_temperature_abstracted
      heat_default_temperature: 22.0 # Changed from 28.0
      heat_kp: 0.8 # Increased from 0.2
      heat_ki: 0.005 # Increased from 0.01
      heat_kd: 0.05 # Increased from 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.8 # Increased from 0.2
      cool_ki: 0.005 # Increased from 0.01
      cool_kd: 0.05 # Increased from 0.0
      switch: remote_switch

  slow_pwm_bagno: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Bagno"
      circuit_slug: "bagno"
      output: slow_pwm_bagno
      sensor: bagno_room_temp_abstracted # Changed from termometro_soggiorno_temperature_abstracted
      heat_default_temperature: 23.0 # Slightly higher for bathroom comfort
      heat_kp: 0.8 # Increased from 0.2
      heat_ki: 0.005 # Increased from 0.01
      heat_kd: 0.05 # Increased from 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.8 # Increased from 0.2
      cool_ki: 0.005 # Increased from 0.01
      cool_kd: 0.05 # Increased from 0.0
      switch: remote_switch

  slow_pwm_anticamera: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Anticamera"
      circuit_slug: "anticamera"
      output: slow_pwm_anticamera
      sensor: anticamera_room_temp_abstracted # Changed from termometro_soggiorno_temperature_abstracted
      heat_default_temperature: 20.0 # Lower for entryway (buffer zone)
      heat_kp: 0.8 # Increased from 0.2
      heat_ki: 0.005 # Increased from 0.01
      heat_kd: 0.05 # Increased from 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.8 # Increased from 0.2
      cool_ki: 0.005 # Increased from 0.01
      cool_kd: 0.05 # Increased from 0.0
      switch: remote_switch

switch:
  - platform: template
    id: remote_switch
    optimistic: true
    on_turn_on:
      then:
        - script.execute: switch_management
    on_turn_off:
      then:
        - script.execute: switch_management

sensor:
  # Home Assistant temperature sensor (failover source)
  - platform: homeassistant
    name: "Temperature Sensor From Home Assistant"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_termometro_soggiorno_temperature
    internal: true # Hidden - used by failover component only

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
  - platform: slow_pwm
    id: slow_pwm_bagno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03
  - platform: slow_pwm
    id: slow_pwm_anticamera
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_04
    turn_off_action:
      - switch.turn_off: relay_04
  - platform: slow_pwm
    id: slow_pwm_soggiorno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_05
      - switch.turn_on: relay_06
      - switch.turn_on: relay_07
    turn_off_action:
      - switch.turn_off: relay_05
      - switch.turn_off: relay_06
      - switch.turn_off: relay_07

script:
  - id: switch_management
    mode: queued
    then:
      - if:
          condition:
            any:
              - switch.is_on: relay_01
              - switch.is_on: relay_02
              - switch.is_on: relay_03
              - switch.is_on: relay_04
              - switch.is_on: relay_05
              - switch.is_on: relay_06
              - switch.is_on: relay_07
          then:
            - switch.turn_on: relay_16
          else:
            - switch.turn_off: relay_16
