substitutions:
  use_modbus: "false" # Feature flag: set to "true" to enable Modbus slave
  slave_address: "0x2" # Modbus slave address
  master_address: "0x1" # Modbus master address

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  modbus_slave: !include ../components/modbus_slave.yaml
  modbus_slave_registers: !include
    file: ../components/modbus_slave_registers.yaml
    vars:
      master_address: ${master_address}

  # Room sensors for all 4 ground floor zones
  room_sensor_soggiorno: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Soggiorno"
      zone_slug: "soggiorno"
      sensor_register_temp: 0x0190 # Register 400
      sensor_register_humidity: 0x0191 # Register 401
      modbus_controller_id: modbus_slave

  room_sensor_cucina: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Cucina"
      zone_slug: "cucina"
      sensor_register_temp: 0x0192 # Register 402
      sensor_register_humidity: 0x0193 # Register 403
      modbus_controller_id: modbus_slave

  room_sensor_bagno: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Bagno"
      zone_slug: "bagno"
      sensor_register_temp: 0x0194 # Register 404
      sensor_register_humidity: 0x0195 # Register 405
      modbus_controller_id: modbus_slave

  room_sensor_anticamera: !include
    file: ../components/room_sensors.yaml
    vars:
      zone_name: "Anticamera"
      zone_slug: "anticamera"
      sensor_register_temp: 0x0196 # Register 406
      sensor_register_humidity: 0x0197 # Register 407
      modbus_controller_id: modbus_slave

  # Legacy failover (keeping for backwards compatibility during transition)
  temperature_failover: !include
    file: ../components/sensor_failover.yaml
    vars:
      sensor_id: "termometro_soggiorno_temperature"
      modbus_sensor_id: "modbus_piano_terra_temperature"
      ha_sensor_id: "ha_termometro_soggiorno_temperature"
      device_class: "temperature"
      unit_of_measurement: "°C"
      accuracy_decimals: 1

  # Note: emergency_shutdown component temporarily removed - needs refactoring for slow_pwm outputs
  # TODO: Re-add emergency_shutdown after component is updated to work with slow_pwm

  # PID sensors for monitoring
  pid_sensors_soggiorno: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_soggiorno
      pid_name: "PID Soggiorno"
  pid_sensors_cucina: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_cucina
      pid_name: "PID Cucina"
  pid_sensors_bagno: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_bagno
      pid_name: "PID Bagno"
  pid_sensors_anticamera: !include
    file: ../components/pid_sensors.yaml
    vars:
      pid_id: pid_anticamera
      pid_name: "PID Anticamera"

switch:
  - platform: template
    id: remote_switch
    optimistic: true
    on_turn_on:
      then:
        - script.execute: switch_management
    on_turn_off:
      then:
        - script.execute: switch_management

text_sensor:
  - platform: homeassistant
    id: climate_mode
    name: "Climate Mode"
    entity_id: sensor.thermostat_mode
    internal: true
    on_value:
      # Mode coordination: update all zone PID climate modes based on global climate_mode
      - lambda: |-
          auto mode = CLIMATE_MODE_OFF;
          if (id(climate_mode).state == "HEAT") {
            mode = CLIMATE_MODE_HEAT;
          } 
          // else if (id(climate_mode).state == "COOL") {
          //   mode = CLIMATE_MODE_COOL;
          // }

          // Update all zone PIDs
          auto call_soggiorno = id(pid_soggiorno).make_call();
          call_soggiorno.set_mode(mode);
          call_soggiorno.perform();

          auto call_cucina = id(pid_cucina).make_call();
          call_cucina.set_mode(mode);
          call_cucina.perform();

          auto call_bagno = id(pid_bagno).make_call();
          call_bagno.set_mode(mode);
          call_bagno.perform();

          auto call_anticamera = id(pid_anticamera).make_call();
          call_anticamera.set_mode(mode);
          call_anticamera.perform();

# Simplified PID Climate Controllers (Epic 2 Story 2.2)
# Replaces dual_pid.yaml pattern with single PID per zone
climate:
  - platform: pid
    id: pid_soggiorno
    name: "PID Soggiorno"
    sensor: soggiorno_room_temp_abstracted
    default_target_temperature: 22.0
    heat_output: slow_pwm_soggiorno
    control_parameters:
      kp: 0.8
      ki: 0.005
      kd: 0.05
    visual:
      min_temperature: 15
      max_temperature: 30
      temperature_step: 0.5

  - platform: pid
    id: pid_cucina
    name: "PID Cucina"
    sensor: cucina_room_temp_abstracted
    default_target_temperature: 22.0
    heat_output: slow_pwm_cucina
    control_parameters:
      kp: 0.8
      ki: 0.005
      kd: 0.05
    visual:
      min_temperature: 15
      max_temperature: 30
      temperature_step: 0.5

  - platform: pid
    id: pid_bagno
    name: "PID Bagno"
    sensor: bagno_room_temp_abstracted
    default_target_temperature: 23.0
    heat_output: slow_pwm_bagno
    control_parameters:
      kp: 0.8
      ki: 0.005
      kd: 0.05
    visual:
      min_temperature: 15
      max_temperature: 30
      temperature_step: 0.5

  - platform: pid
    id: pid_anticamera
    name: "PID Anticamera"
    sensor: anticamera_room_temp_abstracted
    default_target_temperature: 20.0
    heat_output: slow_pwm_anticamera
    control_parameters:
      kp: 0.8
      ki: 0.005
      kd: 0.05
    visual:
      min_temperature: 15
      max_temperature: 30
      temperature_step: 0.5

sensor:
  # Home Assistant temperature sensor (failover source)
  - platform: homeassistant
    name: "Temperature Sensor From Home Assistant"
    entity_id: sensor.termometro_soggiorno_temperature
    id: ha_termometro_soggiorno_temperature
    internal: true # Hidden - used by failover component only

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
  - platform: slow_pwm
    id: slow_pwm_bagno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03
  - platform: slow_pwm
    id: slow_pwm_anticamera
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_04
    turn_off_action:
      - switch.turn_off: relay_04
  - platform: slow_pwm
    id: slow_pwm_soggiorno
    period: 30s
    turn_on_action:
      - switch.turn_on: relay_05
      - switch.turn_on: relay_06
      - switch.turn_on: relay_07
    turn_off_action:
      - switch.turn_off: relay_05
      - switch.turn_off: relay_06
      - switch.turn_off: relay_07

script:
  - id: switch_management
    mode: queued
    then:
      - if:
          condition:
            any:
              - switch.is_on: relay_01
              - switch.is_on: relay_02
              - switch.is_on: relay_03
              - switch.is_on: relay_04
              - switch.is_on: relay_05
              - switch.is_on: relay_06
              - switch.is_on: relay_07
          then:
            - switch.turn_on: relay_16
          else:
            - switch.turn_off: relay_16
