packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml

  # Note: emergency_shutdown component temporarily removed - needs refactoring for slow_pwm outputs
  # TODO: Re-add emergency_shutdown after component is updated to work with slow_pwm

  room_soggiorno: !include
    file: ../components/rooms/ground_floor/soggiorno.yaml
  room_cucina: !include
    file: ../components/rooms/ground_floor/cucina.yaml
  room_bagno: !include
    file: ../components/rooms/ground_floor/bagno.yaml
  room_anticamera: !include
    file: ../components/rooms/ground_floor/anticamera.yaml
  room_sala_pranzo: !include
    file: ../components/rooms/ground_floor/sala_pranzo.yaml

modbus:
  id: rs485_bus
  uart_id: rs485

modbus_controller:
  - id: modbus_0_10v_adapter_fancoils_ground_floor
    address: 0x2
    modbus_id: rs485_bus
    update_interval: 5s

script:
  - id: ground_floor_radiant_pump_management
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              return id(pid_radiant_anticamera).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_radiant_anticamera).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_radiant_bagno_terra).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_radiant_bagno_terra).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_radiant_cucina).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_radiant_cucina).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_radiant_soggiorno).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_radiant_soggiorno).action == climate::CLIMATE_ACTION_COOLING;
          then:
            - switch.turn_on: relay_16
          else:
            - switch.turn_off: relay_16
  - id: ground_floor_fancoils_pump_management
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              return id(pid_fancoil_cucina).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_fancoil_cucina).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_fancoil_sala_pranzo).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_fancoil_sala_pranzo).action == climate::CLIMATE_ACTION_COOLING ||
                     id(pid_fancoil_soggiorno).action == climate::CLIMATE_ACTION_HEATING ||
                     id(pid_fancoil_soggiorno).action == climate::CLIMATE_ACTION_COOLING;
          then:
            - switch.turn_off: relay_15
          else:
            - switch.turn_off: relay_15
