defaults:
  device_name: distribuzione-primo-piano
  friendly_name: "Distribuzione Primo Piano"

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  bagno_grande: !include ../components/rooms/first_floor/bagno_grande.yaml
  bagno_ospiti: !include ../components/rooms/first_floor/bagno_ospiti.yaml
  bagno_padronale: !include ../components/rooms/first_floor/bagno_padronale.yaml
  camera_nord: !include ../components/rooms/first_floor/camera_nord.yaml
  camera_sud: !include ../components/rooms/first_floor/camera_sud.yaml
  camera_ospiti: !include ../components/rooms/first_floor/camera_ospiti.yaml
  camera_padronale: !include ../components/rooms/first_floor/camera_padronale.yaml
  lavanderia: !include ../components/rooms/first_floor/lavanderia.yaml

udp:
  id: udp_packet_transport

packet_transport:
  - platform: udp
    udp_id: udp_packet_transport
    update_interval: 5s
    binary_sensors:
      - primo_piano_any_zone_open
    providers:
      - name: room-sensor-bagno-grande
      - name: room-sensor-bagno-ospiti
      - name: room-sensor-bagno-padronale
      - name: room-sensor-camera-nord
      - name: room-sensor-camera-sud
      - name: room-sensor-camera-ospiti
      - name: room-sensor-camera-padronale
      - name: room-sensor-lavanderia

modbus:
  id: rs485_bus
  uart_id: rs485

modbus_controller:
  - id: modbus_0_10v_adapter_fancoils_second_floor
    address: 0x2
    modbus_id: rs485_bus
    update_interval: 5s

binary_sensor:
  - platform: template
    id: primo_piano_any_zone_open
    name: "First Floor Any Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(pid_radiant_bagno_padronale).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_bagno_grande).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_bagno_ospiti).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_lavanderia).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_camera_nord).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_camera_nord).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_camera_sud).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_camera_sud).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_camera_padronale).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_camera_padronale).action == climate::CLIMATE_ACTION_COOLING ||
             id(pid_radiant_camera_ospiti).action == climate::CLIMATE_ACTION_HEATING ||
             id(pid_radiant_camera_ospiti).action == climate::CLIMATE_ACTION_COOLING;
