substitutions:
  use_modbus: "false" # Feature flag: set to "true" to enable Modbus slave
  slave_address: "0x3" # Modbus slave address (first floor = 3)
  master_address: "0x1" # Modbus master address

packages:
  board: !include ../boards/a16.yaml
  wifi: !include ../boards/wifi.yaml
  modbus_slave: !include ../components/modbus_slave.yaml
  modbus_slave_registers: !include
    file: ../components/modbus_slave_registers.yaml
    vars:
      master_address: ${master_address}
  temperature_failover: !include
    file: ../components/sensor_failover.yaml
    vars:
      sensor_id: "termometro_primo_piano_temperature"
      modbus_sensor_id: "modbus_piano_terra_temperature"
      ha_sensor_id: "ha_termometro_primo_piano_temperature"
      device_class: "temperature"
      unit_of_measurement: "°C"
      accuracy_decimals: 1
  # Note: emergency_shutdown component needs refactoring for dynamic zone lists
  # TODO: Re-add emergency_shutdown after component is made generic
  slow_pwm_zona_1: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Primo Piano Zona 1"
      circuit_slug: "primo_piano_zona_1"
      output: slow_pwm_zona_1
      sensor: termometro_primo_piano_temperature_abstracted
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch
  slow_pwm_zona_2: !include
    file: ../components/dual_pid.yaml
    vars:
      circuit_name: "Primo Piano Zona 2"
      circuit_slug: "primo_piano_zona_2"
      output: slow_pwm_zona_2
      sensor: termometro_primo_piano_temperature_abstracted
      heat_default_temperature: 28.0
      heat_kp: 0.2
      heat_ki: 0.01
      heat_kd: 0.0
      cool_default_temperature: 22.0
      cool_kp: 0.2
      cool_ki: 0.01
      cool_kd: 0.0
      switch: remote_switch

switch:
  - platform: template
    id: remote_switch
    optimistic: true
    on_turn_on:
      then:
        - script.execute: switch_management
    on_turn_off:
      then:
        - script.execute: switch_management

sensor:
  - platform: homeassistant
    id: ha_termometro_primo_piano_temperature
    entity_id: sensor.termometro_primo_piano_temperature
    internal: true

output:
  - platform: slow_pwm
    id: slow_pwm_zona_1
    period: 900s
    pin:
      pcf8574: outputs_1_8
      number: 0
      mode: OUTPUT
      inverted: false
  - platform: slow_pwm
    id: slow_pwm_zona_2
    period: 900s
    pin:
      pcf8574: outputs_1_8
      number: 1
      mode: OUTPUT
      inverted: false

script:
  - id: switch_management
    then:
      - logger.log: "Switch state changed"
