# MEV Primo Piano - First Floor Mechanical Extract Ventilation Control
# Epic 6: MEV Board Integration
# Board: KC868-A6

defaults:
  device_name: "first_floor_mev"
  friendly_name: "VMC Primo Piano"

packages:
  base: !include ../boards/a6.yaml
  mev: !include
    file: ../components/mev.yaml
    vars:
      mev_slug: "first_floor_mev"
      mev_name: "VMC Primo Piano"
      power_relay: relay_1
      mode_relay: relay_2
      dehumidifier_relay: relay_3
      cooling_relay: relay_4
      fan_speed_output: dac_1
      alarm_input: input_1

substitutions:
  device_name: ${device_name}
  friendly_name: "MEV Primo Piano"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "First Floor Mechanical Extract Ventilation Control - KC868-A6"
