name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    name: Native verification battery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Run native verification battery
        run: bash scripts/verification-battery.sh --native-only
