name: Deploy Maintenance Guide

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt
      - name: Install MkDocs + plugins (repo pins)
        run: pip install -r docs-site/requirements.txt
      - name: Build site (strict — fail on broken links/nav)
        run: mkdocs build --strict --site-dir ../site
        working-directory: docs-site
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
