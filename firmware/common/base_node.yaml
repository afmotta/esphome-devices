# =============================================================================
# base_node.yaml — shared package included by every node
# =============================================================================
# Required substitutions:
#   ${node_name}, ${room_id}, ${board_id}
#   ${can_cs_pin}, ${can_clk_pin}, ${can_mosi_pin}, ${can_miso_pin}
#   ${can_clock}, ${output_can_id}, ${status_can_id}
#
# CAN ID convention (Extended IDs, location-as-address — ADR-0001):
#   A node's address IS its (room, board). INPUT button IDs are computed per-event at
#   send time via can_input_id(room, board, button, event); the constants below are the
#   two fixed IDs this node needs, generated by generate_nodes.py:
#     ${status_can_id} = can_status_id(room, board)       — node → gateway heartbeat (TX), also component default
#     ${output_can_id} = can_output_filter(room, board)   — gateway → node commands (this node's RX filter base)
# =============================================================================

esphome:
  includes:
    - ../common/canbus_protocol.h
  on_boot:
    priority: 200
    then:
      - lambda: |-
          ESP_LOGI("canbus", "Node ${node_name} online — R${room_id}B${board_id}");
          ESP_LOGI("canbus", "  Status CAN ID: 0x%08X", can_status_id(${room_id}, ${board_id}));
          ESP_LOGI("canbus", "  Output RX filter: 0x%08X / mask 0x%08X",
                   can_output_filter(${room_id}, ${board_id}), CAN_MASK_OUTPUT_ADDR);

globals:
  - id: error_flags
    type: uint8_t
    initial_value: "0"
  # millis() is uint32 ms and wraps every ~49.7 days. Count the wraps so reported uptime
  # survives past the ms ceiling (the 30s heartbeat observes every wrap — see below).
  - id: uptime_rollovers
    type: uint16_t
    initial_value: "0"
  - id: last_millis
    type: uint32_t
    initial_value: "0"

# --------------- SPI bus for MCP2515 ---------------
spi:
  clk_pin: ${can_clk_pin}
  mosi_pin: ${can_mosi_pin}
  miso_pin: ${can_miso_pin}

# --------------- CAN bus ---------------
canbus:
  - platform: mcp2515
    id: can0
    use_extended_id: true
    # Component default TX id (this node's heartbeat ID). Every send specifies an explicit
    # can_id + use_extended_id, so this is only the component default.
    can_id: ${status_can_id}
    cs_pin: ${can_cs_pin}
    clock: ${can_clock}
    bit_rate: 125KBPS
    on_frame:
      # RX filter: commands addressed to this node (CAT_OUTPUT + this room/board). The mask
      # ignores gateway_id + subtype, so the node obeys whichever gateway owns it.
      - can_id: ${output_can_id}
        can_id_mask: 0x1FFFFC00
        use_extended_id: true
        then:
          - if:
              condition:
                lambda: 'if (x.size() < INPUT_PAYLOAD_MIN) return false; return x[0] == PROTO_V1;'
              then:
                - lambda: |-
                    uint8_t subtype = id_subtype(can_id);
                    if (subtype == SUBTYPE_CONFIG_WRITE && x.size() >= CONFIG_PAYLOAD_MIN) {
                      uint8_t key = x[1];
                      uint16_t val = (static_cast<uint16_t>(x[2]) << 8) | x[3];
                      ESP_LOGI("canbus", "Config key=0x%02X value=%u", (unsigned) key, (unsigned) val);
                    } else {
                      ESP_LOGI("canbus", "OUTPUT subtype=0x%02X from gw=%u",
                               (unsigned) subtype, (unsigned) id_gateway(can_id));
                    }

# --------------- Heartbeat every 30 seconds ---------------
interval:
  - interval: 30s
    then:
      - lambda: |-
          // millis() is uint32 ms and wraps every ~49.7 days. The 30s heartbeat reliably
          // observes each wrap (a wrap can't hide between two ticks), so count rollovers to
          // reconstruct true uptime, then report hours as a uint16 saturating at 65535 (~7.5yr).
          uint32_t now = millis();
          if (now < id(last_millis)) id(uptime_rollovers) += 1;
          id(last_millis) = now;
          uint64_t ms = ((uint64_t) id(uptime_rollovers) << 32) | now;
          uint64_t hours = ms / 3600000ULL;
          uint16_t uptime_h = hours > 65535ULL ? 65535 : (uint16_t) hours;
          id(can0).send_data(can_status_id(${room_id}, ${board_id}), true,
                             heartbeat_payload(uptime_h, id(error_flags)));
