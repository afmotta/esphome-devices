# =============================================================================
# base_node.yaml — shared package included by every node
# =============================================================================
# Required substitutions:
#   ${node_name}, ${node_id}, ${room_id}, ${board_id}
#   ${can_cs_pin}, ${can_clk_pin}, ${can_mosi_pin}, ${can_miso_pin}
#   ${can_clock}, ${input_can_id}, ${output_can_id}, ${status_can_id}
#
# CAN ID direction convention (all generated by generate_nodes.py):
#   ${input_can_id}  = can_id(CAT_INPUT,  node_id) — node → gateway, button events (this node's TX/own id)
#   ${status_can_id} = can_id(CAT_STATUS, node_id) — node → gateway, heartbeat (TX)
#   ${output_can_id} = can_id(CAT_OUTPUT, node_id) — gateway → node, commands (this node's RX filter)
# =============================================================================

esphome:
  includes:
    - ../common/canbus_protocol.h
  on_boot:
    priority: 200
    then:
      - lambda: |-
          ESP_LOGI("canbus", "Node ${node_name} online — ID=${node_id} R${room_id}B${board_id}");
          ESP_LOGI("canbus", "  Input  CAN ID: 0x%03X", can_id(CAT_INPUT,  ${node_id}));
          ESP_LOGI("canbus", "  Status CAN ID: 0x%03X", can_id(CAT_STATUS, ${node_id}));

globals:
  - id: error_flags
    type: uint8_t
    initial_value: "0"
  # millis() is uint32 ms and wraps every ~49.7 days. Count the wraps so reported uptime
  # survives past the ms ceiling (the 30s heartbeat observes every wrap — see below).
  - id: uptime_rollovers
    type: uint16_t
    initial_value: "0"
  - id: last_millis
    type: uint32_t
    initial_value: "0"

# --------------- SPI bus for MCP2515 ---------------
spi:
  clk_pin: ${can_clk_pin}
  mosi_pin: ${can_mosi_pin}
  miso_pin: ${can_miso_pin}

# --------------- CAN bus ---------------
canbus:
  - platform: mcp2515
    id: can0
    # Node's own/default TX id (CAT_INPUT, node → gateway). All sends specify an
    # explicit can_id, so this is the component default rather than a hard dependency.
    can_id: ${input_can_id}
    cs_pin: ${can_cs_pin}
    clock: ${can_clock}
    bit_rate: 125KBPS
    on_frame:
      # RX filter: commands addressed to this node (CAT_OUTPUT, gateway → node).
      - can_id: ${output_can_id}
        then:
          - if:
              condition:
                lambda: 'if (x.size() < CAN_FRAME_SIZE) return false; return x[0] == PROTO_V1;'
              then:
                - lambda: |-
                    uint8_t subtype = x[1];
                    if (subtype == MSG_CONFIG_WRITE) {
                      uint8_t key = x[2];
                      uint16_t val = (static_cast<uint16_t>(x[3]) << 8) | x[4];
                      ESP_LOGI("canbus", "Config key=0x%02X value=%u", (unsigned) key, (unsigned) val);
                    }

# --------------- Heartbeat every 30 seconds ---------------
interval:
  - interval: 30s
    then:
      - canbus.send:
          canbus_id: can0
          can_id: ${status_can_id}
          data: !lambda |-
            // millis() is uint32 ms and wraps every ~49.7 days. The 30s heartbeat reliably
            // observes each wrap (a wrap can't hide between two ticks), so count rollovers to
            // reconstruct true uptime, then report hours as a uint16 saturating at 65535 (~7.5yr).
            uint32_t now = millis();
            if (now < id(last_millis)) id(uptime_rollovers) += 1;
            id(last_millis) = now;
            uint64_t ms = ((uint64_t) id(uptime_rollovers) << 32) | now;
            uint64_t hours = ms / 3600000ULL;
            uint16_t uptime_h = hours > 65535ULL ? 65535 : (uint16_t) hours;
            return heartbeat_payload(uptime_h, id(error_flags), ${room_id}, ${board_id});
