# =============================================================================
# button.yaml — per-button package, include once per physical button
# =============================================================================
# Required vars: ${button_index}, ${button_gpio}
# Required parent substitutions:
#   ${node_name}, ${node_id}, ${room_id}, ${board_id}, ${debounce_ms}
# =============================================================================

script:
  - id: btn${button_index}_send_event
    parameters:
      event_type: uint8_t
    then:
      - lambda: |-
          ESP_LOGD("btn", "${node_name} btn${button_index}: %s", event_type_str(event_type).c_str());
          auto err = id(can0).send_data(can_id(CAT_INPUT, ${node_id}), false,
              button_payload(${button_index}, event_type, ${room_id}, ${board_id}));
          if (err != canbus::ERROR_OK) {
            ESP_LOGW("btn", "${node_name} btn${button_index} TX failed (err=%d), event %s dropped",
                (int) err, event_type_str(event_type).c_str());
          }

binary_sensor:
  - platform: gpio
    name: "${node_name} Button ${button_index}"
    id: btn_${button_index}
    pin:
      number: ${button_gpio}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: ${debounce_ms}ms
      - delayed_off: ${debounce_ms}ms

    on_multi_click:
      # ----- Triple click -----
      - timing:
          - ON for at most 0.5s
          - OFF for 0.05s to 0.29s
          - ON for at most 0.5s
          - OFF for 0.05s to 0.29s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - script.execute:
              id: btn${button_index}_send_event
              event_type: !lambda 'return EVT_TRIPLE_CLICK;'

      # ----- Double click -----
      - timing:
          - ON for at most 0.5s
          - OFF for 0.05s to 0.29s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - script.execute:
              id: btn${button_index}_send_event
              event_type: !lambda 'return EVT_DOUBLE_CLICK;'

      # ----- Single click -----
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - script.execute:
              id: btn${button_index}_send_event
              event_type: !lambda 'return EVT_CLICK;'

      # ----- Long press (1s to just under 3s) -----
      # Capped at 2999ms so the extra-long pattern (>= 3s) is reachable;
      # an inclusive "1s to 3s" here would always win at exactly 3s.
      - timing:
          - ON for 1s to 2999ms
          - OFF for at least 0.3s
        then:
          - script.execute:
              id: btn${button_index}_send_event
              event_type: !lambda 'return EVT_LONG_PRESS;'

      # ----- Extra long press (3+ seconds) -----
      - timing:
          - ON for at least 3s
          - OFF for at least 0.3s
        then:
          - script.execute:
              id: btn${button_index}_send_event
              event_type: !lambda 'return EVT_EXTRA_LONG_PRESS;'
