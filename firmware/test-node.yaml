esphome:
  name: test-node
  includes:
    - common/canbus_protocol.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Round-trip the Extended-ID encode/decode helpers (ADR-0001).
          const uint32_t fid = can_input_id(7, 0, 2, EVT_DOUBLE_CLICK);
          const bool id_ok = id_category(fid) == CAT_INPUT && id_room(fid) == 7 &&
                             id_board(fid) == 0 && id_button(fid) == 2 &&
                             id_event(fid) == EVT_DOUBLE_CLICK;
          const auto payload = input_payload();
          const auto hb = heartbeat_payload(1234, ERR_NONE);
          const bool pl_ok = payload.size() >= INPUT_PAYLOAD_MIN &&
                             hb.size() >= STATUS_PAYLOAD_MIN && payload_uptime16(hb) == 1234;
          if (!id_ok || !pl_ok || event_type_str(EVT_LONG_PRESS).empty()) {
            ESP_LOGE("protocol", "protocol self-check FAIL");
          }

rp2040:
  board: rpipico

logger:
  level: INFO