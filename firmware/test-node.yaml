esphome:
  name: test-node
  includes:
    - common/canbus_protocol.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Protocol self-check (ADR-0007 Extended IDs, node_id-only).
          const uint32_t fid = can_id(CAT_INPUT, 100);
          const bool id_ok = can_id_category(fid) == CAT_INPUT && can_id_node(fid) == 100;
          const auto bp = button_payload(0, EVT_DOUBLE_CLICK);
          const auto hb = heartbeat_payload(1234, ERR_NONE);
          const bool pl_ok = bp.size() >= BUTTON_PAYLOAD_MIN &&
                             payload_event_type(bp) == EVT_DOUBLE_CLICK &&
                             hb.size() >= HEARTBEAT_PAYLOAD_MIN && payload_uptime16(hb) == 1234;
          if (!id_ok || !pl_ok || event_type_str(EVT_LONG_PRESS).empty()) {
            ESP_LOGE("protocol", "protocol self-check FAIL");
          }

rp2040:
  board: rpipico

logger:
  level: INFO
