# =============================================================================
# gateway.yaml — CAN Bus ↔ Home Assistant bridge
# =============================================================================
# Hardware: Waveshare ESP32-S3-RS485-CAN
# Role:     Listens for CAN button events and heartbeats, fires HA events.
#           Exposes an API service for HA to send commands to nodes.
# =============================================================================

esphome:
  name: canbus-gateway
  friendly_name: "CAN Bus Gateway"
  includes:
    - common/canbus_protocol.h

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

# --------------- Logging ---------------
logger:
  baud_rate: 0
  level: DEBUG

# --------------- Network: WiFi ---------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --------------- Home Assistant API ---------------
api:
  encryption:
    key: !secret api_encryption_key
  services:
    # Service: send an output command to a specific node.
    # Uses send_data() in a lambda because canbus.send: can_id: is not templatable.
    - service: canbus_send_output
      variables:
        node_id: int
        subtype: int
        param1: int
        param2: int
      then:
        - lambda: |-
            auto err = id(can0).send_data(can_id(CAT_OUTPUT, (uint16_t) node_id), false,
                {PROTO_V1, (uint8_t) subtype, (uint8_t) param1, (uint8_t) param2,
                 0x00, 0x00, 0x00, 0x00});
            if (err != canbus::ERROR_OK) {
              ESP_LOGW("gw", "canbus_send_output to node %d failed (err=%d)", node_id, (int) err);
            }

    # Service: send a config parameter to a specific node.
    # Uses send_data() in a lambda because canbus.send: can_id: is not templatable.
    - service: canbus_send_config
      variables:
        node_id: int
        key: int
        value: int
      then:
        - lambda: |-
            auto err = id(can0).send_data(can_id(CAT_OUTPUT, (uint16_t) node_id), false,
                {PROTO_V1, MSG_CONFIG_WRITE, (uint8_t) key,
                 (uint8_t) ((value >> 8) & 0xFF), (uint8_t) (value & 0xFF),
                 0x00, 0x00, 0x00});
            if (err != canbus::ERROR_OK) {
              ESP_LOGW("gw", "canbus_send_config to node %d failed (err=%d)", node_id, (int) err);
            }

ota:
  - platform: esphome

# --------------- CAN Bus (native ESP32 TWAI) ---------------
canbus:
  - platform: esp32_can
    id: can0
    # Required default TX id = CAT_OUTPUT base (can_id(CAT_OUTPUT, 0) = 0x400).
    # Every command send_data() call sets an explicit can_id, so this is only the
    # component default and is never relied on for an actual frame.
    can_id: 0x400
    tx_pin: GPIO15
    rx_pin: GPIO16
    bit_rate: 125KBPS
    on_frame:
      # ---- All button events (CAT_INPUT = category 1) ----
      - can_id: 0x200
        can_id_mask: 0x600
        then:
          - if:
              condition:
                lambda: 'if (x.size() < CAN_FRAME_SIZE) return false; return x[0] == PROTO_V1 && payload_type(x) == MSG_BUTTON_EVENT;'
              then:
                - lambda: |-
                    ESP_LOGI("gw", "Button R%02uB%u btn%u %s",
                             payload_room(x), payload_board(x), payload_button_index(x),
                             event_type_str(payload_event_type(x)).c_str());
                # Only forward recognized event types to HA; unknown types are logged above but not fired.
                - if:
                    condition:
                      lambda: 'return event_type_str(payload_event_type(x)) != "unknown";'
                    then:
                      - homeassistant.event:
                          event: esphome.canbus_button
                          data:
                            room: !lambda 'return to_string(payload_room(x));'
                            board: !lambda 'return to_string(payload_board(x));'
                            button: !lambda 'return to_string(payload_button_index(x));'
                            event: !lambda 'return std::string(event_type_str(payload_event_type(x)));'

      # ---- All heartbeats (CAT_STATUS = category 3) ----
      - can_id: 0x600
        can_id_mask: 0x600
        then:
          - if:
              condition:
                lambda: 'if (x.size() < CAN_FRAME_SIZE) return false; return x[0] == PROTO_V1;'
              then:
                - lambda: |-
                    const uint8_t room   = payload_heartbeat_room(x);
                    const uint8_t board  = payload_heartbeat_board(x);
                    const uint8_t uptime = payload_uptime(x);
                    const uint8_t errors = payload_errors(x);
                    if (errors != ERR_NONE) {
                      ESP_LOGW("gw", "Node R%02uB%u error=0x%02X uptime=%uh",
                               room, board, errors, uptime);
                    } else {
                      ESP_LOGD("gw", "Heartbeat R%02uB%u uptime=%uh",
                               room, board, uptime);
                    }
