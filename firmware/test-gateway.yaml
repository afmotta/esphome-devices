esphome:
  name: test-gateway
  includes:
    - common/canbus_protocol.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // Round-trip the Extended-ID helpers, incl. the OUTPUT command path (ADR-0001).
          const uint32_t oid = can_output_id(8, 0, 0, SUBTYPE_CONFIG_WRITE);
          const bool id_ok = id_category(oid) == CAT_OUTPUT && id_room(oid) == 8 &&
                             id_board(oid) == 0 && id_gateway(oid) == 0 &&
                             id_subtype(oid) == SUBTYPE_CONFIG_WRITE;
          // The node RX filter matches address bits and ignores gateway_id/subtype.
          const bool filter_ok = (oid & CAN_MASK_OUTPUT_ADDR) == can_output_filter(8, 0);
          if (!id_ok || !filter_ok || event_type_str(EVT_EXTRA_LONG_PRESS).empty()) {
            ESP_LOGE("protocol", "protocol self-check FAIL");
          }

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  baud_rate: 0