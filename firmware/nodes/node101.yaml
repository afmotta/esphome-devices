# =============================================================================
# Node: node101 — node_id 101
# =============================================================================
# (map-seed metadata, not flashed) Floor: Ground  Location: Ground floor living room  Room 8 Board 0
# Buttons:  2 (GPIO 20,21)
# CAN IDs (29-bit Extended, computed at runtime from node_id):
#   Input  = 0x02065000  (CAT_INPUT,  node -> controller, button events)
#   Status = 0x06065000  (CAT_STATUS, node -> controller, heartbeat)
# =============================================================================

substitutions:
        node_name: "node101"
        node_id: "101"
        debounce_ms: "50"
        can_cs_pin: "GPIO9"
        can_clk_pin: "GPIO2"
        can_mosi_pin: "GPIO3"
        can_miso_pin: "GPIO4"
        # No can_int_pin: the ESPHome mcp2515 component polls over SPI and exposes no
        # interrupt-pin config. The hardware INT line is GPIO11 (see README OQ-2).
        can_clock: "16MHZ"

esphome:
  name: ${node_name}
  friendly_name: "Ground floor living room"

rp2040:
  board: rpipico

logger:
  level: DEBUG

packages:
  base: !include ../common/base_node.yaml
  btn0: !include { file: ../common/button.yaml, vars: { button_index: "0", button_gpio: "20" } }
  btn1: !include { file: ../common/button.yaml, vars: { button_index: "1", button_gpio: "21" } }
