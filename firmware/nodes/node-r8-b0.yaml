# =============================================================================
# Node: node-r8-b0 — Room 8, Board 0
# =============================================================================
# Floor:    Ground
# Location: Ground floor living room
# Buttons:  2 (GPIO 20,21)
# CAN IDs (29-bit Extended, location-as-address):
#   Input  base = 0x04200000  (CAT_INPUT,  node → gateway; button/event in low bits)
#   Status      = 0x0C200000  (CAT_STATUS, node → gateway, heartbeat)
#   Output RX   = 0x08200000  (CAT_OUTPUT, gateway → node; mask 0x1FFFFC00)
# =============================================================================

substitutions:
        node_name: "node-r8-b0"
        room_id: "8"
        board_id: "0"
        output_can_id: "0x08200000"
        status_can_id: "0x0C200000"
        debounce_ms: "50"
        can_cs_pin: "GPIO9"
        can_clk_pin: "GPIO2"
        can_mosi_pin: "GPIO3"
        can_miso_pin: "GPIO4"
        # No can_int_pin: the ESPHome mcp2515 component polls over SPI and exposes no
        # interrupt-pin config. The hardware INT line is GPIO11 (see README OQ-2).
        can_clock: "16MHZ"

esphome:
  name: ${node_name}
  friendly_name: "Ground floor living room"

rp2040:
  board: rpipico

logger:
  level: DEBUG

packages:
  base: !include ../common/base_node.yaml
  btn0: !include { file: ../common/button.yaml, vars: { button_index: "0", button_gpio: "20" } }
  btn1: !include { file: ../common/button.yaml, vars: { button_index: "1", button_gpio: "21" } }
