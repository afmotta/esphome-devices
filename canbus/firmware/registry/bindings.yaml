# =============================================================================
# bindings.yaml — the binding manifest (ADR-0009 §2, ADR-0003 fallback behavior as data)
# =============================================================================
# Source of record for what the house DOES when HA is DOWN: each binding maps a button to a
# gateway relay action (relay id(s) + op). This is the second meaning-bearing artifact after
# nodes.csv; its canonical hash (tools/bindings.py) is the manifest_hash the gateway and Home
# Assistant must agree on for ha_ready (ADR-0003).
#
# SINGLE CLICK ONLY: fallback acts on the single click and nothing else. Double/triple/hold
# are HA-only — when HA is down those gestures do nothing. So a binding is a single-click
# action by construction and carries no `event` field (you cannot author a fallback gesture
# that silently never fires).
#
# RELAYS ARE GATEWAY OUTPUTS: `relay: N` is a progressive id for the gateway's relay_N output
# — no Modbus addresses live here; the gateway resolves id -> physical output by position.
# The relays themselves are defined in the gateway config, not in this registry.
#
# Hand-edited and reviewed by git diff. Run tools/generate_nodes.py after any change: it
# validates every binding against nodes.csv and stamps the new hash into protocol/bindings.h.
# BACK UP BY PUSHING: bindings are unrebuildable — an unpushed change is an unbacked-up house.
#
# Schema (strict subset — scalars only, no nesting; see tools/bindings.py):
#   schema_version: 1
#   bindings:
#     - node_id: 100        # must exist in registry/nodes.csv
#       button: 0           # 0–7 (standard 8-button set); the single click is implied
#       relay: 0            # one gateway relay id, OR a comma-list scalar for fan-out
#       op: toggle          # on | off | toggle — one op applied to every listed relay
#
# Multi-relay (one click → several relays, ADR-0009 open item 1): `relay` may be a comma-list
# scalar — the fan-out stays in ONE scalar so the strict no-nesting reader is unchanged. Order
# and duplicates don't matter (normalized + sorted before hashing):
#     - node_id: 100
#       button: 1
#       relay: "0,1,2"      # toggles relays 0, 1 and 2 together on a single click
#       op: toggle
# The shared `op` applies to all listed relays. Mixed per-relay ops are intentionally NOT
# expressible here — that needs nested structure (the deferred PyYAML decision, open item 1).
# For an all-on/all-off group prefer explicit op: on / op: off over toggle, which desyncs if
# the relays start in mixed states.
#
# Empty for now: no bindings are authored until the gateway relay outputs exist (fallback is
# still log-only — ADR-0003 open item 7). An empty manifest still has a stable, real hash.
# =============================================================================

schema_version: 1
bindings: []
