# =============================================================================
# sensor_kit.yaml — per-room environment sensors (SHT45 + SEN66) over CAT_SENSOR
# =============================================================================
# Opt-in package (ADR-0006): include from a node via the `sensors` column in
# registry/nodes.csv — never by hand-editing nodes/. Always included ALONGSIDE
# base_node.yaml, which pulls in the board package (can0) and provides the protocol
# header/node behavior; ${node_id} comes from the generated node config.
# "dedicated sensor node" vs "combined with buttons" is a deployment profile
# (ADR-0006 §5), not a different include. The frames carry the host node's
# node_id, so the host's central-map room MUST be the sensor's room.
#
# One CAN frame per measurement every 30 s on can_id(CAT_SENSOR, node_id):
#   [PROTO_V1, sensor_status, meas_lo, meas_hi, v0, v1, v2, v3]   (LE)
# The consumer is the dedicated HVAC controller (external firmware), which
# marks a measurement stale after 90 s without a SENSOR_STATUS_OK frame.
#
# Required parent substitutions: ${node_id}
# Optional (defaults below):     ${i2c_sda}, ${i2c_scl}
# =============================================================================

substitutions:
  # Verified by Alberto (2026-06-11): SDA=GPIO6, SCL=GPIO7 — a valid RP2040 I2C1
  # pin pair, free of the MCP2515 (GPIO2/3/4/9/11) and button (GPIO20-27)
  # assignments. The board design is fixed, so the wiring is fleet-wide; change
  # the defaults here if it ever differs.
  i2c_sda: GPIO6
  i2c_scl: GPIO7

i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}

# --------------- Shared TX path ---------------
# Mapping rule (ADR-0006 §4): NaN -> UNAVAILABLE (covers SEN66 warm-up; the node
# cannot reliably tell warm-up apart, and the consumer ignores the value either
# way), inf or a value that overflows int32 -> OUT_OF_RANGE, negative raw for an
# unsigned quantity -> OUT_OF_RANGE, else OK with the value scaled to its
# encoding. Degraded frames are still sent (when the component publishes a
# reading at all) so the consumer can tell "sensor degraded" from "node dead".
#
# mode: queued spaces the frames out. A SEN66 update publishes its 9 channels
# back-to-back, but the MCP2515 has only 3 TX mailboxes (~1 ms drain per frame
# at 125 kbps) — sent unspaced, the later channels would be dropped every cycle.
# Queue depth 16 covers the worst burst (9 SEN66 + 2 SHT45 + headroom).
script:
  - id: sensor_send
    mode: queued
    max_runs: 16
    parameters:
      meas: uint16_t
      raw: float
      scale: float
      is_signed: bool
    then:
      - lambda: |-
          int32_t value = 0;
          uint8_t status = SENSOR_STATUS_OK;
          float scaled = raw * scale;
          if (std::isnan(raw)) {
            status = SENSOR_STATUS_UNAVAILABLE;
          } else if (!std::isfinite(scaled) || scaled > 2147483520.0f || scaled < -2147483648.0f) {
            // 2147483520 = largest float below INT32_MAX; lroundf past it is UB on
            // RP2040 (32-bit long).
            status = SENSOR_STATUS_OUT_OF_RANGE;
          } else if (!is_signed && raw < 0.0f) {
            status = SENSOR_STATUS_OUT_OF_RANGE;
          } else {
            value = (int32_t) lroundf(scaled);
          }
          ESP_LOGD("sensor", "node ${node_id} meas=%u raw=%.2f -> value=%ld status=%u",
                   meas, raw, (long) value, status);
          auto err = id(can0).send_data(can_id(CAT_SENSOR, ${node_id}), true,
              sensor_payload(meas, value, status));
          if (err != canbus::ERROR_OK) {
            ESP_LOGW("sensor", "node ${node_id} meas=%u TX failed (err=%d), frame dropped",
                meas, (int) err);
          }
      # Inter-frame spacing — lets the MCP2515 mailboxes drain before the next
      # queued measurement sends. 11 frames take ~275 ms against a 30 s cadence.
      - delay: 25ms

# --------------- Sensors (30 s cadence per ADR-0006 §4) ---------------
sensor:
  - platform: sht4x
    address: 0x44
    update_interval: 30s
    temperature:
      name: "Node ${node_id} SHT45 Temperature"
      id: sht45_temp
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SHT45_TEMP;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 100.0f;'   # centi-degC
            is_signed: !lambda 'return true;'
    humidity:
      name: "Node ${node_id} SHT45 Humidity"
      id: sht45_rh
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SHT45_RH;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 100.0f;'   # x100, 0-10000
            is_signed: !lambda 'return false;'

  - platform: sen6x
    address: 0x6B
    update_interval: 30s
    temperature:
      name: "Node ${node_id} SEN66 Temperature"
      id: sen66_temp
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_TEMP;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 100.0f;'   # centi-degC
            is_signed: !lambda 'return true;'
    humidity:
      name: "Node ${node_id} SEN66 Humidity"
      id: sen66_rh
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_RH;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 100.0f;'   # x100, 0-10000
            is_signed: !lambda 'return false;'
    pm_1_0:
      name: "Node ${node_id} SEN66 PM1.0"
      id: sen66_pm1_0
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_PM1_0;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 10.0f;'    # x10 ug/m3
            is_signed: !lambda 'return false;'
    pm_2_5:
      name: "Node ${node_id} SEN66 PM2.5"
      id: sen66_pm2_5
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_PM2_5;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 10.0f;'    # x10 ug/m3
            is_signed: !lambda 'return false;'
    pm_4_0:
      name: "Node ${node_id} SEN66 PM4.0"
      id: sen66_pm4_0
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_PM4_0;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 10.0f;'    # x10 ug/m3
            is_signed: !lambda 'return false;'
    pm_10_0:
      name: "Node ${node_id} SEN66 PM10"
      id: sen66_pm10
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_PM10;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 10.0f;'    # x10 ug/m3
            is_signed: !lambda 'return false;'
    voc:
      name: "Node ${node_id} SEN66 VOC Index"
      id: sen66_voc
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_VOC_INDEX;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 1.0f;'     # index 1-500
            is_signed: !lambda 'return false;'
    nox:
      name: "Node ${node_id} SEN66 NOx Index"
      id: sen66_nox
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_NOX_INDEX;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 1.0f;'     # index 1-500
            is_signed: !lambda 'return false;'
    co2:
      name: "Node ${node_id} SEN66 CO2"
      id: sen66_co2
      on_value:
        - script.execute:
            id: sensor_send
            meas: !lambda 'return SENSOR_SEN66_CO2;'
            raw: !lambda 'return x;'
            scale: !lambda 'return 1.0f;'     # ppm
            is_signed: !lambda 'return false;'
