# =============================================================================
# Device Driver: modbus_relay_board_32ch.yaml
# Purpose:       Manage a 32-relay Modbus expansion board (Waveshare Modbus
#                RTU Relay 32CH). Creates the modbus_controller and includes
#                32 relay switch instances. Drop-in sibling of
#                modbus_relay_board.yaml (8-ch) at 4x the channel count.
#
# No connectivity status sensor: unlike the 8-ch board (which polls an
# independent holding/input register via register_type: read), this board
# has no documented register outside its 32 relay coils. Polling any of them
# for "connectivity" would just alias that relay's own on/off state (e.g.
# coil 0x0000 == relay_1's coil) under a misleading device_class: connectivity
# label. Communication failures still surface per-switch — ESPHome's
# modbus_controller marks a switch unavailable on read timeout — so this is
# a deliberate omission, not a gap.
#
# Required vars:
#   controller_id            - Unique ID for this modbus_controller
#   modbus_address            - Modbus slave address (e.g., 0x02)
#   modbus_bus_id             - ID of the modbus bus (e.g., "rs485_bus")
#
# Optional vars:
#   controller_name           - Accepted for interface parity with
#                                modbus_relay_board.yaml (drop-in sibling); this
#                                board has no status sensor to name, so the
#                                value is currently accepted but unused. Safe
#                                to omit.
#   update_interval           - Polling interval (default: 5s). Unchanged from
#                                the 8-ch board's default; not re-validated for
#                                32 coils' worth of polling traffic per cycle.
#   id_offset                 - Offset for relay IDs to avoid collisions across
#                                multiple boards (default: 0). E.g., board 2 uses
#                                id_offset: 32 so relays are numbered 33-64
#                                (this board consumes 32 ids per instance, not
#                                8 — stagger accordingly when mixing with the
#                                8-ch board or another 32-ch board).
#                                Negative offsets are supported (verified via
#                                `esphome config`, 2026-07-10): id_offset: -1
#                                yields relay_0..relay_31 for a 0-based consumer.
#                                Only id_offset: 0 is exercised by the committed
#                                compile-checked example; the negative-offset
#                                finding above has no persisted regression
#                                check in this repo. Must be passed as a numeric
#                                var (not a string substitution): ESPHome's
#                                jinja arithmetic rejects string + int. Valid
#                                values are >= -1; below that, the generated
#                                relay ids become invalid (e.g. relay_-1).
#
# Dependencies:
#   - modbus_relay_switch.yaml (included automatically, must be in same directory)
#
# Exposes:
#   switch.relay_{1+id_offset} through switch.relay_{32+id_offset} - 32 relay controls
#
# Example:
#   packages:
#     relays: !include
#       file: packages/devices/modbus-io/modbus_relay_board_32ch.yaml
#       vars:
#         controller_id: relay_board_1
#         controller_name: "Relay Board 1"
#         modbus_address: 0x02
#         modbus_bus_id: rs485_bus
#         id_offset: 0
# =============================================================================

defaults:
  update_interval: 5s
  id_offset: 0

modbus_controller:
  - id: ${controller_id}
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}

packages:
  relay_1: !include
    file: modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: ${1 + id_offset}
      register_address: 0x0000
