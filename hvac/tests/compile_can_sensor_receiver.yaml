# =============================================================================
# compile_can_sensor_receiver.yaml — isolated HVAC CAN receiver compile fixture
# =============================================================================
# Validates that the generated route package and receive-only controller package
# compose without pulling in the full climate controller. Do not flash.
#
#   esphome config hvac/tests/compile_can_sensor_receiver.yaml
# =============================================================================

esphome:
  name: t-can-sensor-receiver
  friendly_name: "Test CAN Sensor Receiver"
  min_version: 2026.5.0
  includes:
    - ../../canbus/protocol/canbus_protocol.h
    - ../protocol/generated_can_sensor_routes.h
    - ../protocol/can_sensor_receiver.h

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: DEBUG

# soggiorno_temp_can/soggiorno_humidity_can are declared statically per-room in
# hvac/room_sensors.yaml for the real controller (HVAC-1.4) — this isolated
# fixture doesn't compose that file, so it declares the same two stub entities
# itself to match what the generated routes package's dispatch scripts publish into.
sensor:
  - platform: template
    id: soggiorno_temp_can
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 2
    internal: true
  - platform: template
    id: soggiorno_humidity_can
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 2
    internal: true

packages:
  routes: !include ../packages/generated/can_sensor_routes.yaml
  receiver: !include ../packages/can_sensor_receiver.yaml
