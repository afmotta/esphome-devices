sensor:
  - platform: template
    id: soggiorno_sen66_temp_can
    name: "Soggiorno SEN66 Temperature CAN"
    state_class: measurement
    accuracy_decimals: 2
    unit_of_measurement: "°C"
    device_class: temperature

  - platform: template
    id: soggiorno_sen66_humidity_can
    name: "Soggiorno SEN66 Humidity CAN"
    state_class: measurement
    accuracy_decimals: 2
    unit_of_measurement: "%"
    device_class: humidity

