# HVAC CAN sensor routing artifact. Includes only sensors=1 registry rows whose
# room_slug was validated against hvac/rooms/** before this file was written.
#
# Temp/humidity targets (<room_slug>_temp_can / <room_slug>_humidity_can) are declared
