# Bagno (Bathroom) - Detailed Room Dashboard
# Ground Floor
# Heating: Radiant Floor
# Note: No fancoil (excluded from dew point calculations due to shower humidity spikes)

title: Bagno Terra
path: bagno-terra
icon: mdi:toilet
type: sections

sections:
  - type: grid
    cards:
      - type: button
        name: Back to Ground Floor
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/ground-floor

  # Room Environment
  - type: grid
    title: Room Environment
    columns: 3
    cards:
      - type: tile
        entity: sensor.climate_control_bagno_terra_room_temp_abstracted
        name: Temperature
        icon: mdi:thermometer

      - type: tile
        entity: sensor.climate_control_bagno_terra_room_humidity_abstracted
        name: Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.climate_control_bagno_terra_dew_point
        name: Dew Point
        icon: mdi:water-thermometer

  # Radiant Floor Control
  - type: grid
    title: Radiant Floor Heating/Cooling
    cards:
      - type: thermostat
        entity: climate.climate_control_pid_radiant_bagno_terra
        name: Radiant Control
        features:
          - type: climate-hvac-modes
          - type: climate-preset-modes

      - type: tile
        entity: switch.climate_control_relay_11
        name: Radiant Zone Valve
        icon: mdi:valve

      - type: tile
        entity: binary_sensor.climate_control_pid_radiant_bagno_terra_is_active
        name: Zone Active
        icon: mdi:radiator

      - type: tile
        entity: sensor.climate_control_pid_radiant_bagno_terra_output_value
        name: PID Output
        icon: mdi:percent

  # Auto-tune
  - type: grid
    title: PID Auto-tune
    cards:
      - type: tile
        entity: button.climate_control_autotune_pid_radiant_bagno_terra
        name: Auto-tune Radiant
        icon: mdi:tune-variant

  # Historical Data
  - type: grid
    title: Historical Data
    cards:
      - type: history-graph
        title: Temperature & Humidity Trend
        hours_to_show: 24
        entities:
          - entity: sensor.climate_control_bagno_terra_room_temp_abstracted
          - entity: sensor.climate_control_bagno_terra_room_humidity_abstracted
          - entity: sensor.climate_control_bagno_terra_dew_point
