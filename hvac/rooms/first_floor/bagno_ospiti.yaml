# ============================================================================
# Bagno Ospiti
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: None
# ============================================================================
defaults:
  room_slug: "bagno_ospiti"
  room_name: "Bagno Ospiti"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_bagno_ospiti_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_ospiti_humidity"

  pid_radiant: !include
    file: ../../packages/components/heat_only_radiant.yaml
    vars:
      relay_id: relay_11
      temperature_sensor: bagno_ospiti_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../packages/components/pid_autotune.yaml
    vars:
      pid_id: bagno_ospiti_radiant_pid
      pid_name: "Bagno Ospiti Radiant"
