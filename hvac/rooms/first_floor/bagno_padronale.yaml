# ============================================================================
# Bagno Padronale
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: None
# ============================================================================
defaults:
  room_slug: "bagno_padronale"
  room_name: "Bagno Padronale"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_bagno_padronale_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_padronale_humidity"

  pid_radiant: !include
    file: ../../packages/components/heat_only_radiant.yaml
    vars:
      relay_id: relay_12
      temperature_sensor: bagno_padronale_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../packages/components/pid_autotune.yaml
    vars:
      pid_id: bagno_padronale_radiant_pid
      pid_name: "Bagno Padronale Radiant"
