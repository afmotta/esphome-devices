# ============================================================================
# Camera Padronale
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================
defaults:
  room_slug: "camera_padronale"
  room_name: "Camera Padronale"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_camera_padronale_temperature"
      ha_humidity_sensor_id: "sensor.room_camera_padronale_humidity"

  pid_radiant: !include
    file: ../../../vesta/packages/components/radiant.yaml
    vars:
      relay_id: relay_15
      temperature_sensor: camera_padronale_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../../vesta/packages/components/pid_autotune.yaml
    vars:
      pid_id: camera_padronale_radiant_pid
      pid_name: "Camera Padronale Radiant"
