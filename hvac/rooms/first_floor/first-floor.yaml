  # a room's CAN node can be enabled (registry sensors=1 + regeneration)
  # without a duplicate-id compile error. Do not also declare these in
  # hvac/packages/generated/can_sensor_routes.yaml. Exposed to Home Assistant
  # (not internal) per the epic's Entity Contract. PM1.0/PM4.0 are diagnostic
  # only and are not aggregated into any MEV demand channel.
