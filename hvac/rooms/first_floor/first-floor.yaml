  # ============================================================================
  # Temperature/Humidity Infrastructure Sensors
  # ============================================================================

  # Effective safe margin with HA fallback
  # Uses HA input_number if available, otherwise fallback to default
  - platform: template
    id: first_floor_radiant_safe_margin
    name: "First Floor Radiant Safe Margin"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:shield-half-full"
    lambda: |-
      if (id(ha_first_floor_radiant_safe_margin).has_state() && !std::isnan(id(ha_first_floor_radiant_safe_margin).state)) {
        return id(ha_first_floor_radiant_safe_margin).state;
      }
      ESP_LOGW("safe_margin", "HA unavailable, using fallback: %.1f°C", ${safe_margin});
      return ${safe_margin};
    update_interval: 30s

  # Supply temperature minimum based on dew point protection
  # Shows the enforced minimum supply temperature (dew point + safety margin)
  - platform: template
    id: first_floor_supply_temp_minimum
    name: "First Floor Supply Temp Minimum"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:thermometer-water"
    lambda: |-
      float dew_point = id(first_floor_max_dew_point).state;
      float margin = id(first_floor_radiant_safe_margin).state;
      if (std::isnan(dew_point) || std::isnan(margin)) return NAN;
      return dew_point + margin;
    update_interval: 30s

  - platform: combination
    id: first_floor_max_dew_point
    name: "Max Dew Point Primo piano"
    type: max
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    sources:
      - source: camera_ospiti_dew_point
      - source: camera_nord_dew_point
      - source: camera_padronale_dew_point
      - source: camera_sud_dew_point
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(hp_mode_summer).state;"
            then:
              - climate.control:
                  id: first_floor_radiant_mixing_valve_pid
                  target_temperature: !lambda "return id(first_floor_supply_temp_minimum).state;"
              - logger.log:
                  format: "[First Floor Radiant] Dew point protection: supply temp min = %.1f°C"
                  args: ["id(first_floor_supply_temp_minimum).state"]

# HA sensors for safe margin (runtime configurable)
# Create input_number entity in HA: input_number.first_floor_safe_margin (range: 0.5-3.0, step: 0.1)
number:
  - platform: homeassistant
    id: ha_first_floor_radiant_safe_margin
    entity_id: input_number.first_floor_safe_margin
    internal: true
