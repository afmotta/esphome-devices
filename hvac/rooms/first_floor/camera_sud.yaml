# ============================================================================
# Camera Sud
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================
defaults:
  room_slug: "camera_sud"
  room_name: "Camera Sud"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_camera_sud_temperature"
      ha_humidity_sensor_id: "sensor.room_camera_sud_humidity"

  pid_radiant: !include
    file: ../../packages/components/radiant.yaml
    vars:
      relay_id: relay_16
      temperature_sensor: camera_sud_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../packages/components/pid_autotune.yaml
    vars:
      pid_id: camera_sud_radiant_pid
      pid_name: "Camera Sud Radiant"
