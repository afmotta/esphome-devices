# ============================================================================
# Bagno Grande
# First Floor
# ============================================================================
#
# Heating: Radiant Floor
# Cooling: None
# ============================================================================
# ============================================================================

defaults:
  room_slug: "bagno_grande"
  room_name: "Bagno Grande"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_bagno_grande_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_grande_humidity"

  pid_radiant: !include
    file: ../../packages/components/heat_only_radiant.yaml
    vars:
      relay_id: relay_10
      temperature_sensor: bagno_grande_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../packages/components/pid_autotune.yaml
    vars:
      pid_id: bagno_grande_radiant_pid
      pid_name: "Bagno Grande Radiant"
