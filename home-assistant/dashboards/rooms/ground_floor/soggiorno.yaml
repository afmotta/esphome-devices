# Soggiorno (Living Room) - Detailed Room Dashboard
# Ground Floor
# Heating: Radiant Floor
# Cooling: Radiant Floor (primary) + Fancoil (boost)

title: Soggiorno
path: soggiorno
icon: mdi:sofa
type: sections

sections:
  # ===========================================================================
  # Navigation
  # ===========================================================================
  - type: grid
    cards:
      - type: button
        name: Back to Ground Floor
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/ground-floor

  # ===========================================================================
  # Room Environment
  # ===========================================================================
  - type: grid
    title: Room Environment
    columns: 3
    cards:
      - type: tile
        entity: sensor.climate_control_soggiorno_room_temp_abstracted
        name: Temperature
        icon: mdi:thermometer

      - type: tile
        entity: sensor.climate_control_soggiorno_room_humidity_abstracted
        name: Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.climate_control_soggiorno_dew_point
        name: Dew Point
        icon: mdi:water-thermometer

  # ===========================================================================
  # Radiant Floor Control
  # ===========================================================================
  - type: grid
    title: Radiant Floor Heating/Cooling
    cards:
      - type: thermostat
        entity: climate.climate_control_pid_radiant_soggiorno
        name: Radiant Control
        features:
          - type: climate-hvac-modes
          - type: climate-preset-modes

      - type: tile
        entity: switch.climate_control_relay_9
        name: Radiant Zone Valve
        icon: mdi:valve

      - type: tile
        entity: binary_sensor.climate_control_pid_radiant_soggiorno_is_active
        name: Zone Active
        icon: mdi:radiator

      - type: tile
        entity: binary_sensor.climate_control_pid_radiant_soggiorno_is_heating
        name: Heating
        icon: mdi:fire

      - type: tile
        entity: binary_sensor.climate_control_pid_radiant_soggiorno_is_cooling
        name: Cooling
        icon: mdi:snowflake

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_p_term
        name: P Term
        icon: mdi:alpha-p-circle

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_i_term
        name: I Term
        icon: mdi:alpha-i-circle

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_d_term
        name: D Term
        icon: mdi:alpha-d-circle

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_output_value
        name: PID Output
        icon: mdi:percent

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_error_value
        name: Error
        icon: mdi:delta

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_kp
        name: Kp Gain
        icon: mdi:tune

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_ki
        name: Ki Gain
        icon: mdi:tune

      - type: tile
        entity: sensor.climate_control_pid_radiant_soggiorno_kd
        name: Kd Gain
        icon: mdi:tune

  # ===========================================================================
  # Fancoil Boost System
  # ===========================================================================
  - type: grid
    title: Fancoil Boost System
    cards:
      - type: thermostat
        entity: climate.climate_control_pid_fancoil_soggiorno
        name: Fancoil Control
        features:
          - type: climate-hvac-modes

      - type: tile
        entity: number.climate_control_fancoil_soggiorno_speed
        name: Fan Speed (0-10V)
        icon: mdi:fan-speed-3

      - type: tile
        entity: binary_sensor.climate_control_soggiorno_boost_active
        name: Boost Active
        icon: mdi:rocket-launch

      - type: tile
        entity: sensor.climate_control_soggiorno_boost_trigger_reason
        name: Boost Trigger Reason
        icon: mdi:information

      - type: tile
        entity: binary_sensor.climate_control_pid_fancoil_soggiorno_is_active
        name: Fancoil Active
        icon: mdi:fan

      - type: tile
        entity: binary_sensor.climate_control_pid_fancoil_soggiorno_is_heating
        name: Fancoil Heating
        icon: mdi:fire

      - type: tile
        entity: binary_sensor.climate_control_pid_fancoil_soggiorno_is_cooling
        name: Fancoil Cooling
        icon: mdi:snowflake

      - type: tile
        entity: sensor.climate_control_pid_fancoil_soggiorno_output_value
        name: Fancoil Output
        icon: mdi:percent

      - type: tile
        entity: sensor.climate_control_soggiorno_time_above_threshold
        name: Time Above Threshold
        icon: mdi:timer

      - type: tile
        entity: sensor.climate_control_soggiorno_radiant_output_level
        name: Radiant Output Level
        icon: mdi:gauge

      - type: tile
        entity: binary_sensor.climate_control_soggiorno_radiant_saturated
        name: Radiant Saturated
        icon: mdi:alert-circle

      - type: tile
        entity: sensor.climate_control_soggiorno_time_radiant_saturated
        name: Time Saturated
        icon: mdi:timer-alert

  # ===========================================================================
  # Auto-tune Controls
  # ===========================================================================
  - type: grid
    title: PID Auto-tune
    cards:
      - type: tile
        entity: button.climate_control_autotune_pid_radiant_soggiorno
        name: Auto-tune Radiant
        icon: mdi:tune-variant

      - type: tile
        entity: button.climate_control_autotune_pid_fancoil_soggiorno
        name: Auto-tune Fancoil
        icon: mdi:tune-variant

  # ===========================================================================
  # Sensor Sources & Failover
  # ===========================================================================
  - type: grid
    title: Sensor Sources & Failover
    columns: 2
    cards:
      - type: tile
        entity: sensor.climate_control_soggiorno_room_temp_abstracted
        name: Temperature (Active)
        icon: mdi:thermometer-check

      - type: tile
        entity: sensor.climate_control_soggiorno_room_humidity_abstracted
        name: Humidity (Active)
        icon: mdi:water-percent

      - type: tile
        entity: sensor.climate_control_soggiorno_modbus_temp
        name: Modbus Temperature
        icon: mdi:thermometer-bluetooth

      - type: tile
        entity: sensor.climate_control_soggiorno_modbus_humidity
        name: Modbus Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.climate_control_room_soggiorno_temperature
        name: HA Temperature (Fallback)
        icon: mdi:home-assistant

      - type: tile
        entity: sensor.climate_control_room_soggiorno_humidity
        name: HA Humidity (Fallback)
        icon: mdi:home-assistant

  # ===========================================================================
  # Historical Charts
  # ===========================================================================
  - type: grid
    title: Historical Data
    cards:
      - type: history-graph
        title: Temperature & Humidity Trend
        hours_to_show: 24
        entities:
          - entity: sensor.climate_control_soggiorno_room_temp_abstracted
            name: Temperature
          - entity: sensor.climate_control_soggiorno_room_humidity_abstracted
            name: Humidity
          - entity: sensor.climate_control_soggiorno_dew_point
            name: Dew Point

      - type: history-graph
        title: PID Output & Activity
        hours_to_show: 24
        entities:
          - entity: sensor.climate_control_pid_radiant_soggiorno_output_value
            name: Radiant Output
          - entity: sensor.climate_control_pid_fancoil_soggiorno_output_value
            name: Fancoil Output
          - entity: binary_sensor.climate_control_soggiorno_boost_active
            name: Boost Active
