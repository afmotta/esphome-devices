# Camera Ospiti (Guest Bedroom) - Detailed Room Dashboard
# First Floor
# Heating/Cooling: Radiant Floor

title: Camera Ospiti
path: camera-ospiti
icon: mdi:bed
type: sections

sections:
  - type: grid
    cards:
      - type: button
        name: Back to First Floor
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/first-floor

  # Room Environment
  - type: grid
    title: Room Environment
    columns: 4
    cards:
      - type: tile
        entity: sensor.camera_ospiti_room_temp_abstracted
        name: Temperature
        icon: mdi:thermometer

      - type: tile
        entity: sensor.camera_ospiti_room_humidity_abstracted
        name: Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.camera_ospiti_dew_point
        name: Dew Point
        icon: mdi:water-thermometer

      - type: tile
        entity: sensor.camera_ospiti_co2
        name: CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: sensor.camera_ospiti_iaq
        name: IAQ
        icon: mdi:air-filter

  # Radiant Floor Control
  - type: grid
    title: Radiant Floor Heating/Cooling
    cards:
      - type: thermostat
        entity: climate.pid_radiant_camera_ospiti
        name: Radiant Control
        features:
          - type: climate-hvac-modes
          - type: climate-preset-modes

      - type: tile
        entity: switch.relay_15
        name: Radiant Zone Valve
        icon: mdi:valve

      - type: tile
        entity: binary_sensor.pid_radiant_camera_ospiti_is_active
        name: Zone Active
        icon: mdi:radiator

      - type: tile
        entity: sensor.pid_radiant_camera_ospiti_output_value
        name: PID Output
        icon: mdi:percent

  # Auto-tune
  - type: grid
    title: PID Auto-tune
    cards:
      - type: tile
        entity: button.autotune_pid_radiant_camera_ospiti
        name: Auto-tune Radiant
        icon: mdi:tune-variant

  # Historical Data
  - type: grid
    title: Historical Data
    cards:
      - type: history-graph
        title: Temperature & Air Quality
        hours_to_show: 24
        entities:
          - entity: sensor.camera_ospiti_room_temp_abstracted
          - entity: sensor.camera_ospiti_room_humidity_abstracted
          - entity: sensor.camera_ospiti_co2
