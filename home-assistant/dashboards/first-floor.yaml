# First Floor (Primo Piano) Dashboard
# 8 zones: 4 Bedrooms (Camera Nord, Sud, Ospiti, Padronale), 3 Bathrooms, Lavanderia
# Plus MEV (Mechanical Extract Ventilation) system

title: First Floor
path: first-floor
icon: mdi:home-floor-1
type: sections

sections:
  # ===========================================================================
  # Floor System Status
  # ===========================================================================
  - type: grid
    title: Floor System Status
    cards:
      - type: button
        name: Back to Overview
        icon: mdi:arrow-left
        tap_action:
          action: navigate
          navigation_path: /lovelace/climate-overview

      - type: tile
        entity: binary_sensor.first_floor_any_zone_open
        name: Radiant System
        icon: mdi:radiator

      - type: tile
        entity: switch.vmc_primo_piano_power
        name: MEV Power
        icon: mdi:fan

  # ===========================================================================
  # Radiant Floor System
  # ===========================================================================
  - type: grid
    title: Radiant Floor System
    columns: 2
    cards:
      - type: thermostat
        entity: climate.pid_mixing_valve_primo_piano
        name: Mixing Valve Control
        features:
          - type: climate-hvac-modes

      - type: tile
        entity: sensor.primo_piano_supply_temp
        name: Supply Temperature
        icon: mdi:thermometer-water

      - type: tile
        entity: sensor.max_dew_point_primo_piano
        name: Max Dew Point
        icon: mdi:water-thermometer

      - type: tile
        entity: sensor.first_floor_supply_temp_minimum
        name: Supply Temp Minimum
        icon: mdi:thermometer-chevron-down

      - type: tile
        entity: sensor.first_floor_max_humidity
        name: Max Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.effective_first_floor_safe_margin
        name: Safe Margin
        icon: mdi:shield-half-full

  # ===========================================================================
  # MEV (Mechanical Extract Ventilation) System
  # ===========================================================================
  - type: grid
    title: MEV System
    columns: 2
    cards:
      # Control
      - type: tile
        entity: switch.vmc_primo_piano_power
        name: Power
        icon: mdi:power

      - type: tile
        entity: switch.vmc_primo_piano_mode
        name: Winter/Summer Mode
        icon: mdi:weather-partly-cloudy

      - type: tile
        entity: switch.vmc_primo_piano_dehumidifier
        name: Dehumidifier
        icon: mdi:water-remove

      - type: tile
        entity: switch.vmc_primo_piano_cooling
        name: Cooling Integration
        icon: mdi:snowflake

      - type: tile
        entity: number.vmc_primo_piano_target_fan_speed
        name: Target Fan Speed
        icon: mdi:fan-speed-3

      - type: tile
        entity: binary_sensor.vmc_primo_piano_alarm
        name: Alarm Status
        icon: mdi:alarm-light

      # Air Quality Sensors
      - type: tile
        entity: sensor.max_co_primo_piano
        name: Max CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: sensor.max_iaq_primo_piano
        name: Max IAQ
        icon: mdi:air-filter

      - type: tile
        entity: sensor.first_floor_max_humidity
        name: Max Humidity
        icon: mdi:water-percent

      # Demand Sensors
      - type: tile
        entity: sensor.co2_demand
        name: CO₂ Demand
        icon: mdi:gauge

      - type: tile
        entity: sensor.iaq_demand
        name: IAQ Demand
        icon: mdi:gauge

      - type: tile
        entity: sensor.humidity_demand
        name: Humidity Demand
        icon: mdi:gauge

  # ===========================================================================
  # Room Navigation
  # ===========================================================================
  - type: grid
    title: Bedrooms (Camere)
    columns: 4
    cards:
      - type: button
        name: Camera Nord
        icon: mdi:bed
        tap_action:
          action: navigate
          navigation_path: /lovelace/camera-nord
        entity: climate.pid_radiant_camera_nord
        show_state: true

      - type: button
        name: Camera Sud
        icon: mdi:bed
        tap_action:
          action: navigate
          navigation_path: /lovelace/camera-sud
        entity: climate.pid_radiant_camera_sud
        show_state: true

      - type: button
        name: Camera Ospiti
        icon: mdi:bed
        tap_action:
          action: navigate
          navigation_path: /lovelace/camera-ospiti
        entity: climate.pid_radiant_camera_ospiti
        show_state: true

      - type: button
        name: Camera Padronale
        icon: mdi:bed-king
        tap_action:
          action: navigate
          navigation_path: /lovelace/camera-padronale
        entity: climate.pid_radiant_camera_padronale
        show_state: true

  - type: grid
    title: Bathrooms & Utility
    columns: 4
    cards:
      - type: button
        name: Bagno Grande
        icon: mdi:toilet
        tap_action:
          action: navigate
          navigation_path: /lovelace/bagno-grande
        entity: climate.pid_radiant_bagno_grande
        show_state: true

      - type: button
        name: Bagno Ospiti
        icon: mdi:toilet
        tap_action:
          action: navigate
          navigation_path: /lovelace/bagno-ospiti
        entity: climate.pid_radiant_bagno_ospiti
        show_state: true

      - type: button
        name: Bagno Padronale
        icon: mdi:toilet
        tap_action:
          action: navigate
          navigation_path: /lovelace/bagno-padronale
        entity: climate.pid_radiant_bagno_padronale
        show_state: true

      - type: button
        name: Lavanderia
        icon: mdi:washing-machine
        tap_action:
          action: navigate
          navigation_path: /lovelace/lavanderia
        entity: climate.pid_radiant_lavanderia
        show_state: true

  # ===========================================================================
  # Room Status Grid - Bedrooms
  # ===========================================================================
  - type: grid
    title: Bedrooms - Quick Status
    columns: 4
    cards:
      # Camera Nord
      - type: tile
        entity: sensor.camera_nord_room_temp_abstracted
        name: Nord Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.camera_nord_room_humidity_abstracted
        name: Nord Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.camera_nord_co2
        name: Nord CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_camera_nord_is_active
        name: Radiant
        icon: mdi:radiator

      # Camera Sud
      - type: tile
        entity: sensor.camera_sud_room_temp_abstracted
        name: Sud Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.camera_sud_room_humidity_abstracted
        name: Sud Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.camera_sud_co2
        name: Sud CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_camera_sud_is_active
        name: Radiant
        icon: mdi:radiator

      # Camera Ospiti
      - type: tile
        entity: sensor.camera_ospiti_room_temp_abstracted
        name: Ospiti Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.camera_ospiti_room_humidity_abstracted
        name: Ospiti Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.camera_ospiti_co2
        name: Ospiti CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_camera_ospiti_is_active
        name: Radiant
        icon: mdi:radiator

      # Camera Padronale
      - type: tile
        entity: sensor.camera_padronale_room_temp_abstracted
        name: Padronale Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.camera_padronale_room_humidity_abstracted
        name: Padronale Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.camera_padronale_co2
        name: Padronale CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_camera_padronale_is_active
        name: Radiant
        icon: mdi:radiator

  # ===========================================================================
  # Room Status Grid - Bathrooms & Utility
  # ===========================================================================
  - type: grid
    title: Bathrooms & Utility - Quick Status
    columns: 4
    cards:
      # Bagno Grande
      - type: tile
        entity: sensor.bagno_grande_room_temp_abstracted
        name: Bagno Grande Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.bagno_grande_room_humidity_abstracted
        name: Bagno Grande Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.bagno_grande_co2
        name: Bagno Grande CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_bagno_grande_is_active
        name: Radiant
        icon: mdi:radiator

      # Bagno Ospiti
      - type: tile
        entity: sensor.bagno_ospiti_room_temp_abstracted
        name: Bagno Ospiti Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.bagno_ospiti_room_humidity_abstracted
        name: Bagno Ospiti Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.bagno_ospiti_co2
        name: Bagno Ospiti CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_bagno_ospiti_is_active
        name: Radiant
        icon: mdi:radiator

      # Bagno Padronale
      - type: tile
        entity: sensor.bagno_padronale_room_temp_abstracted
        name: Bagno Padronale Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.bagno_padronale_room_humidity_abstracted
        name: Bagno Padronale Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.bagno_padronale_co2
        name: Bagno Padronale CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_bagno_padronale_is_active
        name: Radiant
        icon: mdi:radiator

      # Lavanderia
      - type: tile
        entity: sensor.lavanderia_room_temp_abstracted
        name: Lavanderia Temp
        icon: mdi:thermometer

      - type: tile
        entity: sensor.lavanderia_room_humidity_abstracted
        name: Lavanderia Humidity
        icon: mdi:water-percent

      - type: tile
        entity: sensor.lavanderia_co2
        name: Lavanderia CO₂
        icon: mdi:molecule-co2

      - type: tile
        entity: binary_sensor.pid_radiant_lavanderia_is_active
        name: Radiant
        icon: mdi:radiator
