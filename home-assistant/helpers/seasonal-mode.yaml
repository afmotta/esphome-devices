# Seasonal Mode Helpers (Epic 17)
# Input Helpers for Three-Tier Seasonal Mode Selection
#
# PURPOSE: Configuration entities for HP mode and weather thresholds
# INSTALLATION:
#   1. Copy to configuration.yaml or create as package
#   2. Restart Home Assistant
#   3. Configure via Settings > Devices & Services > Helpers
#
# NOTE: MVP implementation moved core mode tracking to ESPHome
# These helpers are for HA-based orchestration and threshold configuration
#
# VERSION: 1.0
# DATE: January 22, 2026
# SOURCE: Epic 17 Brief

# ==============================================================================
# INPUT SELECTS - Mode State Tracking
# ==============================================================================

input_select:
  # Heat Pump Mode (for HA-based orchestration)
  hp_mode:
    name: "Heat Pump Mode"
    options:
      - "HEAT"
      - "COOL"
      - "SANITARY_ONLY"
    icon: mdi:heat-pump
    initial: "SANITARY_ONLY"

  # Mode Reason (tracks why current mode was selected)
  hp_mode_reason:
    name: "Heat Pump Mode Reason"
    options:
      - "CALENDAR_LOCK"
      - "DEMAND"
      - "MANUAL"
    icon: mdi:information-outline
    initial: "CALENDAR_LOCK"

# ==============================================================================
# INPUT NUMBERS - Weather Thresholds (Story 17.6)
# Configurable temperature thresholds for forecast guidance
# ==============================================================================

input_number:
  # Cooling Threshold: When forecast high reaches this temp, suggest COOL mode
  hp_cooling_threshold:
    name: "HP Cooling Threshold"
    min: 20
    max: 35
    step: 0.5
    unit_of_measurement: "C"
    icon: mdi:thermometer-high
    initial: 26
    mode: slider

  # Heating Threshold: When forecast high drops below this, suggest HEAT mode
  hp_heating_threshold:
    name: "HP Heating Threshold"
    min: 5
    max: 20
    step: 0.5
    unit_of_measurement: "C"
    icon: mdi:thermometer-low
    initial: 14
    mode: slider

# ==============================================================================
# NOTES
# ==============================================================================
#
# Mode Values:
#   - HEAT: Heat pump in heating mode (radiant + fancoils heat)
#   - COOL: Heat pump in cooling mode (radiant + fancoils cool)
#   - SANITARY_ONLY: Only domestic hot water, no climate
#
# Reason Values:
#   - CALENDAR_LOCK: Mode set by calendar gate (highest priority)
#   - DEMAND: Mode set by PID demand during shoulder season
#   - MANUAL: Mode manually overridden by user
#
# Threshold Tuning:
#   - Default cooling threshold: 26C (Milan climate)
#   - Default heating threshold: 14C (Milan climate)
#   - Dead band (15-25C): Suggests SANITARY_ONLY
#   - Adjust based on local climate and comfort preferences
#
# ESPHome vs HA:
#   - Primary mode tracking: ESPHome (select.climate_control_heat_pump_mode)
#   - HA helpers: For HA-based automations or as fallback
#   - Keep synchronized if using both
#
# Related Files:
#   - templates/seasonal-mode.yaml: Template sensors
#   - automations/seasonal-mode.yaml: Calendar gate automations
#   - components/seasonal_mode.yaml: ESPHome implementation
