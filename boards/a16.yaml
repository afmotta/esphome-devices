    name: "1-Wire Bus 01"
    pin:
      number: GPIO32
      inverted: true

  - platform: gpio
    name: "1-Wire Bus 02"
    pin:
      number: GPIO33
      inverted: true

  - platform: gpio
    name: "1-Wire Bus 03"
    pin:
      number: GPIO14
      inverted: true

