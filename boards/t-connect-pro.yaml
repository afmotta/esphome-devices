substitutions:
  wifi_package: !include t-connect-pro-wifi.yaml
  ethernet_package: !include t-connect-pro-ethernet.yaml
  enable_ethernet: true # Set to "false" to disable Ethernet and enable WiFi
  logger_level: INFO
  # "true" only when the onboard display shares the W5500's SPI pads
  # (boards/t-connect-pro-display.yaml); the touchscreen build sets it. Marking
  # the ethernet SPI pins allow_other_uses is invalid unless the display bus
  # actually co-claims them, so this stays "false" for screen-less builds.
  shared_spi_pins: "false"

packages:
  network_package: ${ethernet_package if enable_ethernet else wifi_package}

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # 2026.7.0, not the repo-wide 2026.3.0 floor: the only version actually
  # verified end-to-end for the T-Connect Pro HVAC/gateway paths, including
  # the sntp/ds2484 platforms this board's first consumer adds and the
  # 2026.7.0 modbus client/server hub overhaul (explicit timing pinned in
  # the entry points).
  min_version: 2026.7.0
  comment: "LilyGO T-Connect Pro"

# LilyGO T-Connect Pro uses ESP32-S3-R8 (WROOM module)
# -> 16 MB flash
# -> 8 MB octal PSRAM
#
# Also present but unclaimed by this board file (AD-4: entry-point
# composition, not board concerns): onboard TWAI CAN transceiver on
# TX=IO6/RX=IO7 (would be canbus's health.yaml if this board were ever
# composed into a CAN-consuming entry point; unconsumed by hvac today).
esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:
  level: ${logger_level}

# Enable Home Assistant API
api:
  encryption:
    key: ${encryption_key}

# Allow Over-The-Air updates
ota:
  - platform: esphome
    password: ${ota_password}

# I2C bus — SDA=IO39/SCL=IO40, shared by every T-Connect Pro (onboard touch
# controller plus any entry-point-added devices, e.g. hvac's DS2484 1-Wire
# bridge). Bus only; no devices declared here — device-specific I2C
# peripherals are entry-point composition (AD-4), not board-file concerns.
i2c:
  - id: i2cbus
    sda: GPIO39
    scl: GPIO40
    scan: false
    frequency: 100kHz

# RS485 / Modbus — same physical pins as the previous waveshare-s3 board
uart:
  - id: modbus_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 38400
    stop_bits: 1 #default to 8E1
    data_bits: 8 #default to 8E1
    parity: EVEN #default to 8E1

binary_sensor:
  - platform: status
    name: "Status"

  - platform: gpio
    name: "Boot Button"
    pin:
      number: 0
      ignore_strapping_warning: true
      mode:
        input: true
      inverted: true
    disabled_by_default: true
    on_press:
      then:
        - button.press: restart_button

# Virtual buttons
button:
  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: reset
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config
