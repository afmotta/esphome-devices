                          - button: {id: relay_cell_22, width: 54, height: 32, widgets: [{label: {text: "22", align: CENTER}}], on_click: [{switch.toggle: relay_22}]}
                          - button: {id: relay_cell_23, width: 54, height: 32, widgets: [{label: {text: "23", align: CENTER}}], on_click: [{switch.toggle: relay_23}]}
                          - button: {id: relay_cell_24, width: 54, height: 32, widgets: [{label: {text: "24", align: CENTER}}], on_click: [{switch.toggle: relay_24}]}
                          - button: {id: relay_cell_25, width: 54, height: 32, widgets: [{label: {text: "25", align: CENTER}}], on_click: [{switch.toggle: relay_25}]}
                          - button: {id: relay_cell_26, width: 54, height: 32, widgets: [{label: {text: "26", align: CENTER}}], on_click: [{switch.toggle: relay_26}]}
                          - button: {id: relay_cell_27, width: 54, height: 32, widgets: [{label: {text: "27", align: CENTER}}], on_click: [{switch.toggle: relay_27}]}
                          - button: {id: relay_cell_28, width: 54, height: 32, widgets: [{label: {text: "28", align: CENTER}}], on_click: [{switch.toggle: relay_28}]}
                          - button: {id: relay_cell_29, width: 54, height: 32, widgets: [{label: {text: "29", align: CENTER}}], on_click: [{switch.toggle: relay_29}]}
                          - button: {id: relay_cell_30, width: 54, height: 32, widgets: [{label: {text: "30", align: CENTER}}], on_click: [{switch.toggle: relay_30}]}
                          - button: {id: relay_cell_31, width: 54, height: 32, widgets: [{label: {text: "31", align: CENTER}}], on_click: [{switch.toggle: relay_31}]}
                    - button:
                        id: btn_all_off
                        width: 100%
                        height: 26
                        bg_color: 0x4A4A4A
                        widgets:
                          - label:
                              align: CENTER
                              text: "ALL OFF"
                        on_click:
                          - lambda: |-
                              id(relay_0).turn_off();  id(relay_1).turn_off();  id(relay_2).turn_off();  id(relay_3).turn_off();
                              id(relay_4).turn_off();  id(relay_5).turn_off();  id(relay_6).turn_off();  id(relay_7).turn_off();
                              id(relay_8).turn_off();  id(relay_9).turn_off();  id(relay_10).turn_off(); id(relay_11).turn_off();
                              id(relay_12).turn_off(); id(relay_13).turn_off(); id(relay_14).turn_off(); id(relay_15).turn_off();
                              id(relay_16).turn_off(); id(relay_17).turn_off(); id(relay_18).turn_off(); id(relay_19).turn_off();
                              id(relay_20).turn_off(); id(relay_21).turn_off(); id(relay_22).turn_off(); id(relay_23).turn_off();
                              id(relay_24).turn_off(); id(relay_25).turn_off(); id(relay_26).turn_off(); id(relay_27).turn_off();
                              id(relay_28).turn_off(); id(relay_29).turn_off(); id(relay_30).turn_off(); id(relay_31).turn_off();
          # ------------------------------------------------------------- Buttons
          - name: "Buttons"
            id: tab_buttons
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 4
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label:
                        id: ui_btn_hint
                        text_color: 0x9AA0A6
                        text: "Press a wall button to commission it:"
                    - label:
                        id: ui_btn_feed
                        text: "No button events yet"

# -----------------------------------------------------------------------------
# Refresh: rebuild every widget from current state on a 2 s cadence.
# -----------------------------------------------------------------------------
script:
  - id: refresh_light_ui
    then:
      # ---- Status ----
      - lvgl.label.update:
          id: ui_ha_ready
          text: !lambda 'return std::string("HA Ready: ") + (id(ha_ready_sensor).state ? "YES" : "NO");'
          text_color: !lambda 'return id(ha_ready_sensor).state ? lv_color_hex(0x2FBF71) : lv_color_hex(0xE05555);'
      - lvgl.label.update:
          id: ui_fallback
          text: !lambda |-
            char b[40];
            snprintf(b, sizeof(b), "Fallback events: %u", (unsigned) id(fallback_events));
            return std::string(b);
      - lvgl.label.update:
          id: ui_manifest
          text: !lambda |-
            std::string h = id(binding_manifest_hash).state;
            if (h.size() > 8) h = h.substr(0, 8);
            return std::string("Manifest: ") + (h.empty() ? "--" : h);
      - lvgl.label.update:
          id: ui_last_btn
          text: !lambda 'return light_ui::fmt_button_short(id(g_btn_seen), node_map_name(id(g_btn_node)), id(g_btn_index), id(g_btn_event_str));'
      # ---- Buttons feed ----
      - lvgl.label.update:
          id: ui_btn_feed
          text: !lambda |-
            uint32_t age = id(g_btn_seen) ? (millis() - id(g_btn_ms)) / 1000 : 0;
            return light_ui::fmt_button(id(g_btn_seen), node_map_name(id(g_btn_node)),
                                        id(g_btn_index), id(g_btn_event_str), age);
      # ---- Relay grid (colour each cell by its coil state) ----
      - lvgl.widget.update: {id: relay_cell_0,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_0).state));'}
      - lvgl.widget.update: {id: relay_cell_1,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_1).state));'}
      - lvgl.widget.update: {id: relay_cell_2,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_2).state));'}
      - lvgl.widget.update: {id: relay_cell_3,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_3).state));'}
      - lvgl.widget.update: {id: relay_cell_4,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_4).state));'}
      - lvgl.widget.update: {id: relay_cell_5,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_5).state));'}
      - lvgl.widget.update: {id: relay_cell_6,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_6).state));'}
      - lvgl.widget.update: {id: relay_cell_7,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_7).state));'}
      - lvgl.widget.update: {id: relay_cell_8,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_8).state));'}
      - lvgl.widget.update: {id: relay_cell_9,  bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_9).state));'}
      - lvgl.widget.update: {id: relay_cell_10, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_10).state));'}
      - lvgl.widget.update: {id: relay_cell_11, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_11).state));'}
      - lvgl.widget.update: {id: relay_cell_12, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_12).state));'}
      - lvgl.widget.update: {id: relay_cell_13, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_13).state));'}
      - lvgl.widget.update: {id: relay_cell_14, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_14).state));'}
      - lvgl.widget.update: {id: relay_cell_15, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_15).state));'}
      - lvgl.widget.update: {id: relay_cell_16, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_16).state));'}
      - lvgl.widget.update: {id: relay_cell_17, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_17).state));'}
      - lvgl.widget.update: {id: relay_cell_18, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_18).state));'}
