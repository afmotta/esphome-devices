      - lvgl.widget.update: {id: relay_cell_29, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_29).state));'}
      - lvgl.widget.update: {id: relay_cell_30, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_30).state));'}
      - lvgl.widget.update: {id: relay_cell_31, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_31).state));'}

interval:
  - interval: 2s
    then:
      - script.execute: refresh_light_ui
