# =============================================================================
# Lighting controller — on-device LVGL commissioning/diagnostics UI
# (T-Connect Pro touchscreen)
# =============================================================================
# Composed alongside boards/t-connect-pro-display.yaml (which declares the shared
# `panel_display` / `panel_touch` hardware) by the opt-in touchscreen wrapper
# devices/light-controller-touch.yaml (which sets shared_spi_pins: "true").
# The plain devices/light-controller.yaml build (no screen) is unaffected.
#
# Layout: a 3-tab tabview on the 480x222 landscape panel.
#   Status  — HA authority (ha_ready), fallback-event counter, manifest hash,
#             and a one-line last-button summary
#   Relays  — 32-cell grid of relay_0..relay_31; tap a cell to toggle that coil
#             (commissioning: pulse a relay to learn which circuit it drives),
#             plus an ALL OFF reset
#   Buttons — live last-button feed (node name + button + gesture + age),
#             fed by this package's own capture-only can0 tap below
#
# Monitoring is the point, so values are read-only and rebuilt by a single 2 s
# `interval:` script (matches the relay Modbus poll cadence). The only writes are
# the relay-cell taps and ALL OFF. All bound ids come from packages already in
# devices/light-controller.yaml:
#   binary_sensor.ha_ready_sensor, sensor.fallback_events_sensor +
#     global fallback_events, text_sensor.binding_manifest_hash (buttons.yaml)
#   switch.relay_0 .. relay_31 (relay_bank.yaml)
# Button decode + node_map_name() come from the canbus headers the entry point
# already includes (canbus_protocol.h / node_map.h).
# =============================================================================

# Button/relay formatter (light_ui::*). Path is relative to the CLI-invoked
# file's dir (devices/…), matching light-controller.yaml's own includes.
esphome:
  includes:
    - ../lighting/packages/ui/touch_ui_format.h

# Capture-only tap into can0 for the last-button feed. buttons.yaml owns the real
# CAT_INPUT decode/forward/fallback; this second on_frame only records the most
# recent press for display (leaves buttons.yaml untouched). Guard in the
# `condition:` so the action lambda stays a clean record-only write.
canbus:
  - id: !extend can0
    on_frame:
      - can_id: 0x02000000        # CAT_INPUT << CAT_SHIFT
        can_id_mask: 0x1E000000   # CAN_MASK_CATEGORY (category bits only)
        use_extended_id: true
        then:
          - if:
              condition:
                lambda: 'if (x.size() < BUTTON_PAYLOAD_MIN) return false; return x[0] == PROTO_V1 && payload_type(x) == MSG_BUTTON_EVENT;'
              then:
                - lambda: |-
                    id(g_btn_node) = can_id_node(can_id);
                    id(g_btn_index) = payload_button_index(x);
                    id(g_btn_event_str) = event_type_str(payload_event_type(x));
                    id(g_btn_ms) = millis();
                    id(g_btn_seen) = true;

# Last-button feed state (display-only; distinct from buttons.yaml's arbitration globals).
globals:
  - id: g_btn_seen
    type: bool
    initial_value: 'false'
  - id: g_btn_node
    type: uint32_t
    initial_value: '0'
  - id: g_btn_index
    type: uint32_t
    initial_value: '0'
  - id: g_btn_event_str
    type: std::string
    initial_value: '""'
  - id: g_btn_ms
    type: uint32_t
    initial_value: '0'

lvgl:
  displays: [panel_display]
  touchscreens: [panel_touch]
  buffer_size: 25%
  bg_color: 0x101418
  text_color: 0xEAEAEA
  widgets:
    - tabview:
        id: main_tabs
        position: top
        size: 26
        tabs:
          # -------------------------------------------------------------- Status
          - name: "Status"
            id: tab_status
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 4
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - label:
                        id: ui_ha_ready
                        text: "HA Ready: --"
                    - label:
                        id: ui_fallback
                        text: "Fallback events: --"
                    - label:
                        id: ui_manifest
                        text_color: 0x9AA0A6
                        text: "Manifest: --"
                    - label:
                        id: ui_last_btn
                        text_color: 0x9AA0A6
                        text: "Last button: --"
          # -------------------------------------------------------------- Relays
          - name: "Relays"
            id: tab_relays
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  pad_all: 2
                  border_width: 0
                  bg_opa: TRANSP
                  layout:
                    type: flex
                    flex_flow: COLUMN
                  widgets:
                    - obj:
                        width: 100%
                        flex_grow: 1
                        pad_all: 2
                        border_width: 0
                        bg_opa: TRANSP
                        layout:
                          type: flex
                          flex_flow: ROW_WRAP
                        widgets:
                          - button: {id: relay_cell_0,  width: 54, height: 32, widgets: [{label: {text: "00", align: CENTER}}], on_click: [{switch.toggle: relay_0}]}
                          - button: {id: relay_cell_1,  width: 54, height: 32, widgets: [{label: {text: "01", align: CENTER}}], on_click: [{switch.toggle: relay_1}]}
                          - button: {id: relay_cell_2,  width: 54, height: 32, widgets: [{label: {text: "02", align: CENTER}}], on_click: [{switch.toggle: relay_2}]}
                          - button: {id: relay_cell_3,  width: 54, height: 32, widgets: [{label: {text: "03", align: CENTER}}], on_click: [{switch.toggle: relay_3}]}
                          - button: {id: relay_cell_4,  width: 54, height: 32, widgets: [{label: {text: "04", align: CENTER}}], on_click: [{switch.toggle: relay_4}]}
                          - button: {id: relay_cell_5,  width: 54, height: 32, widgets: [{label: {text: "05", align: CENTER}}], on_click: [{switch.toggle: relay_5}]}
                          - button: {id: relay_cell_6,  width: 54, height: 32, widgets: [{label: {text: "06", align: CENTER}}], on_click: [{switch.toggle: relay_6}]}
                          - button: {id: relay_cell_7,  width: 54, height: 32, widgets: [{label: {text: "07", align: CENTER}}], on_click: [{switch.toggle: relay_7}]}
                          - button: {id: relay_cell_8,  width: 54, height: 32, widgets: [{label: {text: "08", align: CENTER}}], on_click: [{switch.toggle: relay_8}]}
                          - button: {id: relay_cell_9,  width: 54, height: 32, widgets: [{label: {text: "09", align: CENTER}}], on_click: [{switch.toggle: relay_9}]}
                          - button: {id: relay_cell_10, width: 54, height: 32, widgets: [{label: {text: "10", align: CENTER}}], on_click: [{switch.toggle: relay_10}]}
                          - button: {id: relay_cell_11, width: 54, height: 32, widgets: [{label: {text: "11", align: CENTER}}], on_click: [{switch.toggle: relay_11}]}
                          - button: {id: relay_cell_12, width: 54, height: 32, widgets: [{label: {text: "12", align: CENTER}}], on_click: [{switch.toggle: relay_12}]}
                          - button: {id: relay_cell_13, width: 54, height: 32, widgets: [{label: {text: "13", align: CENTER}}], on_click: [{switch.toggle: relay_13}]}
                          - button: {id: relay_cell_14, width: 54, height: 32, widgets: [{label: {text: "14", align: CENTER}}], on_click: [{switch.toggle: relay_14}]}
                          - button: {id: relay_cell_15, width: 54, height: 32, widgets: [{label: {text: "15", align: CENTER}}], on_click: [{switch.toggle: relay_15}]}
                          - button: {id: relay_cell_16, width: 54, height: 32, widgets: [{label: {text: "16", align: CENTER}}], on_click: [{switch.toggle: relay_16}]}
                          - button: {id: relay_cell_17, width: 54, height: 32, widgets: [{label: {text: "17", align: CENTER}}], on_click: [{switch.toggle: relay_17}]}
