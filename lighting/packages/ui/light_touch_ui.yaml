      - lvgl.widget.update: {id: relay_cell_22, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_22).state));'}
      - lvgl.widget.update: {id: relay_cell_23, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_23).state));'}
      - lvgl.widget.update: {id: relay_cell_24, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_24).state));'}
      - lvgl.widget.update: {id: relay_cell_25, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_25).state));'}
      - lvgl.widget.update: {id: relay_cell_26, bg_color: !lambda 'return lv_color_hex(light_ui::relay_rgb(id(relay_26).state));'}
