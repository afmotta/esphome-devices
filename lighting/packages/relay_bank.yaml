# =============================================================================
# relay_bank.yaml — lighting's 32-channel relay bank (Waveshare Relay 32CH)
# =============================================================================
# Lighting-owned composition of the gateway's relay bank (ADR-0014 §2/§3):
# one modbus_controller plus 32 self-registering channels
# (relay_channel.yaml), 0-based relay_0..relay_31 per ADR-0013's progressive-
# id convention — numbering is native here, so no id_offset arithmetic is
# needed (that var existed for vesta's generic, 1-based-natural aggregator).
# The per-channel wrapper both creates the switch (via vesta's shared
# modbus_relay_switch.yaml hardware driver) and registers it into
# relay_store() for the fallback path, so the channel list below is the ONLY
# place the bank's composition lives.
#
# Channel count must stay in sync with MAX_RELAYS
# (lighting/protocol/binding_actuation.h) and MAX_RELAY_ID
# (canbus/tools/bindings.py) — a second bank (ADR-0014 open item 2) bumps
# all three in one commit.
#
# No connectivity status sensor — same reasoning as vesta's
# modbus_relay_board_32ch.yaml: this board has no documented register outside
# its 32 relay coils, so any "connectivity" poll would alias a relay's own
# state. Communication failures surface per-switch (unavailable on timeout).
#
# Required vars:
#   controller_id      - unique ID for this modbus_controller
#   modbus_address     - Modbus slave address (0x2 per ADR-0014 §4, mirrored
#                        with hvac's bank so a spare swaps into either system)
#   modbus_bus_id      - ID of the modbus bus (e.g. "rs485_bus")
#
# Optional vars:
#   update_interval    - polling interval (default: 5s)
#
# Requires from the composing entry point:
#   esphome.includes: relay_store.h (and its dependencies) — see
#   relay_channel.yaml
#
# Exposes:
#   switch.relay_0 .. switch.relay_31 (non-internal, HA-controllable), each
#   registered into relay_store() at boot
# =============================================================================

defaults:
  update_interval: 5s

modbus_controller:
  - id: ${controller_id}
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}

packages:
  relay_0: !include
    file: relay_channel.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 0
      register_address: 0x0000
