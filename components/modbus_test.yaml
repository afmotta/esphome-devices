# Component: modbus_test.yaml
# Purpose: Test Modbus communication by reading test register from slave
# Required vars: None
# Feature flag: use_modbus (substitution) - must be "true" to function
# Dependency: Requires modbus_master component to be included

# Modbus controller reference to slave device (address 0x2)
modbus_controller:
  - id: modbus_slave_ground
    address: 0x2
    modbus_id: rs485_bus
    command_throttle: 200ms
    update_interval: 10s

# Sensor to read test register from slave
sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_slave_ground
    name: "Slave Test Register Value"
    id: slave_test_register_value
    address: 0x0001
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    unit_of_measurement: ""
    lambda: |-
      std::string flag = "${use_modbus}";
      if (flag == "false") {
        return NAN;
      }
      return x;
    filters:
      - timeout: 30s
