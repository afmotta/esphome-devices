# MEV Component - Mechanical Extract Ventilation Control
#
# Exposes MEV hardware controls as Home Assistant entities following Epic 5 pattern:
# - Board exposes control entities only
# - No on-board logic or sensors
# - HA orchestrates all automation
#
# Hardware Interface:
# - 4 relay switches (power, mode, dehumidifier, cooling)
# - 1 DAC output for 0-10V fan speed control (uses existing DAC from board config)
# - 1 binary sensor for alarm monitoring (uses existing input from board config)
#
# Sensors:
# - Humidity rate calculation (rolling window, %/min)
#
# Required vars:
#   mev_slug: Device slug for entity IDs (e.g., "first_floor_mev")
#   mev_name: Friendly name prefix (e.g., "VMC Primo Piano")
#   power_relay: Relay ID for main power (e.g., relay_1)
#   mode_relay: Relay ID for winter/summer mode (e.g., relay_2)
#   dehumidifier_relay: Relay ID for dehumidifier (e.g., relay_3)
#   cooling_relay: Relay ID for cooling integration (e.g., relay_4)
#   fan_speed_output: DAC output ID from board config (e.g., dac_1)
#   alarm_input: Binary sensor input ID from board config (e.g., input_1)
#   humidity_sensor: Sensor ID for humidity input

packages:
  co2_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      demand_slug: co2
      demand_name: CO2
      unit_of_measurement: ppm
      source_sensor_id: first_floor_max_co2
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "0.05"
      icon: mdi:molecule-co2

  iaq_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      demand_slug: iaq
      demand_name: IAQ
      unit_of_measurement: IAQ
      source_sensor_id: first_floor_max_iaq
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "2.0"
      icon: mdi:air-filter

  humidity_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      demand_slug: humidity
      demand_name: Humidity
      source_sensor_id: ${humidity_sensor}
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "20.0"
      icon: mdi:water-percent

# Sensor imports and calculations
sensor:
  # Import configuration from HA (Settings -> Helpers) - Story 16.5
  - platform: homeassistant
    entity_id: input_number.mev_escalation_fan_threshold
    id: ${mev_slug}_escalation_threshold
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_deescalation_fan_threshold
    id: ${mev_slug}_deescalation_threshold
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_minimum_fan_speed
    id: ${mev_slug}_min_fan_speed
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_escalation_delay_minutes
    id: ${mev_slug}_escalation_delay
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_deescalation_delay_minutes
    id: ${mev_slug}_deescalation_delay
    internal: true

  # MEV Final Fan Speed (%) - Story 16.4
  - platform: template
    name: "${mev_name} Final Fan Speed"
    id: ${mev_slug}_final_fan_speed
    unit_of_measurement: "%"
    icon: mdi:fan-speed-3
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      if (id(${mev_slug}_alarm).state) {
        return 0.0f;
      }

      float co2 = id(${mev_slug}_co2_demand).state;
      float iaq = id(${mev_slug}_iaq_demand).state;
      float humidity = id(${mev_slug}_humidity_demand).state;
      float min_fan = id(${mev_slug}_min_fan_speed).state;

      // Fallback to min_fan if sensors are unavailable
      if (isnan(min_fan)) min_fan = 20.0f;
      float f_co2 = isnan(co2) ? min_fan : co2;
      float f_iaq = isnan(iaq) ? min_fan : iaq;
      float f_hum = isnan(humidity) ? min_fan : humidity;

      float final_speed = std::max({f_co2, f_iaq, f_hum, min_fan});

      // Update dominant demand diagnostics
      std::string dominant = "Minimum";
      if (final_speed > min_fan) {
        if (final_speed == f_co2) dominant = "CO2";
        else if (final_speed == f_iaq) dominant = "IAQ";
        else if (final_speed == f_hum) dominant = "Humidity";
      }
      id(${mev_slug}_dominant_demand).publish_state(dominant);

      return std::min(100.0f, final_speed);
    on_value:
      then:
        - number.set:
            id: ${mev_slug}_fan_speed
            value: !lambda "return x;"

# Diagnostic Sensors
text_sensor:
  - platform: template
    name: "${mev_name} Dominant Demand"
    id: ${mev_slug}_dominant_demand
    icon: mdi:arm-acoustic-guitar
    entity_category: diagnostic

  - platform: template
    name: "${mev_name} Automation State"
    id: ${mev_slug}_automation_state
    icon: mdi:robot-confused
    entity_category: diagnostic

# Humidity Cascade States - Story 16.4
select:
  - platform: template
    name: "${mev_name} Humidity State"
    id: ${mev_slug}_humidity_state
    options:
      - "Fan Only"
      - "Dehumidifying"
      - "Cooling"
    initial_option: "Fan Only"
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |-
          if (x == "Fan Only") {
            id(${mev_slug}_dehumidifier).turn_off();
            id(${mev_slug}_cooling).turn_off();
          } else if (x == "Dehumidifying") {
            id(${mev_slug}_dehumidifier).turn_on();
            id(${mev_slug}_cooling).turn_off();
          } else if (x == "Cooling") {
            id(${mev_slug}_dehumidifier).turn_on();
            id(${mev_slug}_cooling).turn_on();
          }

# Transition Logic - Story 16.4
interval:
  - interval: 1min
    then:
      - lambda: |-
          static int escalation_counter = 0;
          static int deescalation_counter = 0;

          float final_fan = id(${mev_slug}_final_fan_speed).state;
          float rate = id(${mev_slug}_humidity_rate).state;
          float humidity = id(${humidity_sensor}).state;
          auto current_state = id(${mev_slug}_humidity_state).current_option();

          float esc_thresh = id(${mev_slug}_escalation_threshold).state;
          float deesc_thresh = id(${mev_slug}_deescalation_threshold).state;
          float lower_bound = id(${mev_slug}_humidity_lower).state;
          float esc_delay = id(${mev_slug}_escalation_delay).state;
          float deesc_delay = id(${mev_slug}_deescalation_delay).state;

          if (isnan(final_fan) || isnan(rate) || isnan(humidity) || isnan(esc_thresh)) return;

          bool escalation_active = false;
          bool deescalation_active = false;
          std::string state_msg = "Idle";

          // Escalation
          if (current_state == "Fan Only") {
            if (final_fan >= esc_thresh && rate > 0.0f) {
              escalation_counter++;
              escalation_active = true;
              state_msg = "Escalating (Dehum)";
              if (escalation_counter >= (int)esc_delay) {
                id(${mev_slug}_humidity_state).make_call().set_option("Dehumidifying");
                escalation_counter = 0;
                deescalation_counter = 0;
                ESP_LOGI("mev", "Escalated to Dehumidifying");
              }
            }
          } else if (current_state == "Dehumidifying") {
            bool summer = id(summer_mode).state;
            state_msg = "Dehumidifying";
            if (summer && final_fan >= esc_thresh && rate > 0.0f) {
              escalation_counter++;
              escalation_active = true;
              state_msg = "Escalating (Cooling)";
              if (escalation_counter >= (int)esc_delay) {
                id(${mev_slug}_humidity_state).make_call().set_option("Cooling");
                escalation_counter = 0;
                deescalation_counter = 0;
                ESP_LOGI("mev", "Escalated to Cooling");
              }
            }
          }

          // De-escalation
          if (current_state == "Cooling") {
            state_msg = "Cooling";
            bool summer = id(summer_mode).state;
            if (!summer || (humidity < lower_bound && final_fan < deesc_thresh)) {
               deescalation_counter++;
               deescalation_active = true;
               state_msg = "De-escalating (Dehum)";
               if (deescalation_counter >= (int)deesc_delay) {
                 id(${mev_slug}_humidity_state).make_call().set_option("Dehumidifying");
                 escalation_counter = 0;
                 deescalation_counter = 0;
                 ESP_LOGI("mev", "De-escalated to Dehumidifying");
               }
            }
          } else if (current_state == "Dehumidifying") {
            if (!escalation_active && humidity < lower_bound && final_fan < deesc_thresh) {
               deescalation_counter++;
               deescalation_active = true;
               state_msg = "De-escalating (Fan)";
               if (deescalation_counter >= (int)deesc_delay) {
                 id(${mev_slug}_humidity_state).make_call().set_option("Fan Only");
                 escalation_counter = 0;
                 deescalation_counter = 0;
                 ESP_LOGI("mev", "De-escalated to Fan Only");
               }
            }
          }

          // Reset counters when direction changes or neither is active
          if (!escalation_active) {
            escalation_counter = 0;
          }
          if (!deescalation_active) {
            deescalation_counter = 0;
          }

          id(${mev_slug}_automation_state).publish_state(state_msg);

# Number entity for fan speed percentage control (0-100%)
# Maps to 0-10V DAC output (linear: 0%=0V, 100%=10V)
number:
  - platform: template
    name: "${mev_name} Fan Speed"
    id: ${mev_slug}_fan_speed
    icon: mdi:fan
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - output.set_level:
          id: ${fan_speed_output}
          level: !lambda "return x / 100.0;"

# Relay switches for MEV control
# Uses template switches to wrap PCF8574 relay entities with proper state tracking
switch:
  # Main power switch
  - platform: template
    name: "${mev_name} Power"
    id: ${mev_slug}_power
    icon: mdi:power
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${power_relay}
    turn_off_action:
      - switch.turn_off: ${power_relay}
    lambda: |-
      return id(${power_relay}).state;

  # Winter/Summer mode switch
  - platform: template
    name: "${mev_name} Mode"
    id: ${mev_slug}_mode
    icon: mdi:thermometer
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${mode_relay}
    turn_off_action:
      - switch.turn_off: ${mode_relay}
    lambda: |-
      return id(${mode_relay}).state;

  # Dehumidifier switch
  - platform: template
    name: "${mev_name} Dehumidifier"
    id: ${mev_slug}_dehumidifier
    icon: mdi:water-percent
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${dehumidifier_relay}
    turn_off_action:
      - switch.turn_off: ${dehumidifier_relay}
    lambda: |-
      return id(${dehumidifier_relay}).state;

  # Cooling integration switch
  - platform: template
    name: "${mev_name} Cooling"
    id: ${mev_slug}_cooling
    icon: mdi:snowflake
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${cooling_relay}
    turn_off_action:
      - switch.turn_off: ${cooling_relay}
    lambda: |-
      return id(${cooling_relay}).state;

# Binary sensor for alarm monitoring
# Wraps PCF8574 input with proper device class and friendly name
binary_sensor:
  - platform: template
    name: "${mev_name} Alarm"
    id: ${mev_slug}_alarm
    device_class: problem
    lambda: |-
      // Alarm input is inverted (closed circuit = ON)
      return id(${alarm_input}).state;
    on_press:
      then:
        - logger.log:
            level: ERROR
            format: "MEV ALARM DETECTED on %s"
            args: ['"${mev_name}"']
        - number.set:
            id: ${mev_slug}_fan_speed
            value: 0
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "MEV Alarm cleared on %s"
            args: ['"${mev_name}"']
