# MEV Component - Mechanical Extract Ventilation Control (Relay-based)
#
# Combines demand aggregation (mev_demand.yaml) with the Vesta MEV controller
# and relay-based hardware abstraction for MEV systems.
#
# Hardware Interface:
# - 4 relay switches (power, mode, dehumidifier, integration)
# - 1 DAC output for 0-10V fan speed control (uses existing DAC from board config)
# - 1 binary sensor for alarm monitoring (uses existing input from board config)
#
# Required vars:
#   mev_slug: Device slug for entity IDs (e.g., "first_floor_mev")
#   mev_name: Friendly name prefix (e.g., "VMC Primo Piano")
#   power_relay: Relay ID for main power (e.g., relay_1)
#   mode_relay: Relay ID for winter/summer mode (e.g., relay_2)
#   dehumidifier_relay: Relay ID for dehumidifier (e.g., relay_3)
#   integration_relay: Relay ID for integration (e.g., relay_4)
#   fan_speed_output: DAC output ID from board config (e.g., dac_1)
#   alarm_input: Binary sensor input ID from board config (e.g., input_1)
#   humidity_sensor: Sensor ID for humidity input

packages:
  # Demand sensors: CO2, IAQ, humidity proportional demands + MAX aggregation
  demand: !include
    file: mev_demand.yaml
    vars:
      mev_slug: ${mev_slug}
      mev_name: ${mev_name}
      co2_sensor: first_floor_max_co2
      iaq_sensor: first_floor_max_iaq
      humidity_sensor: ${humidity_sensor}

  # Vesta MEV controller: HA imports, final fan speed, humidity cascade state machine
  controller: !include
    file: ../vesta/packages/coordinators/mev_ventilation.yaml
    vars:
      component_id: ${mev_slug}
      component_name: ${mev_name}
      demand_sensor: ${mev_slug}_max_demand
      humidity_sensor: ${humidity_sensor}
      humidity_rate_sensor: ${mev_slug}_humidity_rate
      humidity_lower_sensor: ${mev_slug}_humidity_lower
      cooling_mode_sensor: summer_mode
      dehumidifier_switch: ${mev_slug}_dehumidifier
      integration_switch: ${mev_slug}_integration
      alarm_sensor: ${mev_slug}_alarm
      fan_speed_number: ${mev_slug}_fan_speed
      min_fan_speed_entity: "input_number.mev_minimum_fan_speed"
      escalation_threshold_entity: "input_number.mev_escalation_fan_threshold"
      deescalation_threshold_entity: "input_number.mev_deescalation_fan_threshold"
      escalation_delay_entity: "input_number.mev_escalation_delay_minutes"
      deescalation_delay_entity: "input_number.mev_deescalation_delay_minutes"

# Fan speed number entity (0-100%) → 0-10V DAC output
number:
  - platform: template
    name: "${mev_name} Fan Speed"
    id: ${mev_slug}_fan_speed
    icon: mdi:fan
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - output.set_level:
          id: ${fan_speed_output}
          level: !lambda "return x / 100.0;"

# Relay switches for MEV control
switch:
  - platform: template
    name: "${mev_name} Power"
    id: ${mev_slug}_power
    icon: mdi:power
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${power_relay}
    turn_off_action:
      - switch.turn_off: ${power_relay}
    lambda: |-
      return id(${power_relay}).state;

  - platform: template
    name: "${mev_name} Mode"
    id: ${mev_slug}_mode
    icon: mdi:thermometer
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${mode_relay}
    turn_off_action:
      - switch.turn_off: ${mode_relay}
    lambda: |-
      return id(${mode_relay}).state;

  - platform: template
    name: "${mev_name} Dehumidifier"
    id: ${mev_slug}_dehumidifier
    icon: mdi:water-percent
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${dehumidifier_relay}
    turn_off_action:
      - switch.turn_off: ${dehumidifier_relay}
    lambda: |-
      return id(${dehumidifier_relay}).state;

  - platform: template
    name: "${mev_name} Integration"
    id: ${mev_slug}_integration
    icon: mdi:snowflake
    optimistic: false
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - switch.turn_on: ${integration_relay}
    turn_off_action:
      - switch.turn_off: ${integration_relay}
    lambda: |-
      return id(${integration_relay}).state;

# Alarm binary sensor (wraps PCF8574 input)
binary_sensor:
  - platform: template
    name: "${mev_name} Alarm"
    id: ${mev_slug}_alarm
    device_class: problem
    lambda: |-
      // Alarm input is inverted (closed circuit = ON)
      return id(${alarm_input}).state;
    on_press:
      then:
        - logger.log:
            level: ERROR
            format: "MEV ALARM DETECTED on %s"
            args: ['"${mev_name}"']
        - number.set:
            id: ${mev_slug}_fan_speed
            value: 0
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "MEV Alarm cleared on %s"
            args: ['"${mev_name}"']
