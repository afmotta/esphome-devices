packages:
  pid: !include
    file: pid.yaml
    vars:
      circuit_slug: "fancoil_${room_slug}"
      circuit_name: "Fancoil ${room_name}"
      sensor: ${temperature_sensor}
      kp: 0.2
      ki: 0.01
      kd: 0.05

climate:
  - id: !extend pid_fancoil_${room_slug}
    cool_output: ${output_id}
