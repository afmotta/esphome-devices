packages:
  modbus_output: !include
    file: ../components/modbus_0_10v_output.yaml
    vars:
      adapter_id: ${adapter_id}
      output_id: "fancoil_${area_slug}_output"
      register_address: ${register_address}
  pid_sensors: !include
    file: pid_sensors.yaml
    vars:
      pid_id: pid_fancoil_${area_slug}
      pid_name: "PID Fancoil ${area_name}"

climate:
  - platform: pid
    id: pid_fancoil_${area_slug}
    name: "PID Fancoil ${area_name}"
    sensor: ${sensor}
    default_target_temperature: 22
    control_parameters:
      kp: 0.2
      ki: 0.01
      kd: 0.05
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step: 0.5
    cool_output: fancoil_${area_slug}_output
    heat_output: fancoil_${area_slug}_output
    on_state:
      then:
        - script.execute: ${switch_management_script}
