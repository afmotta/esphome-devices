# ============================================================================
# Camera Sud Room Component - First Floor (Epic 8)
# ============================================================================
#
# Epic 8 unified architecture: Condition components + Room Control Coordinator
# Equipment: Radiant floor heating only
# Conditions: Emergency (sensor failure detection only)

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_sud"
      zone_name: "Camera Sud"
      ha_temperature_sensor_id: "sensor.room_camera_sud_temperature"

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "camera_sud"
      zone_name: "Camera Sud"
      ha_temperature_sensor_id: "sensor.room_camera_sud_temperature"
      priority: 1

  # Window condition stub (radiant-only room has no real window detection)
  window_condition_stub: !include
    file: ../../room_window_condition_stub.yaml
    vars:
      zone_slug: "camera_sud"

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "camera_sud"
      zone_name: "Camera Sud"
      pid_id: pid_radiant_camera_sud
      emergency_condition_priority_id: camera_sud_emergency_condition_priority
      emergency_condition_state_id: camera_sud_emergency_condition_state
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_camera_sud"
      circuit_name: "Radiant Camera Sud"
      output: slow_pwm_camera_sud
      sensor: camera_sud_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

# ============================================================================
# Output Configuration
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_camera_sud
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_03
      - switch.turn_on: relay_04
    turn_off_action:
      - switch.turn_off: relay_03
      - switch.turn_off: relay_04
