# ============================================================================
# Bagno Padronale
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: None
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno_padronale"
      zone_name: "Bagno Padronale"
      ha_temperature_sensor_id: "sensor.room_bagno_padronale_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_padronale_humidity"

  pid_radiant: !include
    file: ../../heat_only_radiant.yaml
    vars:
      zone_slug: "bagno_padronale"
      zone_name: "Bagno Padronale"
      relay_id: "relay_03"
      temperature_sensor: bagno_padronale_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
