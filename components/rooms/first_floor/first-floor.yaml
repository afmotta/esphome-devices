defaults:
  safe_margin: 1.0

packages:
  mixing_pump_primo_piano: !include
    file: ../../mixing_pump.yaml
    vars:
      area_slug: "first_floor_radiant"
      area_name: "Primo Piano"
      dallas_address: 0xe9000000b366ed28
      sensor_id: first_floor_any_zone_open
      relay_id: relay_3
      output_id: analog_output_2
  first_floor_mev: !include
    file: ../../mev.yaml
    vars:
      mev_slug: "first_floor_mev"
      mev_name: "VMC Primo Piano"
      power_relay: relay_18
      mode_relay: relay_19
      dehumidifier_relay: relay_20
      cooling_relay: relay_21
      fan_speed_output: analog_output_7
      alarm_input: di1
      humidity_sensor: first_floor_max_humidity
  bagno_grande: !include bagno_grande.yaml
  bagno_ospiti: !include bagno_ospiti.yaml
  bagno_padronale: !include bagno_padronale.yaml
  camera_nord: !include camera_nord.yaml
  camera_sud: !include camera_sud.yaml
  camera_ospiti: !include camera_ospiti.yaml
  camera_padronale: !include camera_padronale.yaml
  lavanderia: !include lavanderia.yaml

binary_sensor:
  - platform: template
    id: first_floor_any_zone_open
    name: "First Floor Zone Open"
    device_class: running
    icon: "mdi:pump"
    lambda: |-
      return id(pid_radiant_bagno_padronale_is_active)||
             id(pid_radiant_bagno_grande_is_active)||
             id(pid_radiant_bagno_ospiti_is_active)||
             id(pid_radiant_lavanderia_is_active)||
             id(pid_radiant_camera_nord_is_active)||
             id(pid_radiant_camera_sud_is_active)||
             id(pid_radiant_camera_padronale_is_active)||
             id(pid_radiant_camera_ospiti_is_active);

sensor:
  # ============================================================================
  # CO₂ Receivers (from room sensor ESP32s via UDP)
  # ============================================================================
  - platform: packet_transport
    id: bagno_grande_co2
    provider: room-sensor-bagno-grande
    internal: true

  - platform: packet_transport
    id: bagno_ospiti_co2
    provider: room-sensor-bagno-ospiti
    internal: true

  - platform: packet_transport
    id: bagno_padronale_co2
    provider: room-sensor-bagno-padronale
    internal: true

  - platform: packet_transport
    id: camera_nord_co2
    provider: room-sensor-camera-nord
    internal: true

  - platform: packet_transport
    id: camera_sud_co2
    provider: room-sensor-camera-sud
    internal: true

  - platform: packet_transport
    id: camera_ospiti_co2
    provider: room-sensor-camera-ospiti
    internal: true

  - platform: packet_transport
    id: camera_padronale_co2
    provider: room-sensor-camera-padronale
    internal: true

  - platform: packet_transport
    id: lavanderia_co2
    provider: room-sensor-lavanderia
    internal: true

  # ============================================================================
  # IAQ Receivers (from room sensor ESP32s via UDP)
  # ============================================================================
  - platform: packet_transport
    id: bagno_grande_iaq
    provider: room-sensor-bagno-grande
    internal: true

  - platform: packet_transport
    id: bagno_ospiti_iaq
    provider: room-sensor-bagno-ospiti
    internal: true

  - platform: packet_transport
    id: bagno_padronale_iaq
    provider: room-sensor-bagno-padronale
    internal: true

  - platform: packet_transport
    id: camera_nord_iaq
    provider: room-sensor-camera-nord
    internal: true

  - platform: packet_transport
    id: camera_sud_iaq
    provider: room-sensor-camera-sud
    internal: true

  - platform: packet_transport
    id: camera_ospiti_iaq
    provider: room-sensor-camera-ospiti
    internal: true

  - platform: packet_transport
    id: camera_padronale_iaq
    provider: room-sensor-camera-padronale
    internal: true

  - platform: packet_transport
    id: lavanderia_iaq
    provider: room-sensor-lavanderia
    internal: true

  # ============================================================================
  # Air Quality Aggregation (Max of all rooms)
  # ============================================================================
  - platform: combination
    id: first_floor_max_co2
    name: "Max CO₂ Primo Piano"
    type: max
    unit_of_measurement: "ppm"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    accuracy_decimals: 0
    sources:
      - source: bagno_grande_co2
      - source: bagno_ospiti_co2
      - source: bagno_padronale_co2
      - source: camera_nord_co2
      - source: camera_sud_co2
      - source: camera_ospiti_co2
      - source: camera_padronale_co2
      - source: lavanderia_co2

  - platform: combination
    id: first_floor_max_iaq
    name: "Max IAQ Primo Piano"
    type: max
    state_class: "measurement"
    accuracy_decimals: 0
    sources:
      - source: bagno_grande_iaq
      - source: bagno_ospiti_iaq
      - source: bagno_padronale_iaq
      - source: camera_nord_iaq
      - source: camera_sud_iaq
      - source: camera_ospiti_iaq
      - source: camera_padronale_iaq
      - source: lavanderia_iaq

  # Max Humidity for MEV Cascade Control
  - platform: combination
    id: first_floor_max_humidity
    name: "First Floor Max Humidity"
    type: max
    unit_of_measurement: "%"
    device_class: humidity
    state_class: "measurement"
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    sources:
      - source: bagno_grande_room_humidity_abstracted
      - source: bagno_ospiti_room_humidity_abstracted
      - source: bagno_padronale_room_humidity_abstracted
      - source: camera_nord_room_humidity_abstracted
      - source: camera_sud_room_humidity_abstracted
      - source: camera_ospiti_room_humidity_abstracted
      - source: camera_padronale_room_humidity_abstracted
      - source: lavanderia_room_humidity_abstracted

  # ============================================================================
  # Temperature/Humidity Infrastructure Sensors
  # ============================================================================

  # Effective safe margin with HA fallback
  # Uses HA input_number if available, otherwise fallback to default
  - platform: template
    id: effective_first_floor_safe_margin
    name: "Effective First Floor Safe Margin"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:shield-half-full"
    lambda: |-
      if (id(ha_first_floor_safe_margin).has_state() && !std::isnan(id(ha_first_floor_safe_margin).state)) {
        return id(ha_first_floor_safe_margin).state;
      }
      ESP_LOGW("safe_margin", "HA unavailable, using fallback: %.1f°C", ${safe_margin});
      return ${safe_margin};
    update_interval: 30s

  # Supply temperature minimum based on dew point protection
  # Shows the enforced minimum supply temperature (dew point + safety margin)
  - platform: template
    id: first_floor_supply_temp_minimum
    name: "First Floor Supply Temp Minimum"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:thermometer-water"
    lambda: |-
      float dew_point = id(first_floor_max_dew_point).state;
      float margin = id(effective_first_floor_safe_margin).state;
      if (std::isnan(dew_point) || std::isnan(margin)) return NAN;
      return dew_point + margin;
    update_interval: 30s

  - platform: combination
    id: first_floor_max_dew_point
    name: "Max Dew Point Primo piano"
    type: max
    unit_of_measurement: "°C"
    device_class: "temperature"
    state_class: "measurement"
    sources:
      - source: camera_ospiti_dew_point
      - source: camera_nord_dew_point
      - source: camera_padronale_dew_point
      - source: camera_sud_dew_point
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(summer_mode).state;"
            then:
              - climate.control:
                  id: pid_mixing_valve_first_floor_radiant
                  target_temperature: !lambda "return id(first_floor_supply_temp_minimum).state;"
              - logger.log:
                  format: "[First Floor Radiant] Dew point protection: supply temp min = %.1f°C"
                  args: ["id(first_floor_supply_temp_minimum).state"]

# HA sensors for safe margin (runtime configurable)
# Create input_number entity in HA: input_number.first_floor_safe_margin (range: 0.5-3.0, step: 0.1)
number:
  - platform: homeassistant
    id: ha_first_floor_safe_margin
    entity_id: input_number.first_floor_safe_margin
    internal: true
