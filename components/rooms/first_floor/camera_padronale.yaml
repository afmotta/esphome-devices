# ============================================================================
# Camera Padronale
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_padronale"
      zone_name: "Camera Padronale"
      ha_temperature_sensor_id: "sensor.room_camera_padronale_temperature"
      ha_humidity_sensor_id: "sensor.room_camera_padronale_humidity"

  pid_radiant: !include
    file: ../../radiant.yaml
    vars:
      zone_slug: "camera_padronale"
      zone_name: "Camera Padronale"
      relay_id: "relay_06"
      temperature_sensor: camera_padronale_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
