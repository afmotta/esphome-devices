# ============================================================================
# Camera Padronale Room Component - First Floor
# ============================================================================
#
# Complete room climate control component for Camera Padronale
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_padronale"
      zone_name: "Camera Padronale"
      ha_temperature_sensor_id: "sensor.room_camera_padronale_temperature"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_camera_padronale"
      circuit_name: "Radiant Camera Padronale"
      output: slow_pwm_camera_padronale
      sensor: camera_padronale_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management
  emergency_shutdown: !include
    file: ../../room_emergency_shutdown.yaml
    vars:
      zone_slug: "camera_padronale"
      zone_name: "Camera Padronale"
      pid_id: pid_radiant_camera_padronale

output:
  - platform: slow_pwm
    id: slow_pwm_camera_padronale
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_02
      - switch.turn_on: relay_08
    turn_off_action:
      - switch.turn_off: relay_02
      - switch.turn_off: relay_08
