# ============================================================================
# Camera Nord
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================
defaults:
  room_slug: "camera_nord"
  room_name: "Camera Nord"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_camera_nord_temperature"
      ha_humidity_sensor_id: "sensor.room_camera_nord_humidity"

  pid_radiant: !include
    file: ../../../vesta/packages/components/radiant.yaml
    vars:
      relay_id: relay_13
      temperature_sensor: camera_nord_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../../vesta/packages/components/pid_autotune.yaml
    vars:
      pid_id: pid_radiant_camera_nord
      pid_name: "Radiante Camera Nord"
