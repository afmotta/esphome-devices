# ============================================================================
# Bagno Grande
# First Floor
# ============================================================================
#
# Heating: Radiant Floor
# Cooling: None
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno_grande"
      zone_name: "Bagno Grande"
      ha_temperature_sensor_id: "sensor.room_bagno_grande_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_grande_humidity"

  pid_radiant: !include
    file: ../../heat_only_radiant.yaml
    vars:
      zone_slug: "bagno_grande"
      zone_name: "Bagno Grande"
      relay_id: "relay_01"
      temperature_sensor: bagno_grande_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
