# ============================================================================
# Camera Ospiti Room Component - First Floor
# ============================================================================
#
# Complete room climate control component for Camera Ospiti
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      ha_temperature_sensor_id: "sensor.room_camera_ospiti_temperature"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_camera_ospiti"
      circuit_name: "Radiant Camera Ospiti"
      output: slow_pwm_camera_ospiti
      sensor: camera_ospiti_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management
  emergency_shutdown: !include
    file: ../../room_emergency_shutdown.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      pid_id: pid_radiant_camera_ospiti

output:
  - platform: slow_pwm
    id: slow_pwm_camera_ospiti
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_07
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_07
