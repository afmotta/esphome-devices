# ============================================================================
# Camera Ospiti
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      ha_temperature_sensor_id: "sensor.room_camera_ospiti_temperature"
      ha_humidity_sensor_id: "sensor.room_camera_ospiti_humidity"

  pid_radiant: !include
    file: ../../radiant.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      relay_id: "relay_05"
      temperature_sensor: camera_ospiti_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
