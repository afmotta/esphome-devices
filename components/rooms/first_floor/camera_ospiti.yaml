# ============================================================================
# Camera Ospiti Room Component - First Floor (Epic 8)
# ============================================================================
#
# Epic 8 unified architecture: Condition components + Room Control Coordinator
# Equipment: Radiant floor heating only
# Conditions: Emergency (sensor failure detection only)

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      ha_temperature_sensor_id: "sensor.room_camera_ospiti_temperature"

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      ha_temperature_sensor_id: "sensor.room_camera_ospiti_temperature"
      priority: 1

  # Window condition stub (radiant-only room has no real window detection)
  window_condition_stub: !include
    file: ../../room_window_condition_stub.yaml
    vars:
      zone_slug: "camera_ospiti"

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "camera_ospiti"
      zone_name: "Camera Ospiti"
      pid_id: pid_radiant_camera_ospiti
      emergency_condition_priority_id: camera_ospiti_emergency_condition_priority
      emergency_condition_state_id: camera_ospiti_emergency_condition_state
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_camera_ospiti"
      circuit_name: "Radiant Camera Ospiti"
      output: slow_pwm_camera_ospiti
      sensor: camera_ospiti_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management

# ============================================================================
# Output Configuration
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_camera_ospiti
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_07
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_07
