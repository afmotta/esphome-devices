# ============================================================================
# Bagno Ospiti Room Component - First Floor (Epic 8)
# ============================================================================
#
# Epic 8 unified architecture: Condition components + Room Control Coordinator
# Equipment: Radiant floor heating only
# Conditions: Emergency (sensor failure detection only)

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno_ospiti"
      zone_name: "Bagno Ospiti"
      ha_temperature_sensor_id: "sensor.room_bagno_ospiti_temperature"

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "bagno_ospiti"
      zone_name: "Bagno Ospiti"
      ha_temperature_sensor_id: "sensor.room_bagno_ospiti_temperature"
      priority: 1

  # Window condition stub (radiant-only room has no real window detection)
  window_condition_stub: !include
    file: ../../room_window_condition_stub.yaml
    vars:
      zone_slug: "bagno_ospiti"

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "bagno_ospiti"
      zone_name: "Bagno Ospiti"
      pid_id: pid_radiant_bagno_ospiti
      emergency_condition_priority_id: bagno_ospiti_emergency_condition_priority
      emergency_condition_state_id: bagno_ospiti_emergency_condition_state
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_bagno_ospiti"
      circuit_name: "Radiant Bagno Ospiti"
      output: slow_pwm_bagno_ospiti
      sensor: bagno_ospiti_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

# ============================================================================
# Output Configuration
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_bagno_ospiti
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_10
    turn_off_action:
      - switch.turn_off: relay_10

# ============================================================================
# Climate Configuration
# ============================================================================

climate:
  - id: !extend pid_radiant_bagno_ospiti
    cool_output: !remove
