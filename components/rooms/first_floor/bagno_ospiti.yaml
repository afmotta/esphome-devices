# ============================================================================
# Bagno Ospiti
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: None
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno_ospiti"
      zone_name: "Bagno Ospiti"
      ha_temperature_sensor_id: "sensor.room_bagno_ospiti_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_ospiti_humidity"

  pid_radiant: !include
    file: ../../radiant.yaml
    vars:
      zone_slug: "bagno_ospiti"
      zone_name: "Bagno Ospiti"
      relay_id: "relay_02"
      temperature_sensor: bagno_ospiti_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

climate:
  - id: !extend pid_radiant_bagno_ospiti
    cool_output: !remove
