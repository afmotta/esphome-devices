# ============================================================================
# Lavanderia Room Component - First Floor (Epic 8)
# ============================================================================
#
# Epic 8 unified architecture: Condition components + Room Control Coordinator
# Equipment: Radiant floor heating only
# Conditions: Emergency (sensor failure detection only)

packages:
  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      ha_temperature_sensor_id: "sensor.room_lavanderia_temperature"
      priority: 1

  # Window condition stub (radiant-only room has no real window detection)
  window_condition_stub: !include
    file: ../../room_window_condition_stub.yaml
    vars:
      zone_slug: "lavanderia"

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      pid_id: pid_radiant_lavanderia
      emergency_condition_priority_id: lavanderia_emergency_condition_priority
      emergency_condition_state_id: lavanderia_emergency_condition_state
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_lavanderia"
      circuit_name: "Radiant Lavanderia"
      output: slow_pwm_lavanderia
      sensor: lavanderia_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management

# ============================================================================
# Temperature Sensor Abstraction
# ============================================================================
# Epic 8 emergency condition monitors sensor but doesn't expose it for PID use
# Need abstraction layer for PID controller integration

sensor:
  - platform: homeassistant
    id: lavanderia_room_temp_abstracted
    entity_id: "sensor.room_lavanderia_temperature"
    filters:
      - filter_out: nan
    on_value:
      then:
        - logger.log:
            format: "[Lavanderia] Temperature abstraction updated: %.1f°C"
            args: ["x"]
            level: DEBUG

# ============================================================================
# Output Configuration
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_lavanderia
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_09
    turn_off_action:
      - switch.turn_off: relay_09

# ============================================================================
# Climate Configuration
# ============================================================================

climate:
  - id: !extend pid_radiant_lavanderia
    cool_output: !remove
