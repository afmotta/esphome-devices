# ============================================================================
# Lavanderia Room Component - First Floor
# ============================================================================
#
# Complete room climate control component for Lavanderia
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      ha_temperature_sensor_id: "sensor.room_lavanderia_temperature"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_lavanderia"
      circuit_name: "Radiant Lavanderia"
      output: slow_pwm_lavanderia
      sensor: lavanderia_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management
  emergency_shutdown: !include
    file: ../../room_emergency_shutdown.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      pid_id: pid_radiant_lavanderia

output:
  - platform: slow_pwm
    id: slow_pwm_lavanderia
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_09
    turn_off_action:
      - switch.turn_off: relay_09

climate:
  - id: !extend pid_radiant_lavanderia
    cool_output: !remove
