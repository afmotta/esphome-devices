# ============================================================================
# Lavanderia
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================
defaults:
  room_slug: "lavanderia"
  room_name: "Lavanderia"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_lavanderia_temperature"
      ha_humidity_sensor_id: "sensor.room_lavanderia_humidity"

  pid_radiant: !include
    file: ../../../vesta/packages/components/heat_only_radiant.yaml
    vars:
      relay_id: relay_17
      temperature_sensor: lavanderia_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../../vesta/packages/components/pid_autotune.yaml
    vars:
      pid_id: pid_radiant_lavanderia
      pid_name: "Radiante Lavanderia"
