# ============================================================================
# Lavanderia
# First Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      ha_temperature_sensor_id: "sensor.room_lavanderia_temperature"
      ha_humidity_sensor_id: "sensor.room_lavanderia_humidity"

  pid_radiant: !include
    file: ../../radiant.yaml
    vars:
      zone_slug: "lavanderia"
      zone_name: "Lavanderia"
      relay_id: "relay_08"
      temperature_sensor: lavanderia_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

climate:
  - id: !extend pid_radiant_lavanderia
    cool_output: !remove
