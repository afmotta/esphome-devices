# ============================================================================
# Locale Tecnico
# Ground Floor
# ============================================================================
# Heating: None
# Cooling: Fancoil
# ============================================================================
defaults:
  room_slug: "locale_tecnico"
  zone_name: "Locale Tecnico"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_locale_tecnico_temperature"
      ha_humidity_sensor_id: "sensor.room_locale_tecnico_humidity"

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42052
      temperature_sensor: locale_tecnico_room_temp_abstracted
