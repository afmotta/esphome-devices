# ============================================================================
# Locale Tecnico
# Ground Floor
# ============================================================================
# Heating: None
# Cooling: Fancoil
# ============================================================================
defaults:
  room_slug: "locale_tecnico"
  room_name: "Locale Tecnico"
  temperature_sensor: locale_tecnico_room_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_locale_tecnico_temperature"
      ha_humidity_sensor_id: "sensor.room_locale_tecnico_humidity"

  fancoil: !include
    file: ../../../vesta/packages/components/fancoil.yaml
    vars:
      output_id: analog_output_5

  autotune_fancoil: !include
    file: ../../../vesta/packages/components/pid_autotune.yaml
    vars:
      pid_id: pid_fancoil_locale_tecnico
      pid_name: "Fancoil Locale Tecnico"
