# ============================================================================
# Sala da Pranzo
# Ground Floor
# ============================================================================
# Heating: None
# Cooling: Fancoil
# ============================================================================
defaults:
  room_slug: "sala_pranzo"
  zone_name: "Sala Pranzo"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_sala_pranzo_temperature"
      ha_humidity_sensor_id: "sensor.room_sala_pranzo_humidity"

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42050
      temperature_sensor: sala_pranzo_room_temp_abstracted
