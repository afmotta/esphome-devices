# ============================================================================
# Anticamera Room Component - Ground Floor
# ============================================================================
#
# Complete room climate control component for Anticamera (Kitchen)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "anticamera"
      zone_name: "Anticamera"
      modbus_controller_address: 0x0C
      ha_temperature_sensor_id: "sensor.room_anticamera_temperature"
      ha_humidity_sensor_id: "sensor.room_anticamera_humidity"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_anticamera"
      circuit_name: "Radiant Anticamera"
      output: slow_pwm_anticamera
      sensor: anticamera_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: "ground_floor_radiant_pump_management"

output:
  - platform: slow_pwm
    id: slow_pwm_anticamera
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03
