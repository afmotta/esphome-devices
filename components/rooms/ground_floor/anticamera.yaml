# ============================================================================
# Anticamera
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor
# ============================================================================
defaults:
  room_slug: "anticamera"
  room_name: "Anticamera"
  temperature_sensor: anticamera_room_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_anticamera_temperature"
      ha_humidity_sensor_id: "sensor.room_anticamera_humidity"

  pid_radiant: !include
    file: ../../radiant.yaml
    vars:
      relay_id: relay_6
      kp: 0.8
      ki: 0.005
      kd: 0.05

  autotune: !include
    file: ../../pid_autotune.yaml
    vars:
      pid_id: pid_radiant_anticamera
