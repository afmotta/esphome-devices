# ============================================================================
# Soggiorno
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Fancoil
# ============================================================================
defaults:
  room_slug: "soggiorno"
  zone_name: "Soggiorno"

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_soggiorno_temperature"
      ha_humidity_sensor_id: "sensor.room_soggiorno_humidity"

  radiant: !include
    file: ../../heat_only_radiant.yaml
    vars:
      temperature_sensor: soggiorno_room_temp_abstracted
      relay_id: "relay_04"
      kp: 0.8
      ki: 0.005
      kd: 0.05

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42049
      temperature_sensor: soggiorno_room_temp_abstracted
