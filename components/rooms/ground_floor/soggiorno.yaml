# ============================================================================
# Soggiorno Room Component - Ground Floor (Epic 8)
# ============================================================================
#
# Complete room climate control component for Soggiorno (Living Room)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output
#
# Epic 8: Unified state machine architecture
#   - Emergency condition component (sensor failure detection)
#   - Window condition component (energy efficiency)
#   - Room control coordinator (priority-based PID control)
#
# Migration: Epic 5/7 → Epic 8
#   REMOVED: room_sensors.yaml (Epic 5)
#   REMOVED: room_emergency_shutdown.yaml (Epic 5)
#   REMOVED: room_window_detection.yaml (Epic 7)
#   ADDED: room_emergency_condition.yaml (Epic 8)
#   ADDED: room_window_condition.yaml (Epic 8)
#   ADDED: room_control_coordinator.yaml (Epic 8)

packages:
  # ============================================================================
  # EPIC 8: SENSOR ABSTRACTION
  # ============================================================================

  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "soggiorno"
      zone_name: "Soggiorno"
      ha_temperature_sensor_id: "sensor.room_soggiorno_temperature"

  # ============================================================================
  # EPIC 8: CONDITION COMPONENTS
  # ============================================================================

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "soggiorno"
      zone_name: "Soggiorno"
      ha_temperature_sensor_id: "sensor.room_soggiorno_temperature"
      emergency_timeout: 180 # 3 minutes before emergency trigger
      recovery_timeout: 60 # 1 minute stability period

  window_condition: !include
    file: ../../room_window_condition.yaml
    vars:
      zone_slug: "soggiorno"
      zone_name: "Soggiorno"
      ha_window_sensor_id: "binary_sensor.soggiorno_window"
      pid_id: pid_fancoil_soggiorno
      window_shutdown_modes: "cooling, heating"
      window_timeout: 180 # 3 minutes grace period
      recovery_timeout: 60 # 1 minute stability period

  # ============================================================================
  # EPIC 8: COORDINATOR (Priority-based control engine)
  # ============================================================================

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "soggiorno"
      zone_name: "Soggiorno"
      pid_id: pid_fancoil_soggiorno
      coordinator_interval: 5 # 5-second polling

  # ============================================================================
  # CLIMATE CONTROL (unchanged from Epic 7)
  # ============================================================================

  radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_soggiorno"
      circuit_name: "Radiant Soggiorno"
      output: slow_pwm_soggiorno
      sensor: soggiorno_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42049
      area_slug: "soggiorno"
      area_name: "Soggiorno"
      sensor: soggiorno_room_temp_abstracted

# ============================================================================
# ROOM OUTPUTS (unchanged from Epic 7)
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_soggiorno
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_05
      - switch.turn_on: relay_06
      - switch.turn_on: relay_07
    turn_off_action:
      - switch.turn_off: relay_05
      - switch.turn_off: relay_06
      - switch.turn_off: relay_07
