# ============================================================================
# Soggiorno
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Radiant Floor (primary) + Fancoil (boost)
# ============================================================================
defaults:
  room_slug: "soggiorno"
  room_name: "Soggiorno"
  temperature_sensor: soggiorno_room_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_soggiorno_temperature"
      ha_humidity_sensor_id: "sensor.room_soggiorno_humidity"

  radiant: !include
    file: ../../radiant.yaml
    vars:
      relay_id: relay_9
      kp: 0.8
      ki: 0.005
      kd: 0.05

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      output_id: analog_output_3

  fancoil_boost_coordinator: !include
    file: ../../fancoil_boost_coordinator.yaml
