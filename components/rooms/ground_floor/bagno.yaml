# ============================================================================
# Bagno Terra
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: None
# ===========================================================================
# ============================================================================
defaults:
  room_slug: "bagno_terra"
  room_name: "Bagno Piano Terra"
  temperature_sensor: bagno_terra_room_temp_abstracted

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      ha_temperature_sensor_id: "sensor.room_bagno_terra_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_terra_humidity"

  pid_radiant: !include
    file: ../../heat_only_radiant.yaml
    vars:
      relay_id: relay_7
      kp: 0.8
      ki: 0.005
      kd: 0.05
