# ============================================================================
# Bagno Room Component - Ground Floor
# ============================================================================
#
# Complete room climate control component for Bagno (Kitchen)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno"
      zone_name: "Bagno"
      modbus_controller_address: 0x0C
      ha_temperature_sensor_id: "sensor.room_bagno_temperature"
      ha_humidity_sensor_id: "sensor.room_bagno_humidity"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_bagno"
      circuit_name: "Radiant Bagno"
      output: slow_pwm_bagno
      sensor: bagno_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: "ground_floor_radiant_pump_management"

output:
  - platform: slow_pwm
    id: slow_pwm_bagno
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03
