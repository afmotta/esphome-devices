# ============================================================================
# Cucina Room Component - Ground Floor
# ============================================================================
#
# Complete room climate control component for Cucina (Kitchen)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_temperature_sensor_id: "sensor.room_cucina_temperature"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_cucina"
      circuit_name: "Radiant Cucina"
      output: slow_pwm_cucina
      sensor: cucina_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: ground_floor_radiant_pump_management
  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42051
      area_slug: "cucina"
      area_name: "Cucina"
      sensor: cucina_room_temp_abstracted
      switch_management_script: ground_floor_fancoils_pump_management
  emergency_shutdown: !include
    file: ../../room_emergency_shutdown.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      pid_id: pid_radiant_cucina
  window_detection: !include
    file: ../../room_window_detection.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_window_sensor_id: "binary_sensor.cucina_window"
      pid_id: pid_fancoil_cucina
      window_shutdown_modes: "cooling, heating"

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
