# ============================================================================
# Cucina Room Component - Ground Floor
# ============================================================================
#
# Complete room climate control component for Cucina (Kitchen)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_cucina: !include
    file: ../_templates/room_ground_floor.yaml
    vars:
      room_slug: "cucina"
      room_name: "Cucina"
      modbus_controller_address: 0x0A
      ha_temperature_sensor_id: "sensor.room_cucina_temperature"
      ha_humidity_sensor_id: "sensor.room_cucina_humidity"
      output: "slow_pwm_cucina"
      kp: 0.8
      ki: 0.005
      kd: 0.05

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
