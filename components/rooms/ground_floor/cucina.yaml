# ============================================================================
# Cucina
# Ground Floor
# ============================================================================
# Heating: Radiant Floor
# Cooling: Fancoil
# ============================================================================

packages:
  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_temperature_sensor_id: "sensor.room_cucina_temperature"
      ha_humidity_sensor_id: "sensor.room_cucina_humidity"

  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_cucina"
      circuit_name: "Radiant Cucina"
      output: slow_pwm_cucina
      sensor: cucina_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42051
      area_slug: "cucina"
      area_name: "Cucina"
      sensor: cucina_room_temp_abstracted

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
