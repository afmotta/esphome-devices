# ============================================================================
# Cucina Room Component - Ground Floor (Epic 8)
# ============================================================================
#
# Complete room climate control component for Cucina (Kitchen)
# Includes: HA temperature sensor, dual PID controllers (radiant + fancoil), diagnostic sensors
#
# Epic 8: Unified state machine architecture
#   - Emergency condition component (sensor failure detection)
#   - Window condition component (energy efficiency for fancoil)
#   - Room control coordinator (priority-based PID control)
#
# Migration: Epic 5 + Epic 7 → Epic 8
#   REMOVED: room_sensors.yaml (Epic 5)
#   REMOVED: room_emergency_shutdown.yaml (Epic 5)
#   REMOVED: room_window_detection.yaml (Epic 7)
#   ADDED: room_emergency_condition.yaml (Epic 8)
#   ADDED: room_window_condition.yaml (Epic 8)
#   ADDED: room_control_coordinator.yaml (Epic 8)

packages:
  # ============================================================================
  # EPIC 8: SENSOR ABSTRACTION
  # ============================================================================

  sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_temperature_sensor_id: "sensor.room_cucina_temperature"

  # ============================================================================
  # EPIC 8: CONDITION COMPONENTS
  # ============================================================================

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_temperature_sensor_id: "sensor.room_cucina_temperature"
      emergency_timeout: 180 # 3 minutes before emergency trigger
      recovery_timeout: 60 # 1 minute stability period

  window_condition: !include
    file: ../../room_window_condition.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      ha_window_sensor_id: "binary_sensor.cucina_window"
      pid_id: pid_fancoil_cucina
      window_shutdown_modes: "cooling, heating"
      window_timeout: 180 # 3 minutes grace period
      recovery_timeout: 60 # 1 minute stability period

  # ============================================================================
  # EPIC 8: COORDINATOR (Priority-based control engine)
  # ============================================================================

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "cucina"
      zone_name: "Cucina"
      pid_id: pid_fancoil_cucina
      coordinator_interval: 5 # 5-second polling

  # ============================================================================
  # CLIMATE CONTROL (unchanged from Epic 7)
  # ============================================================================

  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_cucina"
      circuit_name: "Radiant Cucina"
      output: slow_pwm_cucina
      sensor: cucina_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: ground_floor_radiant_pump_management

  fancoil: !include
    file: ../../fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
      register_address: 0x42051
      area_slug: "cucina"
      area_name: "Cucina"
      sensor: cucina_room_temp_abstracted
      switch_management_script: ground_floor_fancoils_pump_management

# ============================================================================
# ROOM OUTPUTS (unchanged from Epic 7)
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_cucina
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_01
      - switch.turn_on: relay_02
    turn_off_action:
      - switch.turn_off: relay_01
      - switch.turn_off: relay_02
