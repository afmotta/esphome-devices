# ============================================================================
# Bagno Room Component - Ground Floor (Epic 8)
# ============================================================================
#
# Complete room climate control component for Bagno Terra (Ground Floor Bathroom)
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output
#
# Epic 8: Unified state machine architecture
#   - Emergency condition component (sensor failure detection)
#   - Room control coordinator (priority-based PID control)
#
# Migration: Epic 5 → Epic 8
#   REMOVED: room_sensors.yaml (Epic 5)
#   REMOVED: room_emergency_shutdown.yaml (Epic 5)
#   ADDED: room_emergency_condition.yaml (Epic 8)
#   ADDED: room_control_coordinator.yaml (Epic 8)
#
# Note: NO window condition (radiant floor only, no fancoil)

packages:
  # ============================================================================
  # EPIC 8: CONDITION COMPONENTS
  # ============================================================================

  emergency_condition: !include
    file: ../../room_emergency_condition.yaml
    vars:
      zone_slug: "bagno_terra"
      zone_name: "Bagno Terra"
      ha_temperature_sensor_id: "sensor.room_bagno_terra_temperature"
      emergency_timeout: 180 # 3 minutes before emergency trigger
      recovery_timeout: 60 # 1 minute stability period

  # Window condition stub (radiant-only room has no real window detection)
  window_condition_stub: !include
    file: ../../room_window_condition_stub.yaml
    vars:
      zone_slug: "bagno_terra"

  # ============================================================================
  # EPIC 8: COORDINATOR (Priority-based control engine)
  # ============================================================================

  coordinator: !include
    file: ../../room_control_coordinator.yaml
    vars:
      zone_slug: "bagno_terra"
      zone_name: "Bagno Terra"
      pid_id: pid_radiant_bagno_terra
      coordinator_interval: 5 # 5-second polling

  # ============================================================================
  # CLIMATE CONTROL (unchanged from Epic 5)
  # ============================================================================

  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_bagno_terra"
      circuit_name: "Radiant Bagno Terra"
      output: slow_pwm_bagno_terra
      sensor: bagno_terra_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: ground_floor_radiant_pump_management

# ============================================================================
# TEMPERATURE SENSOR ABSTRACTION
# ============================================================================
# Epic 8 Note: Emergency condition monitors HA sensor but doesn't expose it.
# We need to create the abstracted sensor for PID controllers.

sensor:
  - platform: homeassistant
    entity_id: "sensor.room_bagno_terra_temperature"
    id: bagno_terra_room_temp_abstracted
    internal: true
    filters:
      - filter_out: nan

# ============================================================================
# ROOM OUTPUTS (unchanged from Epic 5)
# ============================================================================

output:
  - platform: slow_pwm
    id: slow_pwm_bagno_terra
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_03
    turn_off_action:
      - switch.turn_off: relay_03

climate:
  - id: !extend pid_radiant_bagno_terra
    cool_output: !remove
