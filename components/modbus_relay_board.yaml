substitutions:
  update_interval: 5s

modbus_controller:
  - id: ${board_id}
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}

switch:
  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 1"
    id: ${board_id}_relay_1
    register_type: coil
    address: 0x0000
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 2"
    id: ${board_id}_relay_2
    register_type: coil
    address: 0x0001
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 3"
    id: ${board_id}_relay_3
    register_type: coil
    address: 0x0002
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 4"
    id: ${board_id}_relay_4
    register_type: coil
    address: 0x0003
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 5"
    id: ${board_id}_relay_5
    register_type: coil
    address: 0x0004
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 6"
    id: ${board_id}_relay_6
    register_type: coil
    address: 0x0005
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 7"
    id: ${board_id}_relay_7
    register_type: coil
    address: 0x0006
    icon: mdi:electric-switch

  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Relay 8"
    id: ${board_id}_relay_8
    register_type: coil
    address: 0x0007
    icon: mdi:electric-switch

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${board_id}
    name: "${board_name} Status"
    id: ${board_id}_status
    register_type: read
    address: 0x0000
    device_class: connectivity
    internal: true
