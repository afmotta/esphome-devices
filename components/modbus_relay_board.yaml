substitutions:
  update_interval: 5s

modbus_controller:
  - id: ${controller_id}
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}

packages:
  relay_1: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 1
      register_address: 0x0000
  relay_2: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 2
      register_address: 0x0001
  relay_3: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 3
      register_address: 0x0002
  relay_4: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 4
      register_address: 0x0003
  relay_5: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 5
      register_address: 0x0004
  relay_6: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 6
      register_address: 0x0005
  relay_7: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 7
      register_address: 0x0006
  relay_8: !include
    file: ../components/modbus_relay_switch.yaml
    vars:
      controller_id: ${controller_id}
      switch_number: 8
      register_address: 0x0007

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${controller_id}
    name: "${controller_name} Status"
    id: ${controller_id}_status
    register_type: read
    address: 0x0000
    device_class: connectivity
    internal: true
