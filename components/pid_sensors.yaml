sensor:
  - platform: pid
    name: "${pid_name} Result"
    climate_id: ${pid_id}
    id: ${pid_id}_result
    type: RESULT
  - platform: pid
    name: "${pid_name} Error"
    climate_id: ${pid_id}
    id: ${pid_id}_error
    type: ERROR
  - platform: pid
    name: "${pid_name} Heat"
    climate_id: ${pid_id}
    id: ${pid_id}_heat
    type: HEAT
  - platform: pid
    name: "${pid_name} Cool"
    climate_id: ${pid_id}
    id: ${pid_id}_cool
    type: COOL
  - platform: pid
    name: "${pid_name} Proportional"
    climate_id: ${pid_id}
    id: ${pid_id}_proportional
    type: PROPORTIONAL
  - platform: pid
    name: "${pid_name} Integral"
    climate_id: ${pid_id}
    id: ${pid_id}_integral
    type: INTEGRAL
  - platform: pid
    name: "${pid_name} Derivative"
    climate_id: ${pid_id}
    id: ${pid_id}_derivative
    type: DERIVATIVE
  - platform: pid
    name: "${pid_name} KP"
    climate_id: ${pid_id}
    id: ${pid_id}_kp
    type: KP
  - platform: pid
    name: "${pid_name} KI"
    climate_id: ${pid_id}
    id: ${pid_id}_ki
    type: KI
  - platform: pid
    name: "${pid_name} KD"
    climate_id: ${pid_id}
    id: ${pid_id}_kd
    type: KD

binary_sensor:
  - platform: template
    name: "${pid_name} is Active"
    id: ${pid_id}_is_active
    lambda: |-
      auto action = id(${pid_id}).action;
      return (action == CLIMATE_ACTION_HEATING || action == CLIMATE_ACTION_COOLING);
  - platform: template
    name: "${pid_name} is Heating"
    id: ${pid_id}_is_heating
    lambda: |-
      return id(${pid_id}).action == CLIMATE_ACTION_HEATING;
  - platform: template
    name: "${pid_name} is Cooling"
    id: ${pid_id}_is_cooling
    lambda: |-
      return id(${pid_id}).action == CLIMATE_ACTION_COOLING;
