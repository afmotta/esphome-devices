# Component: sensor_failover.yaml
# Purpose: Three-tier sensor failover wrapper for autonomous operation
# Dependencies: Requires modbus_slave_registers.yaml for Modbus sensor availability
# Required vars:
#   - sensor_id: Unique ID for failover sensor (e.g., "soggiorno_temperature")
#   - modbus_sensor_id: ID of Modbus sensor to use as primary source
#   - ha_sensor_id: ID of Home Assistant sensor to use as fallback
#   - device_class: Sensor device class (temperature, humidity, etc.)
#   - unit_of_measurement: Unit string (e.g., "°C")
# Optional vars:
#   - accuracy_decimals: Decimal precision (default: 1)
#   - update_interval: How often to recalculate failover logic (default: 10s)
# Feature flag: use_modbus (substitution) - controls if Modbus is primary source
#
# Usage Example:
# packages:
#   soggiorno_failover: !include
#     file: ../components/sensor_failover.yaml
#     vars:
#       sensor_id: "soggiorno_temperature"
#       modbus_sensor_id: "modbus_soggiorno_temperature"
#       ha_sensor_id: "ha_soggiorno_temperature"
#       device_class: "temperature"
#       unit_of_measurement: "°C"
#       accuracy_decimals: 1

defaults:
  accuracy_decimals: 1
  update_interval: 10s

# Global variables for emergency tracking
globals:
  - id: ${sensor_id}_last_valid_time
    type: unsigned long
    restore_value: false
    initial_value: "0"
  - id: ${sensor_id}_emergency_triggered
    type: bool
    restore_value: false
    initial_value: "false"

# Template sensor with three-tier failover logic
sensor:
  - platform: template
    name: "${sensor_id}"
    id: ${sensor_id}_abstracted
    device_class: ${device_class}
    state_class: measurement
    unit_of_measurement: "${unit_of_measurement}"
    accuracy_decimals: ${accuracy_decimals}
    update_interval: ${update_interval}
    lambda: |-
      std::string flag = "${use_modbus}";
      unsigned long now = millis();
      float result = NAN;
      
      // TIER 1: Modbus sensor (primary when enabled)
      if (flag == "true" && id(${modbus_sensor_id}).has_state()) {
        float modbus_val = id(${modbus_sensor_id}).state;
        if (!std::isnan(modbus_val)) {
          result = modbus_val;
          id(${sensor_id}_last_valid_time) = now;
          id(${sensor_id}_emergency_triggered) = false;
          ESP_LOGD("sensor_failover", "${sensor_id}: Using Modbus source: %.2f", result);
          return result;
        }
      }
      
      // TIER 2: Home Assistant sensor (fallback)
      if (id(${ha_sensor_id}).has_state()) {
        float ha_val = id(${ha_sensor_id}).state;
        if (!std::isnan(ha_val)) {
          result = ha_val;
          id(${sensor_id}_last_valid_time) = now;
          id(${sensor_id}_emergency_triggered) = false;
          ESP_LOGD("sensor_failover", "${sensor_id}: Using Home Assistant fallback: %.2f", result);
          return result;
        }
      }
      
      // TIER 3: Emergency - no sensors available
      unsigned long time_since_valid = (now - id(${sensor_id}_last_valid_time)) / 1000; // Convert to seconds
      
      if (time_since_valid > 300) { // 5 minutes = 300 seconds
        if (!id(${sensor_id}_emergency_triggered)) {
          ESP_LOGE("sensor_failover", "${sensor_id}: EMERGENCY MODE - No valid sensor data for >5 minutes");
          id(${sensor_id}_emergency_triggered) = true;
        }
      }
      
      ESP_LOGW("sensor_failover", "${sensor_id}: No sensors available (time since valid: %lu s)", time_since_valid);
      return NAN;

# Failover status tracking text sensor
text_sensor:
  - platform: template
    name: "${sensor_id} Source"
    id: ${sensor_id}_source
    icon: "mdi:swap-horizontal"
    lambda: |-
      std::string flag = "${use_modbus}";
      
      // Check TIER 1: Modbus
      if (flag == "true" && id(${modbus_sensor_id}).has_state()) {
        float modbus_val = id(${modbus_sensor_id}).state;
        if (!std::isnan(modbus_val)) {
          return {"Modbus Active"};
        }
      }
      
      // Check TIER 2: Home Assistant
      if (id(${ha_sensor_id}).has_state()) {
        float ha_val = id(${ha_sensor_id}).state;
        if (!std::isnan(ha_val)) {
          return {"Failover to Home Assistant"};
        }
      }
      
      // TIER 3: Emergency
      return {"Emergency Mode - No Sensors"};
    update_interval: ${update_interval}
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("sensor_failover", "${sensor_id} source changed to: %s", x.c_str());
