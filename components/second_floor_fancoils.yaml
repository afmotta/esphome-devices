# Second floor fancoils via 4-channel 0-10V Modbus adapter (address 0x3)
modbus_controller:
  - id: modbus_0_10v_adapter_fancoils_second_floor
    address: 0x3
    modbus_id: rs485_bus # Shared RS485 bus with master/slave
    update_interval: 5s

packages:
  second_floor_fancoil_sottotetto: !include
    file: ../components/fancoil.yaml
    vars:
      adapter_id: modbus_0_10v_adapter_fancoils_second_floor
      register_address: 0x42049
      area_slug: "sottotetto"
      area_name: "Sottotetto"
      sensor: ha_sottotetto_temperature
      switch_management_script: second_floor_fancoils_switch_management

script:
  - id: second_floor_fancoils_switch_management
    mode: queued
    then:
      - if:
          condition:
            any:
              - binary_sensor.is_on: fancoil_sottotetto_pid_active
          then:
            - switch.turn_on: relay_4
          else:
            - switch.turn_off: relay_4
