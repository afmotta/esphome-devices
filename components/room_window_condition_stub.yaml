# Component: room_window_condition_stub.yaml
# Purpose: Stub window condition globals for rooms without window detection
# Epic: Epic 8 - Unified State Machine Architecture
#
# This component provides dummy window condition globals for radiant-only rooms
# that don't have window detection, allowing the coordinator to read them safely.
#
# The coordinator always tries to read window_state and window_priority, so
# radiant-only rooms need these defined (but they'll always stay at safe defaults).
#
# Required vars:
#   - zone_slug: Room identifier (e.g., "bagno_grande", "anticamera")
#
# Exposes:
#   - globals.${zone_slug}_window_state: Always 0 (Normal)
#   - globals.${zone_slug}_window_priority: Always 99 (lowest priority, never wins)
#
# Usage Example:
# packages:
#   window_condition_stub: !include
#     file: ../../room_window_condition_stub.yaml
#     vars:
#       zone_slug: "anticamera"

# ============================================================================
# STUB WINDOW CONDITION GLOBALS
# ============================================================================

globals:
  # Window condition state: Always Normal (0)
  - id: ${zone_slug}_window_state
    type: int
    restore_value: no
    initial_value: "0" # 0 = Normal (never Active or Recovering)

  # Window condition priority: Lowest possible (99)
  - id: ${zone_slug}_window_priority
    type: int
    restore_value: no
    initial_value: "99" # Lowest priority, will never win over emergency (1)
