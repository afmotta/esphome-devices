# Component: trend_sensor.yaml
# Purpose: Reusable trend analysis sensor (rate of change per minute)
#
# Required vars:
#   - sensor_id: ID for the created trend sensor
#   - source_sensor: ID of the sensor to analyze
#   - unit_of_measurement: Unit (e.g., "%/min", "°C/min")
#
# Optional vars (passed via defaults:):
#   - sensor_name: Friendly name
#   - accuracy_decimals: Precision (default: 2)
#   - window_size: Smoothing window size (default: 10)
#   - icon: Material Design Icon (default: mdi:trending-up)
#   - internal: Whether to hide sensor from Home Assistant (default: false)

defaults:
  sensor_name: "Trend Sensor"
  accuracy_decimals: "2"
  window_size: "10"
  icon: "mdi:trending-up"
  internal: "false"

sensor:
  - platform: template
    id: ${sensor_id}
    name: "${sensor_name}"
    internal: ${internal}
    unit_of_measurement: "${unit_of_measurement}"
    accuracy_decimals: ${accuracy_decimals}
    icon: "${icon}"
    lambda: |-
      static float last_val = NAN;
      static uint32_t last_ts = 0;
      float cur_val = id(${source_sensor}).state;
      uint32_t now = millis();
      if (isnan(cur_val)) return NAN;
      float res = 0.0f;
      if (!isnan(last_val) && last_ts > 0 && now > last_ts) {
        float dt = (now - last_ts) / 60000.0f; // minutes
        if (dt > 0.01) res = (cur_val - last_val) / dt;
      }
      last_val = cur_val;
      last_ts = now;
      return res;
    filters:
      - sliding_window_moving_average:
          window_size: ${window_size}
          send_every: 1
