# Component: room_window_detection.yaml
# Purpose: Window-triggered climate shutdown for energy efficiency
# Epic: Epic 7 - Window Detection & Climate Response
#
# This component implements equipment-aware climate shutdown when windows are open:
# - Monitors window state from Home Assistant binary sensors
# - Implements 3-state machine: Normal → Window Open → Window Recovering
# - Forces PID climate control OFF when window remains open beyond timeout
# - Allows brief ventilation (grace period) without triggering shutdown
# - Supports mode-aware shutdown (configure which modes trigger shutdown)
#
# Required vars:
#   - zone_slug: Room identifier (must match room_sensors.yaml and PID)
#   - zone_name: Display name for logging
#   - ha_window_sensor_id: HA binary sensor entity ID (e.g., "binary_sensor.soggiorno_window")
#   - pid_id: ID of the PID climate entity to control (e.g., "pid_soggiorno")
#   - window_shutdown_modes: Comma-separated string of climate modes that trigger shutdown
#       Examples:
#         - "cooling, heating" → Shutdown in both modes (typical for fancoils)
#         - "cooling" → Shutdown only in cooling mode
#         - "" → Never shutdown (typical for radiant systems)
#
# Optional vars:
#   - window_timeout: Seconds before shutdown (default: 180 = 3 min)
#   - recovery_timeout: Seconds of stability before resuming (default: 180 = 3 min)
#   - check_interval: How often to check window state (default: 5s)
#
# Dependencies:
#   - room_sensors.yaml must be included in the same device (for zone_slug globals)
#   - PID climate component must be configured with matching pid_id
#
# Integration:
#   This component should be included in room component packages AFTER
#   room_sensors.yaml and pid.yaml are included.
#
# Usage Example:
# packages:
#   room_sensors: !include
#     file: ../../components/room_sensors.yaml
#     vars:
#       zone_slug: soggiorno
#       zone_name: "Soggiorno"
#       ha_temperature_sensor_id: sensor.soggiorno_temperature
#   pid: !include
#     file: ../../components/pid.yaml
#     vars:
#       circuit_slug: soggiorno
#       # ... other PID vars ...
#   window_detection: !include
#     file: ../../components/room_window_detection.yaml
#     vars:
#       zone_slug: soggiorno
#       zone_name: "Soggiorno"
#       ha_window_sensor_id: binary_sensor.soggiorno_window
#       pid_id: pid_soggiorno
#       window_shutdown_modes: "cooling, heating"

defaults:
  window_timeout: "180" # 3 minutes grace period
  recovery_timeout: "180" # 3 minutes stability period
  check_interval: "5" # Check every 5 seconds

# ============================================================================
# STATE TRACKING GLOBALS
# ============================================================================

globals:
  # Timestamp when window was opened (milliseconds, 0 = closed)
  - id: ${zone_slug}_window_open_time
    type: unsigned long
    restore_value: false
    initial_value: "0"

  # Window shutdown state flag (true = shutdown active)
  - id: ${zone_slug}_window_shutdown_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Recovery start timestamp (0 = not in recovery)
  - id: ${zone_slug}_window_recovery_start_time
    type: unsigned long
    restore_value: false
    initial_value: "0"

# ============================================================================
# HOME ASSISTANT WINDOW SENSOR
# ============================================================================

binary_sensor:
  - platform: homeassistant
    entity_id: ${ha_window_sensor_id}
    id: ${zone_slug}_window_sensor
    internal: true # Used internally only
    on_state:
      then:
        - lambda: |-
            // Window state changed, log it
            if (x) {
              ESP_LOGI("window", "${zone_name}: Window OPENED");
            } else {
              ESP_LOGI("window", "${zone_name}: Window CLOSED");
            }

# ============================================================================
# WINDOW STATE MACHINE MONITOR
# ============================================================================
# Interval script that monitors window state and manages state transitions

interval:
  - interval: ${check_interval}s
    then:
      - lambda: |-
          unsigned long now = millis();

          // ====================================================================
          // GET WINDOW SENSOR STATE
          // ====================================================================

          bool window_open = false;
          bool sensor_available = false;

          if (id(${zone_slug}_window_sensor).has_state()) {
            sensor_available = true;
            window_open = id(${zone_slug}_window_sensor).state;
          } else {
            // Sensor unavailable - graceful degradation
            ESP_LOGV("window", "${zone_name}: Window sensor unavailable, treating as closed");
            sensor_available = false;
            window_open = false;
          }

          // ====================================================================
          // GET CURRENT PID MODE
          // ====================================================================

          auto pid = id(${pid_id});
          climate::ClimateMode current_mode = pid->mode;

          // Check if current mode is in shutdown_modes list
          bool mode_requires_shutdown = false;

          // Parse window_shutdown_modes string (comma-separated list)
          std::string modes_str = "${window_shutdown_modes}";

          // Check each mode type
          if (modes_str.find("heating") != std::string::npos && 
              current_mode == climate::CLIMATE_MODE_HEAT) {
            mode_requires_shutdown = true;
          }
          if (modes_str.find("cooling") != std::string::npos && 
              current_mode == climate::CLIMATE_MODE_COOL) {
            mode_requires_shutdown = true;
          }
          if (modes_str.find("heat_cool") != std::string::npos && 
              current_mode == climate::CLIMATE_MODE_HEAT_COOL) {
            mode_requires_shutdown = true;
          }
          if (modes_str.find("auto") != std::string::npos && 
              current_mode == climate::CLIMATE_MODE_AUTO) {
            mode_requires_shutdown = true;
          }

          // ====================================================================
          // STATE MACHINE LOGIC
          // ====================================================================

          if (window_open && sensor_available) {
            // ----------------------------------------------------------------
            // WINDOW IS OPEN
            // ----------------------------------------------------------------
            
            // Track when window opened
            if (id(${zone_slug}_window_open_time) == 0) {
              id(${zone_slug}_window_open_time) = now;
              ESP_LOGD("window", "${zone_name}: Window open timer started");
            }
            
            // Calculate how long window has been open
            unsigned long open_duration = (now - id(${zone_slug}_window_open_time)) / 1000;  // seconds
            
            // Check if we should trigger shutdown
            if (open_duration >= ${window_timeout}) {
              // Window open longer than timeout
              
              if (mode_requires_shutdown) {
                // Current mode requires shutdown
                
                if (!id(${zone_slug}_window_shutdown_active)) {
                  // ============================================================
                  // TRANSITION: Normal → Window Open (Shutdown Triggered)
                  // ============================================================
                  
                  id(${zone_slug}_window_shutdown_active) = true;
                  id(${zone_slug}_window_recovery_start_time) = 0;  // Clear recovery state
                  
                  ESP_LOGW("window", "${zone_name}: WINDOW SHUTDOWN TRIGGERED after %lu seconds (mode: %d)", 
                           open_duration, (int)current_mode);
                  
                  // Force PID OFF
                  if (pid->mode != climate::CLIMATE_MODE_OFF) {
                    auto pid_call = pid->make_call();
                    pid_call.set_mode(climate::CLIMATE_MODE_OFF);
                    pid_call.perform();
                    ESP_LOGW("window", "${zone_name}: PID forced OFF due to window");
                  }
                } else {
                  // Already in shutdown state
                  ESP_LOGV("window", "${zone_name}: Window shutdown active (open %lu seconds)", open_duration);
                }
              } else {
                // Current mode does NOT require shutdown
                ESP_LOGD("window", "${zone_name}: Window open %lu seconds, but mode %d not in shutdown list", 
                         open_duration, (int)current_mode);
                
                // If we were in shutdown but mode changed, clear shutdown
                if (id(${zone_slug}_window_shutdown_active)) {
                  ESP_LOGI("window", "${zone_name}: Mode changed to non-shutdown mode, clearing window shutdown");
                  id(${zone_slug}_window_shutdown_active) = false;
                }
              }
            } else {
              // Window open but within grace period
              ESP_LOGV("window", "${zone_name}: Window open %lu / ${window_timeout} seconds (grace period)", 
                       open_duration);
            }
            
          } else {
            // ----------------------------------------------------------------
            // WINDOW IS CLOSED (or sensor unavailable)
            // ----------------------------------------------------------------
            
            // Clear window open timer
            if (id(${zone_slug}_window_open_time) > 0) {
              ESP_LOGD("window", "${zone_name}: Window closed, timer reset");
              id(${zone_slug}_window_open_time) = 0;
            }
            
            // Handle recovery if we were in shutdown
            if (id(${zone_slug}_window_shutdown_active)) {
              // ==============================================================
              // TRANSITION: Window Open → Window Recovering
              // ==============================================================
              
              if (id(${zone_slug}_window_recovery_start_time) == 0) {
                id(${zone_slug}_window_recovery_start_time) = now;
                ESP_LOGI("window", "${zone_name}: WINDOW RECOVERY STARTED (stability period: ${recovery_timeout}s)");
              }
              
              // Check recovery duration
              unsigned long recovery_duration = (now - id(${zone_slug}_window_recovery_start_time)) / 1000;
              
              if (recovery_duration >= ${recovery_timeout}) {
                // ==============================================================
                // TRANSITION: Window Recovering → Normal
                // ==============================================================
                
                id(${zone_slug}_window_shutdown_active) = false;
                id(${zone_slug}_window_recovery_start_time) = 0;
                
                ESP_LOGI("window", "${zone_name}: WINDOW RECOVERY COMPLETE - Resuming normal operation");
                
                // Note: PID will resume based on HA climate entity state
                // No need to explicitly turn it on here; user controls via HA
                
              } else {
                ESP_LOGD("window", "${zone_name}: Window recovering %lu / ${recovery_timeout} seconds", 
                         recovery_duration);
              }
            }
          }

# ============================================================================
# DIAGNOSTIC STATE SENSOR
# ============================================================================

text_sensor:
  - platform: template
    id: ${zone_slug}_window_state
    name: "${zone_name} Window State"
    icon: "mdi:window-open-variant"
    update_interval: 5s
    lambda: |-
      if (id(${zone_slug}_window_shutdown_active)) {
        if (id(${zone_slug}_window_recovery_start_time) > 0) {
          return {"Window Recovering"};
        } else {
          return {"Window Open"};
        }
      } else {
        // Check if window is currently open (within grace period)
        if (id(${zone_slug}_window_sensor).has_state() && id(${zone_slug}_window_sensor).state) {
          unsigned long open_duration = (millis() - id(${zone_slug}_window_open_time)) / 1000;
          return {"Normal (window open " + to_string((int)open_duration) + "s)"};
        } else {
          return {"Normal"};
        }
      }
