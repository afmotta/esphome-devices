defaults:
  pwm_period: 60s
  kp: 0.8
  ki: 0.005
  kd: 0.05

packages:
  pid: !include
    file: ./pid.yaml
    vars:
      circuit_slug: "radiant_${room_slug}"
      circuit_name: "Radiant ${room_name}"
      sensor: ${temperature_sensor}
      kp: ${kp}
      ki: ${ki}
      kd: ${kd}

output:
  - platform: slow_pwm
    id: slow_pwm_${room_slug}
    period: ${pwm_period}
    turn_on_action:
      - switch.turn_on: ${relay_id}
    turn_off_action:
      - switch.turn_off: ${relay_id}

climate:
  - id: !extend pid_radiant_${room_slug}
    heat_output: slow_pwm_${room_slug}
