# VMC Modbus Diagnostics - Epic 18 Stories 18.3.1, 18.3.2, 18.3.3
#
# Alarm decoding, filter maintenance tracking, and communication health
# for Cappellotto Air Fresh I VMC.
#
# Alarm Registers (packed bits):
# - 769: Alarms 1-16
# - 770: Alarms 17-32
# - 771: Alarms 33-39 (bits 0-6)
# - 1104: Cumulative alarm status
#
# Filter Maintenance Registers (32-bit values):
# - 1603-1604: Filter hours limit
# - 1605-1606: Filter hours current
#
# Required vars:
#   vmc_slug: Device slug for entity IDs (e.g., "first_floor_vmc")
#   vmc_name: Friendly name prefix (e.g., "VMC Primo Piano")

sensor:
  # ============================================================================
  # Filter Maintenance Tracking - Story 18.3.2
  # ============================================================================

  # Filter hours limit (32-bit) - Registers 1603-1604
  - platform: modbus_controller
    modbus_controller_id: ${vmc_slug}_controller
    name: "${vmc_name} Filter Hours Limit"
    id: ${vmc_slug}_filter_hours_limit
    register_type: holding
    address: 1603
    value_type: U_DWORD
    unit_of_measurement: "h"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-sand
    entity_category: diagnostic

  # Filter hours current (32-bit) - Registers 1605-1606
  - platform: modbus_controller
    modbus_controller_id: ${vmc_slug}_controller
    name: "${vmc_name} Filter Hours Current"
    id: ${vmc_slug}_filter_hours_current
    register_type: holding
    address: 1605
    value_type: U_DWORD
    unit_of_measurement: "h"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-outline
    entity_category: diagnostic

  # Filter hours remaining (calculated)
  - platform: template
    name: "${vmc_name} Filter Hours Remaining"
    id: ${vmc_slug}_filter_hours_remaining
    unit_of_measurement: "h"
    accuracy_decimals: 0
    icon: mdi:timer-alert
    entity_category: diagnostic
    lambda: |-
      float limit = id(${vmc_slug}_filter_hours_limit).state;
      float current = id(${vmc_slug}_filter_hours_current).state;
      if (std::isnan(limit) || std::isnan(current)) return NAN;
      return limit - current;
    update_interval: 60s

binary_sensor:
  # ============================================================================
  # Communication Health - Story 18.3.3
  # ============================================================================

  # Communication error indicator
  # Uses cumulative alarm register 1104 to detect communication issues
  - platform: template
    name: "${vmc_name} Communication Error"
    id: ${vmc_slug}_communication_error
    device_class: problem
    icon: mdi:lan-disconnect
    entity_category: diagnostic
    lambda: |-
      // Check if any temperature sensor is NaN (indicating communication failure)
      return std::isnan(id(${vmc_slug}_outdoor_temp).state) &&
             std::isnan(id(${vmc_slug}_exhaust_temp).state);

  # ============================================================================
  # Cumulative Alarm Status - Story 18.3.1 (FR13)
  # ============================================================================

  # Master alarm indicator - Register 1104
  - platform: modbus_controller
    modbus_controller_id: ${vmc_slug}_controller
    name: "${vmc_name} Alarm Active"
    id: ${vmc_slug}_alarm_active
    register_type: holding
    address: 1104
    bitmask: 0x0001
    device_class: problem
    icon: mdi:alert-circle
    on_press:
      then:
        - logger.log:
            level: ERROR
            format: "VMC ALARM DETECTED on %s"
            args: ['"${vmc_name}"']
        - number.set:
            id: ${vmc_slug}_fan_speed
            value: 0
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "VMC Alarm cleared on %s"
            args: ['"${vmc_name}"']

  # Filter maintenance due indicator
  - platform: template
    name: "${vmc_name} Filter Maintenance Due"
    id: ${vmc_slug}_filter_maintenance_due
    device_class: problem
    icon: mdi:air-filter
    entity_category: diagnostic
    lambda: |-
      float remaining = id(${vmc_slug}_filter_hours_remaining).state;
      if (std::isnan(remaining)) return false;
      return remaining <= 0;

  # ============================================================================
  # Detailed Alarm Decoding - Story 18.3.1 (FR12)
