# MEV Demand Aggregation
#
# Creates 3 proportional demand sensors (CO2, IAQ, Humidity) and aggregates
# them using MAX into a single demand signal with dominant demand tracking.
#
# Required vars:
#   mev_slug: Device slug for entity IDs (e.g., "first_floor_mev")
#   mev_name: Friendly name prefix (e.g., "VMC Primo Piano")
#   co2_sensor: Sensor ID for CO2 input (e.g., first_floor_max_co2)
#   iaq_sensor: Sensor ID for IAQ input (e.g., first_floor_max_iaq)
#   humidity_sensor: Sensor ID for humidity input
#
# Depends on (must exist in merged config):
#   ${mev_slug}_min_fan_speed - Minimum fan speed sensor (imported by mev.yaml)
#
# Exposes:
#   sensor.${mev_slug}_max_demand       - MAX of all demands (0-100%)
#   sensor.${mev_slug}_co2_demand       - CO2 demand %
#   sensor.${mev_slug}_iaq_demand       - IAQ demand %
#   sensor.${mev_slug}_humidity_demand  - Humidity demand %
#   sensor.${mev_slug}_humidity_rate    - Humidity rate of change (via trend)
#   text_sensor.${mev_slug}_dominant_demand - Which demand drives fan speed

packages:
  co2_demand: !include
    file: ../vesta/packages/components/proportional_demand_sensor.yaml
    vars:
      component_id: ${mev_slug}
      component_name: ${mev_name}
      demand_slug: co2
      demand_name: CO2
      unit_of_measurement: ppm
      source_sensor_id: ${co2_sensor}
      min_output_id: ${mev_slug}_min_fan_speed
      lower_bound_entity: "input_number.mev_co2_lower_bound"
      upper_bound_entity: "input_number.mev_co2_upper_bound"
      rate_multiplier: "0.05"
      icon: mdi:molecule-co2

  iaq_demand: !include
    file: ../vesta/packages/components/proportional_demand_sensor.yaml
    vars:
      component_id: ${mev_slug}
      component_name: ${mev_name}
      demand_slug: iaq
      demand_name: IAQ
      unit_of_measurement: IAQ
      source_sensor_id: ${iaq_sensor}
      min_output_id: ${mev_slug}_min_fan_speed
      lower_bound_entity: "input_number.mev_iaq_lower_bound"
      upper_bound_entity: "input_number.mev_iaq_upper_bound"
      rate_multiplier: "2.0"
      icon: mdi:air-filter

  humidity_demand: !include
    file: ../vesta/packages/components/proportional_demand_sensor.yaml
    vars:
      component_id: ${mev_slug}
      component_name: ${mev_name}
      demand_slug: humidity
      demand_name: Humidity
      source_sensor_id: ${humidity_sensor}
      min_output_id: ${mev_slug}_min_fan_speed
      lower_bound_entity: "input_number.mev_humidity_lower_bound"
      upper_bound_entity: "input_number.mev_humidity_upper_bound"
      rate_multiplier: "20.0"
      icon: mdi:water-percent

sensor:
  # MAX demand aggregation
  - platform: template
    name: "${mev_name} Max Demand"
    id: ${mev_slug}_max_demand
    unit_of_measurement: "%"
    icon: mdi:speedometer
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      float co2 = id(${mev_slug}_co2_demand).state;
      float iaq = id(${mev_slug}_iaq_demand).state;
      float humidity = id(${mev_slug}_humidity_demand).state;
      float min_fan = id(${mev_slug}_min_fan_speed).state;

      if (isnan(min_fan)) min_fan = 20.0f;
      float f_co2 = isnan(co2) ? min_fan : co2;
      float f_iaq = isnan(iaq) ? min_fan : iaq;
      float f_hum = isnan(humidity) ? min_fan : humidity;

      float max_demand = std::max({f_co2, f_iaq, f_hum});

      // Update dominant demand diagnostics
      std::string dominant = "Ventilation";
      if (max_demand > min_fan) {
        if (max_demand == f_co2) dominant = "CO2";
        else if (max_demand == f_iaq) dominant = "IAQ";
        else if (max_demand == f_hum) dominant = "Humidity";
      }
      id(${mev_slug}_dominant_demand).publish_state(dominant);

      return std::min(100.0f, max_demand);

text_sensor:
  - platform: template
    name: "${mev_name} Dominant Demand"
    id: ${mev_slug}_dominant_demand
    icon: mdi:gauge
    entity_category: diagnostic
