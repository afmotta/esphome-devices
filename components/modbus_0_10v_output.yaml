# Component: modbus_0_10v_output.yaml
# Purpose: Control single-channel output from 0-10V Modbus adapter
# Required vars:
#   - adapter_id: Modbus device id (e.g., modbus_0_10v_adapter_fancoils_ground_floor)
#   - output_id: Output ID for PID controller (e.g., fancoil_soggiorno_output)
#   - register_address: Modbus register address (default: 0x0001)
#
# Optional vars:
#   - friendly_name: Display name for sensors (default: device friendly_name)
#
# Usage Example:
# packages:
#   second_floor_fancoil_0_10v_output_1: !include
#     file: ../components/modbus_0_10v_output.yaml
#     vars:
#       adapter_id: modbus_0_10v_adapter_fancoils_ground_floor
#       output_id: fancoil_soggiorno_output
#       register_address: 0x42049
#
# The component creates:
# - number platform for register writes (0-10000 = 0-10V)
# - template output for PID controller connection (0.0-1.0 → 0-10000)
# - diagnostic sensors for adapter status
#
# NOTE: modbus_controller must be defined separately at device level

# Number platform for direct register control (used by template output)
number:
  - platform: modbus_controller
    modbus_controller_id: ${adapter_id}
    id: ${adapter_id}_register_${register_address}
    address: ${register_address}
    value_type: U_WORD
    min_value: 0
    max_value: 1000
    mode: box
    internal: true

# Template output for PID controller integration
# Converts PID float output (0.0-1.0) to register value (0-10000)
output:
  - platform: template
    id: ${output_id}
    type: float
    write_action:
      - number.set:
          id: ${adapter_id}_register_${register_address}
          value: !lambda "return state * 1000.0;"
      - logger.log:
          format: "PID output %.2f → register %.0f"
          args: ["state", "state * 1000.0"]

# Diagnostic sensor: Current fancoil capacity percentage
sensor:
  - platform: template
    id: ${output_id}_capacity
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:fan"
    lambda: |-
      // Convert register value (0-10000) to percentage (0-100%)
      if (id(${adapter_id}_register_${register_address}).has_state()) {
        return id(${adapter_id}_register_${register_address}).state / 100.0;
      }
      return NAN;
    update_interval: 10s

# Diagnostic sensor: Adapter communication status
binary_sensor:
  - platform: template
    id: ${output_id}_status
    device_class: connectivity
    lambda: |-
      // Check if we can communicate with the 0-10V adapter
      // If register has a state, adapter is responding
      return id(${adapter_id}_register_${register_address}).has_state();
