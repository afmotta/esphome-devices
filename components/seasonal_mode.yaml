# Three-Tier Seasonal Mode Selection (ESPHome Native)
# Architecture:
# Tier 1: Calendar Gates (Hard Locks) - Oct 15 - Apr 15 (HEAT), Jun 1 - Aug 31 (COOL)
# Tier 2: Weather Intelligence (Note: Currently uses HA forecast guidance if available)
# Tier 3: Demand-Driven Transitions (Shoulder Seasons) - PID heat/cool requests

select:
  - platform: template
    name: "Heat Pump Mode"
    id: hp_mode
    options:
      - "HEAT"
      - "COOL"
      - "SANITARY_ONLY"
    icon: mdi:heat-pump
    optimistic: true
    restore_value: true

text_sensor:
  - platform: template
    name: "Heat Pump Mode Reason"
    id: hp_mode_reason
    icon: mdi:information-outline

  - platform: template
    name: "Season Classification"
    id: season_classification
    icon: mdi:calendar-range
    update_interval: 1min
    lambda: |-
      auto time = id(pcf85063_time).now();
      if (!time.is_valid()) return {"Unknown"};
      int m = time.month;
      int d = time.day_of_month;

      // Winter Lock: Oct 15 - Apr 15
      bool in_winter = (m == 10 && d >= 15) || m > 10 || m < 4 || (m == 4 && d < 15);
      // Summer Lock: Jun 1 - Aug 31
      bool in_summer = (m >= 6 && m <= 8);
      // Spring Shoulder: Apr 15 - May 31
      bool in_spring_shoulder = (m == 4 && d >= 15) || (m == 5);
      // Autumn Shoulder: Sep 1 - Oct 14
      bool in_autumn_shoulder = (m == 9) || (m == 10 && d < 15);

      if (in_winter) return {"Winter Lock"};
      if (in_summer) return {"Summer Lock"};
      if (in_spring_shoulder) return {"Spring Shoulder"};
      if (in_autumn_shoulder) return {"Autumn Shoulder"};
      return {"Unknown"};

binary_sensor:
  # Compatibility sensor for existing components
  - platform: template
    id: summer_mode
    name: "Summer Mode"
    internal: true
    lambda: |-
      return id(hp_mode).current_option() == "COOL";

  # Global demand sensors - implementation provided in device file
  - platform: template
    id: any_pid_requesting_heat
    name: "Any PID Requesting Heat"
    device_class: heat

  - platform: template
    id: any_pid_requesting_cool
    name: "Any PID Requesting Cool"
    device_class: cold

script:
  - id: check_calendar_gates
    then:
      - lambda: |-
          auto time = id(pcf85063_time).now();
          if (!time.is_valid()) return;
          int m = time.month;
          int d = time.day_of_month;

          // Winter Lock: Oct 15 - Apr 15
          bool in_winter = (m == 10 && d >= 15) || m > 10 || m < 4 || (m == 4 && d < 15);
          // Summer Lock: Jun 1 - Aug 31
          bool in_summer = (m >= 6 && m <= 8);

          if (in_winter) {
             if (id(hp_mode).current_option() != "HEAT") {
                auto call = id(hp_mode).make_call();
                call.set_option("HEAT");
                call.perform();
                id(hp_mode_reason).publish_state("CALENDAR_LOCK");
                ESP_LOGI("seasonal_mode", "Winter Lock: HEAT");
             }
          } else if (in_summer) {
             if (id(hp_mode).current_option() != "COOL") {
                auto call = id(hp_mode).make_call();
                call.set_option("COOL");
                call.perform();
                id(hp_mode_reason).publish_state("CALENDAR_LOCK");
                ESP_LOGI("seasonal_mode", "Summer Lock: COOL");
             }
          } else {
             // Shoulder Transition entry points (reset to SANITARY_ONLY once at the start)
             if ((m == 4 && d == 15 && time.hour == 0 && time.minute == 0) || 
                 (m == 9 && d == 1 && time.hour == 0 && time.minute == 0)) {
                if (id(hp_mode).current_option() != "SANITARY_ONLY") {
                   auto call = id(hp_mode).make_call();
                   call.set_option("SANITARY_ONLY");
                   call.perform();
                   id(hp_mode_reason).publish_state("CALENDAR_LOCK");
                }
             }
          }

  - id: check_demand_transitions
    then:
      - lambda: |-
          auto time = id(pcf85063_time).now();
          if (!time.is_valid()) return;
          int m = time.month;
          int d = time.day_of_month;

          // Shoulder periods: Apr 15 - May 31, Sep 1 - Oct 14
          bool is_shoulder = (m == 4 && d >= 15) || (m == 5) || (m == 9) || (m == 10 && d < 15);

          if (is_shoulder) {
            if (id(any_pid_requesting_heat).state && id(hp_mode).current_option() != "HEAT") {
              auto call = id(hp_mode).make_call();
              call.set_option("HEAT");
              call.perform();
              id(hp_mode_reason).publish_state("DEMAND");
              ESP_LOGI("seasonal_mode", "Demand Transition: HEAT");
            } else if (id(any_pid_requesting_cool).state && id(hp_mode).current_option() != "COOL") {
              auto call = id(hp_mode).make_call();
              call.set_option("COOL");
              call.perform();
              id(hp_mode_reason).publish_state("DEMAND");
              ESP_LOGI("seasonal_mode", "Demand Transition: COOL");
            }
          }

interval:
  - interval: 1min
    then:
      - script.execute: check_calendar_gates
      - script.execute: check_demand_transitions
