# ============================================================================
# Bagno Grande Room Component - First Floor
# ============================================================================
#
# Complete room climate control component for Bagno Grande
# Includes: HA temperature sensor, PID controller, diagnostic sensors, slow PWM output

packages:
  room_sensors: !include
    file: ../../room_sensors.yaml
    vars:
      zone_slug: "bagno_grande"
      zone_name: "Bagno Grande"
      ha_temperature_sensor_id: "sensor.room_bagno_grande_temperature"
  pid_radiant: !include
    file: ../../pid.yaml
    vars:
      circuit_slug: "radiant_bagno_grande"
      circuit_name: "Radiant Bagno Grande"
      output: slow_pwm_bagno_grande
      sensor: bagno_grande_room_temp_abstracted
      kp: 0.8
      ki: 0.005
      kd: 0.05
      pump_management_script: first_floor_radiant_pump_management
  emergency_shutdown: !include
    file: ../../room_emergency_shutdown.yaml
    vars:
      zone_slug: "bagno_grande"
      zone_name: "Bagno Grande"
      pid_id: pid_radiant_bagno_grande

output:
  - platform: slow_pwm
    id: slow_pwm_bagno_grande
    period: 60s
    turn_on_action:
      - switch.turn_on: relay_12
    turn_off_action:
      - switch.turn_off: relay_12

climate:
  - id: !extend pid_radiant_bagno_grande
    cool_output: !remove
