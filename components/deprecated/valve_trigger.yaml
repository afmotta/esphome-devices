# DEPRECATED: This component is no longer used
# Deprecated: October 22, 2025 (Epic 2: PID Architecture Simplification)
# Replaced by: Simple lambda automation based on climate_mode sensor
# See: docs/epic-2-migration-guide.md for migration instructions
# ============================================================================

defaults:
  mode_mapping:
    COOL: "cool"
    HEAT: "heat"

binary_sensor:
  - platform: template
    name: "Trigger Miscelatrice ${circuit_name} ${mode_mapping[mode]}"
    id: pump_trigger_${circuit_slug}_${mode_mapping[mode]}
    device_class: running
    trigger_on_initial_state: true
    lambda: |-
      return id(${trigger}).state;
    on_state:
      lambda: |-
        auto call = id(pid_${circuit_slug}_${mode_mapping[mode]}).make_call();
        if (x && id(climate_mode).state == "${mode}") {
          call.set_mode("${mode}");
        } else {
          call.set_mode("OFF");
        }
        call.perform();
