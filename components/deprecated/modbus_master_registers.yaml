# Component: modbus_master_registers.yaml
# Purpose: Expose master temperature sensors and coordination data via Modbus holding registers
# Required vars:
#   - dallas_sensor_id: ID of Dallas temperature sensor to expose
#   - climate_mode_sensor_id: ID of climate mode text sensor from Home Assistant
# Feature flag: use_modbus (substitution) - must be "true" to function
# Dependency: Requires modbus_master component to be included

# Register definitions (holding registers - read by slaves)
# Register 100 (0x0064): Ground floor supply temperature (INT16, ×100 scaling)
# Register 200 (0x00C8): Climate mode (UINT16, enum: 0=off, 1=heat, 2=cool)
# Register 300 (0x012C): Master heartbeat counter (UINT16)

number:
  # Register 100: Dallas temperature sensor (ground floor supply)
  - platform: modbus_controller
    modbus_controller_id: modbus_master
    id: modbus_reg_dallas_temp
    name: "Modbus Reg 100 Temperature"
    address: 0x0064
    value_type: S_WORD
    min_value: -5000
    max_value: 10000
    step: 1
    mode: box
    internal: true
    unit_of_measurement: "×0.01°C"

  # Register 200: Climate mode (0=off, 1=heat, 2=cool)
  - platform: modbus_controller
    modbus_controller_id: modbus_master
    id: modbus_reg_climate_mode
    name: "Modbus Reg 200 Climate Mode"
    address: 0x00C8
    value_type: U_WORD
    min_value: 0
    max_value: 2
    step: 1
    mode: box
    internal: true

  # Register 300: Master heartbeat counter
  - platform: modbus_controller
    modbus_controller_id: modbus_master
    id: modbus_reg_heartbeat
    name: "Modbus Reg 300 Heartbeat"
    address: 0x012C
    value_type: U_WORD
    min_value: 0
    max_value: 65535
    step: 1
    mode: box
    internal: true

# Interval scripts to sync sensor values to Modbus registers
interval:
  # Sync Dallas temperature sensor to register 100 every 10 seconds
  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              std::string flag = "${use_modbus}";
              return (flag == "true");
          then:
            - lambda: |-
                // Read Dallas sensor value and scale by 100 for 0.01°C precision
                if (id(${dallas_sensor_id}).has_state()) {
                  float temp_celsius = id(${dallas_sensor_id}).state;
                  int16_t temp_scaled = (int16_t)(temp_celsius * 100);
                  id(modbus_reg_dallas_temp).publish_state(temp_scaled);
                  ESP_LOGD("modbus_registers", "Updated reg 100: %.2f°C → %d", temp_celsius, temp_scaled);
                }

  # Sync climate mode text to register 200 every 10 seconds
  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              std::string flag = "${use_modbus}";
              return (flag == "true");
          then:
            - lambda: |-
                // Convert text mode to numeric: heat=1, cool=2, off=0
                if (id(${climate_mode_sensor_id}).has_state()) {
                  std::string mode = id(${climate_mode_sensor_id}).state;
                  uint16_t mode_value = 0;
                  if (mode == "heat") {
                    mode_value = 1;
                  } else if (mode == "cool") {
                    mode_value = 2;
                  }
                  id(modbus_reg_climate_mode).publish_state(mode_value);
                  ESP_LOGD("modbus_registers", "Updated reg 200: %s → %d", mode.c_str(), mode_value);
                }

  # Update heartbeat counter every 10 seconds
  - interval: 10s
    then:
      - if:
          condition:
            lambda: |-
              std::string flag = "${use_modbus}";
              return (flag == "true");
          then:
            - lambda: |-
                // Increment heartbeat counter (wraps at 65535)
                static uint16_t heartbeat = 0;
                heartbeat++;
                id(modbus_reg_heartbeat).publish_state(heartbeat);
                ESP_LOGD("modbus_registers", "Updated reg 300: heartbeat %d", heartbeat);

# Diagnostic sensor showing register sync status
binary_sensor:
  - platform: template
    name: "Modbus Master Polling Active"
    id: modbus_master_polling_active
    icon: "mdi:sync"
    lambda: |-
      std::string flag = "${use_modbus}";
      if (flag == "false") {
        return false;
      }
      // Check if registers have been updated recently
      return id(modbus_reg_heartbeat).state > 0;
