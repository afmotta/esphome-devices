substitutions:
  update_interval: 1s
  id_offset: 0

modbus_controller:
  - id: ${controller_id}
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}

packages:
  output_1: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 1
      register_address: 0x0000
  output_2: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 2
      register_address: 0x0001
  output_3: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 3
      register_address: 0x0002
  output_4: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 4
      register_address: 0x0003
  output_5: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 5
      register_address: 0x0004
  output_6: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 6
      register_address: 0x0005
  output_7: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 7
      register_address: 0x0006
  output_8: !include
    file: ../components/modbus_analog_output.yaml
    vars:
      output_number: 8
      register_address: 0x0007

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${controller_id}
    name: "${controller_name} Status"
    id: ${controller_id}_status
    register_type: read
    address: 0x0000
    device_class: connectivity
    internal: true
