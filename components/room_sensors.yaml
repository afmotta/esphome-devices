# Component: room_sensors.yaml
# Purpose: 3-tier sensor failover (HA → UDP → Emergency) for PID control
#
# Required vars:
#   - room_slug: Room identifier (e.g., "soggiorno", "bagno_grande")
#   - room_name: Display name (e.g., "Soggiorno", "Bagno Grande")
#   - ha_temperature_sensor_id: HA entity ID (e.g., "sensor.room_soggiorno_temperature")
#   - ha_humidity_sensor_id: HA entity ID (e.g., "sensor.room_soggiorno_humidity")
#
# Exposes:
#   - sensor.{zone}_temp_abstracted: Temperature for PID controllers (internal)
#   - text_sensor.{zone}_sensor_tier: Active tier ("UDP", "HA", or "Emergency")
#   - sensor.{zone}_dew_point: Dew point temperature (°C)
#
# Tier Priority Rules:
#   | HA Sensor  | UDP Sensor  | Active Tier         | Abstracted Value |
#   |------------|-------------|---------------------|------------------|
#   | Valid      | Valid       | Tier 1 (HA)         | HA value         |
#   | Valid      | NaN         | Tier 1 (HA)         | HA value         |
#   | NaN        | Valid       | Tier 2 (UDP)        | UDP value        |
#   | NaN        | NaN         | Tier 3 (Emergency)  | NaN              |
# ============================================================================

sensor:
  - platform: packet_transport
    id: ${room_slug}_temp_udp
    provider: room-sensor-${room_slug | replace('_', '-')}
    internal: true
    filters:
      - filter_out: nan

  - platform: packet_transport
    id: ${room_slug}_humidity_udp
    provider: room-sensor-${room_slug | replace('_', '-')}
    internal: true
    filters:
      - filter_out: nan

  - platform: homeassistant
    entity_id: ${ha_temperature_sensor_id}
    id: ${room_slug}_temp_ha
    internal: true
    filters:
      - filter_out: nan

  - platform: homeassistant
    entity_id: ${ha_humidity_sensor_id}
    id: ${room_slug}_humidity_ha
    internal: true
    filters:
      - filter_out: nan

  # ============================================================================
  # ABSTRACTED SENSOR (3-Tier Failover Logic)
  # ============================================================================
packages:
  temperature_failover: !include
    file: ../vesta/packages/components/failover_sensor.yaml
    vars:
      sensor_id: ${room_slug}_temp_abstracted
      sensor_name: "${room_name} Temperature (Abstracted)"
      unit_of_measurement: "°C"
      device_class: temperature
      primary_sensor: ${room_slug}_temp_ha
      secondary_sensor: ${room_slug}_temp_udp
  humidity_failover: !include
    file: ../vesta/packages/components/failover_sensor.yaml
    vars:
      sensor_id: ${room_slug}_humidity_abstracted
      sensor_name: "${room_name} Humidity (Abstracted)"
      unit_of_measurement: "%"
      device_class: humidity
      primary_sensor: ${room_slug}_humidity_ha
      secondary_sensor: ${room_slug}_humidity_udp

  # ============================================================================
  # DEW POINT (native ESPHome 2026.3+ sensor)
  # ============================================================================
  dew_point:
    sensor:
      - platform: dew_point
        name: "${room_name} Dew Point"
        id: ${room_slug}_dew_point
        temperature: ${room_slug}_temp_abstracted
        humidity: ${room_slug}_humidity_abstracted
        accuracy_decimals: 0
