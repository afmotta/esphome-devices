# Component: pid_autotune_with_fancoil.yaml
# Purpose: Safe PID autotune with fancoil/boost interference prevention
#
# Required vars:
#   - room_slug: Room identifier (e.g., "soggiorno")
#   - room_name: Display name (e.g., "Soggiorno")
#   - pid_id: PID climate entity to tune (e.g., "pid_radiant_soggiorno")
#   - fancoil_pid_id: Fancoil PID to disable during autotune
# ============================================================================

button:
  - platform: template
    name: "Autotune ${room_name}"
    id: autotune_${room_slug}
    icon: "mdi:tune"
    entity_category: config
    on_press:
      - logger.log:
          format: "[Autotune] Starting autotune for ${room_name} - disabling interferences"
          level: INFO
      # Disable boost mode
      - lambda: |-
          id(${room_slug}_boost_active) = false;
          ESP_LOGI("autotune", "Disabled boost mode for ${room_slug}");
      # Turn off fancoil
      - climate.control:
          id: ${fancoil_pid_id}
          mode: "OFF"
      - logger.log:
          format: "[Autotune] Disabled fancoil ${fancoil_pid_id}"
          level: INFO
      # Delay to let things settle
      - delay: 2s
      # Start autotune
      - climate.pid.autotune: ${pid_id}
      - logger.log:
          format: "[Autotune] Autotune started for ${pid_id}"
          level: INFO
