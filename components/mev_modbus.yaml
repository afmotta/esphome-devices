# MEV Modbus Component - Mechanical Extract Ventilation via Modbus
# Epic 18: MEV Modbus Migration
#
# Complete Modbus-based control for Cappellotto Air Fresh I MEV.
# Replaces relay-based control (4 relays freed) while retaining
# 0-10V DAC for fan speed modulation.
#
# Features:
# - On/Off, mode, dehumidify, integration via Modbus writes
# - 5 internal temperature sensors
# - Component state monitoring (fans, compressor, dampers, valves)
# - 39 detailed alarm types + cumulative alarm
# - Filter hours tracking for condition-based maintenance
# - Demand-based ventilation (CO2, IAQ, humidity)
# - Humidity cascade state machine
#
# Required vars:
#   mev_slug: Device slug for entity IDs (e.g., "first_floor_mev")
#   mev_name: Friendly name prefix (e.g., "MEV Primo Piano")
#   modbus_bus_id: ID of the modbus bus (e.g., rs485_bus)
#   fan_speed_output: DAC output ID for 0-10V fan speed (e.g., analog_output_7)
#   humidity_sensor: Sensor ID for humidity input
#
# Optional vars:
#   modbus_address: MEV Modbus address (default: 0x10)
#   update_interval: Modbus polling interval (default: 30s)
#
# MEV Configuration Requirements (one-time external setup):
# - Modbus address: 0x10 (16 decimal)
# - Serial: 9600 baud, 8N1 (parity set to None)

defaults:
  modbus_address: "0x10"
  update_interval: 30s

packages:
  # Demand sensors for ventilation control (reusable component)
  co2_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      mev_slug: ${mev_slug}
      mev_name: ${mev_name}
      demand_slug: co2
      demand_name: CO2
      unit_of_measurement: ppm
      source_sensor_id: first_floor_max_co2
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "0.05"
      icon: mdi:molecule-co2

  iaq_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      mev_slug: ${mev_slug}
      mev_name: ${mev_name}
      demand_slug: iaq
      demand_name: IAQ
      unit_of_measurement: IAQ
      source_sensor_id: first_floor_max_iaq
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "2.0"
      icon: mdi:air-filter

  humidity_demand: !include
    file: proportional_demand_sensor.yaml
    vars:
      mev_slug: ${mev_slug}
      mev_name: ${mev_name}
      demand_slug: humidity
      demand_name: Humidity
      source_sensor_id: ${humidity_sensor}
      min_val_id: ${mev_slug}_min_fan_speed
      rate_multiplier: "20.0"
      icon: mdi:water-percent

# ============================================================================
# Modbus Controller Setup
# ============================================================================
modbus_controller:
  - id: ${mev_slug}_controller
    address: ${modbus_address}
    modbus_id: ${modbus_bus_id}
    update_interval: ${update_interval}
    setup_priority: -10
    command_throttle: 100ms

# ============================================================================
# Control Switches (replaces relays 18-21)
# ============================================================================
switch:
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Power"
    id: ${mev_slug}_power
    register_type: holding
    address: 1106
    bitmask: 1
    icon: mdi:power

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Summer Mode"
    id: ${mev_slug}_summer_mode
    register_type: holding
    address: 1584
    bitmask: 1
    icon: mdi:sun-snowflake-variant

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Dehumidifier"
    id: ${mev_slug}_dehumidifier
    register_type: holding
    address: 1141
    bitmask: 1
    icon: mdi:water-percent

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Cooling"
    id: ${mev_slug}_cooling
    register_type: holding
    address: 1140
    bitmask: 1
    icon: mdi:snowflake

# ============================================================================
# Sensors
# ============================================================================
sensor:
  # Temperature Sensors (value / 10 = C)
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Outdoor Temperature"
    id: ${mev_slug}_outdoor_temp
    register_type: holding
    address: 501
    value_type: S_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:thermometer
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Water Temperature"
    id: ${mev_slug}_water_temp
    register_type: holding
    address: 502
    value_type: S_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:water-thermometer
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Exhaust Temperature"
    id: ${mev_slug}_exhaust_temp
    register_type: holding
    address: 503
    value_type: S_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:fan-chevron-up
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Freecooling Temperature"
    id: ${mev_slug}_freecooling_temp
    register_type: holding
    address: 511
    value_type: S_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:snowflake-thermometer
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Evaporation Temperature"
    id: ${mev_slug}_evaporation_temp
    register_type: holding
    address: 512
    value_type: S_WORD
    unit_of_measurement: "C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    icon: mdi:coolant-temperature
    filters:
      - multiply: 0.1

  # Filter Maintenance Tracking
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Filter Hours Limit"
    id: ${mev_slug}_filter_hours_limit
    register_type: holding
    address: 1603
    value_type: U_DWORD
    unit_of_measurement: "h"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-sand
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Filter Hours Current"
    id: ${mev_slug}_filter_hours_current
    register_type: holding
    address: 1605
    value_type: U_DWORD
    unit_of_measurement: "h"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:timer-outline
    entity_category: diagnostic

  - platform: template
    name: "${mev_name} Filter Hours Remaining"
    id: ${mev_slug}_filter_hours_remaining
    unit_of_measurement: "h"
    accuracy_decimals: 0
    icon: mdi:timer-alert
    entity_category: diagnostic
    lambda: |-
      float limit = id(${mev_slug}_filter_hours_limit).state;
      float current = id(${mev_slug}_filter_hours_current).state;
      if (std::isnan(limit) || std::isnan(current)) return NAN;
      return limit - current;
    update_interval: 60s

  # HA Configuration Imports
  - platform: homeassistant
    entity_id: input_number.mev_escalation_fan_threshold
    id: ${mev_slug}_escalation_threshold
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_deescalation_fan_threshold
    id: ${mev_slug}_deescalation_threshold
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_minimum_fan_speed
    id: ${mev_slug}_min_fan_speed
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_escalation_delay_minutes
    id: ${mev_slug}_escalation_delay
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_deescalation_delay_minutes
    id: ${mev_slug}_deescalation_delay
    internal: true

  # Final Fan Speed Calculation
  - platform: template
    name: "${mev_name} Final Fan Speed"
    id: ${mev_slug}_final_fan_speed
    unit_of_measurement: "%"
    icon: mdi:fan-speed-3
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      if (id(${mev_slug}_alarm_active).state) {
        return 0.0f;
      }
      float co2 = id(${mev_slug}_co2_demand).state;
      float iaq = id(${mev_slug}_iaq_demand).state;
      float humidity = id(${mev_slug}_humidity_demand).state;
      float min_fan = id(${mev_slug}_min_fan_speed).state;
      if (isnan(min_fan)) min_fan = 20.0f;
      float f_co2 = isnan(co2) ? min_fan : co2;
      float f_iaq = isnan(iaq) ? min_fan : iaq;
      float f_hum = isnan(humidity) ? min_fan : humidity;
      float final_speed = std::max({f_co2, f_iaq, f_hum, min_fan});
      std::string dominant = "Ventilation";
      if (final_speed > min_fan) {
        if (final_speed == f_co2) dominant = "CO2";
        else if (final_speed == f_iaq) dominant = "IAQ";
        else if (final_speed == f_hum) dominant = "Humidity";
      }
      id(${mev_slug}_dominant_demand).publish_state(dominant);
      return std::min(100.0f, final_speed);
    on_value:
      then:
        - number.set:
            id: ${mev_slug}_fan_speed
            value: !lambda "return x;"

# ============================================================================
# Binary Sensors
# ============================================================================
binary_sensor:
  # Component State Monitoring
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Supply Fan Active"
    id: ${mev_slug}_supply_fan_active
    register_type: holding
    address: 385
    bitmask: 0x0001
    device_class: running
    icon: mdi:fan

  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Extract Fan Active"
    id: ${mev_slug}_extract_fan_active
