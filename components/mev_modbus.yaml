# ============================================================================
# Text Sensors
# ============================================================================
text_sensor:
  - platform: template
    name: "${mev_name} Dominant Demand"
    id: ${mev_slug}_dominant_demand
    icon: mdi:gauge
    entity_category: diagnostic

  - platform: template
    name: "${mev_name} Automation State"
    id: ${mev_slug}_automation_state
    icon: mdi:state-machine
    entity_category: diagnostic

# ============================================================================
# Humidity Cascade State Machine
# ============================================================================
select:
  - platform: template
    name: "${mev_name} Humidity State"
    id: ${mev_slug}_humidity_state
    options:
      - "Fan Only"
      - "Dehumidifying"
      - "Cooling"
    initial_option: "Fan Only"
    optimistic: true
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return x == "Fan Only";'
          then:
            - switch.turn_off: ${mev_slug}_dehumidifier
            - switch.turn_off: ${mev_slug}_cooling
      - if:
          condition:
            lambda: 'return x == "Dehumidifying";'
          then:
            - switch.turn_on: ${mev_slug}_dehumidifier
            - switch.turn_off: ${mev_slug}_cooling
      - if:
          condition:
            lambda: 'return x == "Cooling";'
          then:
            - switch.turn_on: ${mev_slug}_dehumidifier
            - switch.turn_on: ${mev_slug}_cooling

# ============================================================================
# State Machine Scripts (with built-in delays)
# ============================================================================
# Scripts use mode: restart - restarting resets the delay timer.
# on_press starts the script, on_release stops it (cancels pending transition).
script:
  - id: ${mev_slug}_escalate_to_dehumidifying
    mode: restart
    then:
      - text_sensor.template.publish:
          id: ${mev_slug}_automation_state
          state: "Escalating (Dehum)"
      - delay: !lambda "return id(${mev_slug}_escalation_delay).state * 60000;"
      - select.set:
          id: ${mev_slug}_humidity_state
          option: "Dehumidifying"
      - logger.log:
          format: "MEV: Escalated to Dehumidifying"
          level: INFO
          tag: mev

  - id: ${mev_slug}_escalate_to_cooling
    mode: restart
    then:
      - text_sensor.template.publish:
          id: ${mev_slug}_automation_state
          state: "Escalating (Cooling)"
      - delay: !lambda "return id(${mev_slug}_escalation_delay).state * 60000;"
      - select.set:
          id: ${mev_slug}_humidity_state
          option: "Cooling"
      - logger.log:
          format: "MEV: Escalated to Cooling"
          level: INFO
          tag: mev

  - id: ${mev_slug}_deescalate_to_dehumidifying
    mode: restart
    then:
      - text_sensor.template.publish:
          id: ${mev_slug}_automation_state
          state: "De-escalating (Dehum)"
      - delay: !lambda "return id(${mev_slug}_deescalation_delay).state * 60000;"
      - select.set:
          id: ${mev_slug}_humidity_state
          option: "Dehumidifying"
      - logger.log:
          format: "MEV: De-escalated to Dehumidifying"
          level: INFO
          tag: mev

  - id: ${mev_slug}_deescalate_to_fan_only
    mode: restart
    then:
      - text_sensor.template.publish:
          id: ${mev_slug}_automation_state
          state: "De-escalating (Fan)"
      - delay: !lambda "return id(${mev_slug}_deescalation_delay).state * 60000;"
      - select.set:
          id: ${mev_slug}_humidity_state
          option: "Fan Only"
      - logger.log:
          format: "MEV: De-escalated to Fan Only"
          level: INFO
          tag: mev

  - id: ${mev_slug}_update_idle_state
    mode: restart
    then:
      - lambda: |-
          auto state = id(${mev_slug}_humidity_state).current_option();
          if (state == "Fan Only") {
            id(${mev_slug}_automation_state).publish_state("Idle");
          } else if (state == "Dehumidifying") {
            id(${mev_slug}_automation_state).publish_state("Dehumidifying");
          } else if (state == "Cooling") {
            id(${mev_slug}_automation_state).publish_state("Cooling");
          }

# ============================================================================
# State Machine Transition Conditions (Template Binary Sensors)
# ============================================================================
# These sensors evaluate transition conditions and trigger scripts via on_press/on_release.
# This replaces interval polling with event-driven state machine logic.
binary_sensor:
  - platform: template
    name: "${mev_name} Should Escalate to Dehumidifying"
    id: ${mev_slug}_should_escalate_dehum
    internal: true
    lambda: |-
      auto state = id(${mev_slug}_humidity_state).current_option();
      float fan = id(${mev_slug}_final_fan_speed).state;
      float rate = id(${mev_slug}_humidity_rate).state;
      float thresh = id(${mev_slug}_escalation_threshold).state;
      if (isnan(fan) || isnan(rate) || isnan(thresh)) return false;
      return state == "Fan Only" && fan >= thresh && rate > 0.0f;
    on_press:
      - script.execute: ${mev_slug}_escalate_to_dehumidifying
    on_release:
      - script.stop: ${mev_slug}_escalate_to_dehumidifying
      - script.execute: ${mev_slug}_update_idle_state

  - platform: template
    name: "${mev_name} Should Escalate to Cooling"
    id: ${mev_slug}_should_escalate_cooling
    internal: true
    lambda: |-
      auto state = id(${mev_slug}_humidity_state).current_option();
      float fan = id(${mev_slug}_final_fan_speed).state;
      float rate = id(${mev_slug}_humidity_rate).state;
      float thresh = id(${mev_slug}_escalation_threshold).state;
      bool summer = id(summer_mode).state;
      if (isnan(fan) || isnan(rate) || isnan(thresh)) return false;
      return state == "Dehumidifying" && summer && fan >= thresh && rate > 0.0f;
    on_press:
      - script.execute: ${mev_slug}_escalate_to_cooling
    on_release:
      - script.stop: ${mev_slug}_escalate_to_cooling
      - script.execute: ${mev_slug}_update_idle_state

  - platform: template
    name: "${mev_name} Should De-escalate to Dehumidifying"
    id: ${mev_slug}_should_deescalate_dehum
    internal: true
    lambda: |-
      auto state = id(${mev_slug}_humidity_state).current_option();
      float fan = id(${mev_slug}_final_fan_speed).state;
      float humidity = id(${humidity_sensor}).state;
      float lower = id(${mev_slug}_humidity_lower).state;
      float thresh = id(${mev_slug}_deescalation_threshold).state;
      bool summer = id(summer_mode).state;
      if (isnan(fan) || isnan(humidity) || isnan(lower) || isnan(thresh)) return false;
      return state == "Cooling" && (!summer || (humidity < lower && fan < thresh));
    on_press:
      - script.execute: ${mev_slug}_deescalate_to_dehumidifying
    on_release:
      - script.stop: ${mev_slug}_deescalate_to_dehumidifying
      - script.execute: ${mev_slug}_update_idle_state

  - platform: template
    name: "${mev_name} Should De-escalate to Fan Only"
    id: ${mev_slug}_should_deescalate_fan
    internal: true
    lambda: |-
      auto state = id(${mev_slug}_humidity_state).current_option();
      float fan = id(${mev_slug}_final_fan_speed).state;
      float humidity = id(${humidity_sensor}).state;
      float lower = id(${mev_slug}_humidity_lower).state;
      float thresh = id(${mev_slug}_deescalation_threshold).state;
      if (isnan(fan) || isnan(humidity) || isnan(lower) || isnan(thresh)) return false;
      return state == "Dehumidifying" && humidity < lower && fan < thresh;
    on_press:
      - script.execute: ${mev_slug}_deescalate_to_fan_only
    on_release:
      - script.stop: ${mev_slug}_deescalate_to_fan_only
      - script.execute: ${mev_slug}_update_idle_state

# ============================================================================
# Fan Speed Control (0-10V DAC)
# ============================================================================
number:
  - platform: template
    name: "${mev_name} Fan Speed"
    id: ${mev_slug}_fan_speed
    icon: mdi:fan
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - output.set_level:
          id: ${fan_speed_output}
          level: !lambda "return x / 100.0;"
