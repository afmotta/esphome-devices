    id: ${mev_slug}_reversing_valve_heating
    register_type: holding
    address: 643
    bitmask: 0x0001
    icon: mdi:valve

  # Communication Health
  - platform: template
    name: "${mev_name} Communication Error"
    id: ${mev_slug}_communication_error
    device_class: problem
    icon: mdi:lan-disconnect
    entity_category: diagnostic
    lambda: |-
      return std::isnan(id(${mev_slug}_outdoor_temp).state) &&
             std::isnan(id(${mev_slug}_exhaust_temp).state);

  # Master Alarm Indicator
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Alarm Active"
    id: ${mev_slug}_alarm_active
    register_type: holding
    address: 1104
    bitmask: 0x0001
    device_class: problem
    icon: mdi:alert-circle
    on_press:
      then:
        - logger.log:
            level: ERROR
            format: "MEV ALARM DETECTED on %s"
            args: ['"${mev_name}"']
        - number.set:
            id: ${mev_slug}_fan_speed
            value: 0
    on_release:
      then:
        - logger.log:
            level: INFO
            format: "MEV Alarm cleared on %s"
            args: ['"${mev_name}"']

  - platform: template
    name: "${mev_name} Filter Maintenance Due"
    id: ${mev_slug}_filter_maintenance_due
    device_class: problem
    icon: mdi:air-filter
    entity_category: diagnostic
    lambda: |-
      float remaining = id(${mev_slug}_filter_hours_remaining).state;
      if (std::isnan(remaining)) return false;
      return remaining <= 0;

