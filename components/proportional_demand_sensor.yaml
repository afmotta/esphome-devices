# Component: proportional_demand_sensor.yaml
# Purpose:
#   Calculates demand (0-100%) based on a sensor value and configurable bounds.
#   Encapsulates trend analysis and Home Assistant bounds configuration.
#
# Required vars:
#   - mev_slug: Prefix for entity IDs (e.g., "first_floor_mev")
#   - mev_name: Friendly name prefix (e.g. "VMC Primo Piano")
#   - demand_slug: Short name for demand type (e.g., "humidity", "co2", "iaq")
#   - demand_name: Friendly name for demand type (e.g., "Humidity")
#   - source_sensor_id: ID of the sensor to monitor
#   - min_val_id: ID of the minimum fan speed threshold
#
# Optional vars:
#   - rate_multiplier: Multiplier for the rate boost (default: 0.0)
#   - window_size: Smoothing window size for trend (default: 15)
#   - unit_of_measurement: default "%"
#   - icon: default "mdi:gauge"
#   - accuracy_decimals: default 0
#   - fallback_value: Value to return on error (default: 20.0)

defaults:
  rate_multiplier: "0.0"
  window_size: "15"
  unit_of_measurement: "%"
  icon: "mdi:gauge"
  accuracy_decimals: "0"
  fallback_value: "20.0"

packages:
  trend_sensor: !include
    file: trend_sensor.yaml
    vars:
      sensor_id: ${mev_slug}_${demand_slug}_rate
      source_sensor: ${source_sensor_id}
      sensor_name: "${mev_name} ${demand_name} Rate"
      unit_of_measurement: "${unit_of_measurement}/min"
      window_size: ${window_size}

sensor:
  - platform: homeassistant
    entity_id: input_number.mev_${demand_slug}_lower_bound
    id: ${mev_slug}_${demand_slug}_lower
    internal: true

  - platform: homeassistant
    entity_id: input_number.mev_${demand_slug}_upper_bound
    id: ${mev_slug}_${demand_slug}_upper
    internal: true

  - platform: template
    id: ${mev_slug}_${demand_slug}_demand
    name: "${mev_name} ${demand_name} Demand"
    unit_of_measurement: "${unit_of_measurement}"
    icon: "${icon}"
    accuracy_decimals: ${accuracy_decimals}
    update_interval: 60s
    lambda: |-
      float val = id(${source_sensor_id}).state;
      float min_fan = id(${min_val_id}).state;
      float lower = id(${mev_slug}_${demand_slug}_lower).state;
      float upper = id(${mev_slug}_${demand_slug}_upper).state;

      if (isnan(val) || isnan(min_fan) || isnan(lower) || isnan(upper) || (upper <= lower)) {
        return ${fallback_value}f;
      }

      // Base proportional demand
      float position = (val - lower) / (upper - lower);
      position = std::max(0.0f, std::min(1.0f, position));
      float base_demand = min_fan + (position * (100.0f - min_fan));

      // Optional Rate boost
      float boost = 0.0f;
      float multiplier = (float)${rate_multiplier};
      if (multiplier > 0.0f) {
        float rate = id(${mev_slug}_${demand_slug}_rate).state;
        if (!isnan(rate)) {
          boost = std::max(0.0f, rate * multiplier);
        }
      }

      return std::min(100.0f, base_demand + boost);
