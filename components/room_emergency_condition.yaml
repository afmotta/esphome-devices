# Component: room_emergency_condition.yaml
# Purpose: Detect HA sensor failures and expose state+priority to coordinator
# Epic: Epic 8 - Unified State Machine Architecture
# Interface: Epic 8 Condition Contract v1.0 (docs/epic-8-condition-interface-spec.md)
#
# This component implements emergency shutdown detection (HA sensor failure) following
# the Epic 8 condition interface contract. It exposes state+priority globals that the
# room_control_coordinator.yaml reads to coordinate shutdown actions.
#
# KEY ARCHITECTURE CHANGE from Epic 5:
#   - Epic 5: Monolithic detection + control (PID shutdown in this component)
#   - Epic 8: Separated detection (this component) + control (coordinator component)
#
# Required vars:
#   - zone_slug: Room identifier (e.g., "soggiorno", "bagno_grande")
#   - zone_name: Display name (e.g., "Soggiorno", "Bagno Grande")
#   - ha_temperature_sensor_id: HA entity ID (e.g., "sensor.room_soggiorno_temperature")
#
# Optional vars (with defaults):
#   - emergency_timeout: Seconds before emergency trigger (default: 180 = 3 min)
#   - recovery_timeout: Seconds of stability for recovery (default: 60 = 1 min)
#   - condition_id: Condition identifier for globals (default: "emergency")
#   - priority_value: Priority in coordinator hierarchy (default: 1 = highest)
#
# Exposes (Epic 8 Interface Contract):
#   - global.{zone}_emergency_state: State enum (0=Normal, 1=Active, 2=Recovering)
#   - global.{zone}_emergency_priority: Priority value (1=highest)
#   - text_sensor.{zone}_emergency_state_sensor: Human-readable state for HA dashboard
#   - global.{zone}_emergency_last_trigger_time: Debug timestamp (optional)
#
# State Machine:
#   Normal (0) → Active (1)      [sensor unavailable for emergency_timeout seconds]
#   Active (1) → Recovering (2)  [sensor becomes valid again]
#   Recovering (2) → Normal (0)  [sensor stable for recovery_timeout seconds]
#   Recovering (2) → Active (1)  [sensor fails again during recovery]
#
# Coordinator Integration:
#   - Coordinator reads {zone}_emergency_state and {zone}_emergency_priority globals
#   - Coordinator forces PID OFF when state is Active (1) or Recovering (2)
#   - Coordinator handles PID resume when state returns to Normal (0)
#
# Version History:
#   - v1.0 (Oct 2025): Initial Epic 8 implementation (refactored from room_sensors.yaml v5)

# ============================================================================
# DEFAULT VALUES
# ============================================================================

defaults:
  emergency_timeout: 180  # 3 minutes
  recovery_timeout: 60    # 1 minute
  condition_id: "emergency"
  priority_value: 1       # Highest priority (safety-critical)

# ============================================================================
# INTERFACE CONTRACT: Required Globals
# ============================================================================

globals:
  # State: 0=Normal, 1=Active, 2=Recovering
  - id: ${zone_slug}_${condition_id}_state
    type: int
    restore_value: false
    initial_value: "0"
  
  # Priority: 1=highest (emergency is most critical)
  - id: ${zone_slug}_${condition_id}_priority
    type: int
    restore_value: false
    initial_value: "1"
  
  # Optional debugging: Last trigger timestamp
  - id: ${zone_slug}_${condition_id}_last_trigger_time
    type: unsigned long
    restore_value: false
    initial_value: "0"
  
  # Internal state management (not part of interface contract)
  - id: ${zone_slug}_last_valid_sensor_time
    type: unsigned long
    restore_value: false
    initial_value: "0"
  
  - id: ${zone_slug}_recovery_start_time
    type: unsigned long
    restore_value: false
    initial_value: "0"

# ============================================================================
# HA SENSOR MONITORING
# ============================================================================

sensor:
  - platform: homeassistant
    entity_id: ${ha_temperature_sensor_id}
    id: ${zone_slug}_ha_temperature_emergency
    internal: true
    on_value:
      then:
        - lambda: |-
            // Record timestamp of valid sensor update
            if (!isnan(x)) {
              id(${zone_slug}_last_valid_sensor_time) = millis();
              ESP_LOGV("emergency_condition", "${zone_name}: Valid sensor update (%.1f°C)", x);
            }

# ============================================================================
# STATE MACHINE (10s polling interval)
# ============================================================================

interval:
  - interval: 10s
    then:
      - lambda: |-
          unsigned long now = millis();
          int current_state = id(${zone_slug}_${condition_id}_state);
          
          // ====================================================================
          // Check sensor availability
          // ====================================================================
          bool sensor_valid = false;
          if (id(${zone_slug}_ha_temperature_emergency).has_state()) {
            float value = id(${zone_slug}_ha_temperature_emergency).state;
            if (!isnan(value)) {
              sensor_valid = true;
            }
          }
          
          unsigned long time_since_valid = (now - id(${zone_slug}_last_valid_sensor_time)) / 1000;
          
          // ====================================================================
          // STATE TRANSITION LOGIC
          // ====================================================================
          
          if (!sensor_valid && time_since_valid >= ${emergency_timeout}) {
            // ================================================================
            // SENSOR FAILURE DETECTED
            // ================================================================
            
            if (current_state == 0) {
              // --------------------------------------------------------------
              // TRANSITION: Normal (0) → Active (1)
              // --------------------------------------------------------------
              id(${zone_slug}_${condition_id}_state) = 1;
              id(${zone_slug}_${condition_id}_last_trigger_time) = now;
              ESP_LOGW("emergency_condition", "${zone_name}: EMERGENCY ACTIVE - Sensor unavailable for %lu seconds", time_since_valid);
              
            } else if (current_state == 2) {
              // --------------------------------------------------------------
              // TRANSITION: Recovering (2) → Active (1)
              // Sensor failed again during recovery period
              // --------------------------------------------------------------
              id(${zone_slug}_${condition_id}_state) = 1;
              id(${zone_slug}_recovery_start_time) = 0;
              ESP_LOGW("emergency_condition", "${zone_name}: EMERGENCY RE-TRIGGERED - Sensor lost again during recovery");
              
            } else {
              // Already Active (1), no state change needed
              ESP_LOGD("emergency_condition", "${zone_name}: EMERGENCY ACTIVE - Still no sensor (%lu seconds)", time_since_valid);
            }
            
          } else if (sensor_valid) {
            // ================================================================
            // SENSOR IS VALID
            // ================================================================
            
            if (current_state == 1) {
              // --------------------------------------------------------------
              // TRANSITION: Active (1) → Recovering (2)
              // --------------------------------------------------------------
              id(${zone_slug}_${condition_id}_state) = 2;
              id(${zone_slug}_recovery_start_time) = now;
              ESP_LOGI("emergency_condition", "${zone_name}: EMERGENCY RECOVERING - Sensor restored");
              
            } else if (current_state == 2) {
              // --------------------------------------------------------------
              // TRANSITION: Recovering (2) → Normal (0)
              // Check if recovery stability period completed
              // --------------------------------------------------------------
              unsigned long recovery_duration = (now - id(${zone_slug}_recovery_start_time)) / 1000;
              
              if (recovery_duration >= ${recovery_timeout}) {
                id(${zone_slug}_${condition_id}_state) = 0;
                id(${zone_slug}_recovery_start_time) = 0;
                ESP_LOGI("emergency_condition", "${zone_name}: EMERGENCY NORMAL - Recovery complete after %lu seconds", recovery_duration);
              } else {
                ESP_LOGV("emergency_condition", "${zone_name}: EMERGENCY RECOVERING - %lu / ${recovery_timeout} seconds", recovery_duration);
              }
              
            } else {
              // Already Normal (0), no state change needed
              ESP_LOGV("emergency_condition", "${zone_name}: EMERGENCY NORMAL - Sensor healthy");
            }
          } else {
            // ================================================================
            // PRE-EMERGENCY WARNING
            // Sensor invalid but timeout not yet exceeded
            // ================================================================
            if (current_state == 0) {
              ESP_LOGW("emergency_condition", "${zone_name}: WARNING - No sensor data for %lu / ${emergency_timeout} seconds", time_since_valid);
            }
          }

# ============================================================================
# INTERFACE CONTRACT: Required Diagnostic Sensor
# ============================================================================

text_sensor:
  - platform: template
    id: ${zone_slug}_${condition_id}_state_sensor
    name: "${zone_name} Emergency State"
    icon: "mdi:alert-circle"
    update_interval: 5s
    lambda: |-
      int state = id(${zone_slug}_${condition_id}_state);
      if (state == 0) {
        return {"Normal"};
      } else if (state == 1) {
        return {"Active"};
      } else if (state == 2) {
        return {"Recovering"};
      } else {
        return {"Unknown"};
      }
