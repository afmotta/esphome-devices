# MEV Modbus Control Switches - Epic 18 Story 18.1.2
#
# Control switches for Cappellotto Air Fresh I MEV via Modbus writes.
# Replaces relay-based control (relays 18-21) with Modbus register writes.
#
# Register Mapping:
# - 1106: On/Off control (0=off, 1=on)
# - 1584: Summer/Winter mode (0=winter, 1=summer)
# - 1141: Dehumidify request (0=off, 1=on)
# - 1140: Integration request (0=off, 1=on)
#
# Required vars:
#   mev_slug: Device slug for entity IDs (e.g., "first_floor_mev")
#   mev_name: Friendly name prefix (e.g., "MEV Primo Piano")
#
# Note: Fan speed control remains via 0-10V DAC (Story 18.1.3)

switch:
  # Main power switch - Register 1106
  # Replaces relay_18 from mev.yaml
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Power"
    id: ${mev_slug}_power
    register_type: holding
    address: 1106
    bitmask: 1
    icon: mdi:power

  # Summer/Winter mode switch - Register 1584
  # Replaces relay_19 from mev.yaml
  # OFF = Winter mode, ON = Summer mode
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Summer Mode"
    id: ${mev_slug}_summer_mode
    register_type: holding
    address: 1584
    bitmask: 1
    icon: mdi:sun-snowflake-variant

  # Dehumidify request switch - Register 1141
  # Replaces relay_20 from mev.yaml
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Dehumidifier"
    id: ${mev_slug}_dehumidifier
    register_type: holding
    address: 1141
    bitmask: 1
    icon: mdi:water-percent

  # Integration request switch - Register 1140
  # Replaces relay_21 from mev.yaml
  # Enables cooling integration when active
  - platform: modbus_controller
    modbus_controller_id: ${mev_slug}_controller
    name: "${mev_name} Cooling"
    id: ${mev_slug}_cooling
    register_type: holding
    address: 1140
    bitmask: 1
    icon: mdi:snowflake
