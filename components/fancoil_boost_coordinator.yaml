# Fancoil Boost Coordinator for Ground Floor Hybrid Cooling
# ============================================================================
# Switches between radiant-only (comfort) and fancoil-boost (capacity) modes
#
# Operating Modes:
#   - Normal (Radiant Only): Radiant PIDs active, Fancoils OFF
#   - Boost (Fancoil Boost): Radiant at 100%, Fancoil PIDs active
#
# Activation triggers (OR logic - either condition triggers boost):
#   1. Temperature: delta > threshold (room too warm for radiant alone)
#   2. Humidity: humidity > threshold + hysteresis/2 (limits radiant capacity)
#
# Deactivation (AND logic - both conditions must be satisfied):
#   - Temperature: delta <= 0 (target reached)
#   - Humidity: humidity <= threshold - hysteresis/2 (symmetric hysteresis)
#
# Humidity hysteresis: Creates a dead band around the threshold to prevent
# oscillation. With threshold=65% and hysteresis=5%:
#   - Activate at > 67.5%
#   - Deactivate at <= 62.5%
#
# Humidity rationale: High humidity raises dew point, forcing radiant supply
# water to stay warmer (to avoid condensation), limiting cooling capacity.
# Fancoils can dehumidify while cooling, lowering dew point and enabling
# more aggressive radiant cooling.
#
# Minimum time-in-state: 10 minutes (prevents cycling)
#
# Required vars:
#   room_slug: Unique room identifier (e.g., "soggiorno")
#   room_name: Human-readable room name (e.g., "Soggiorno")
# ============================================================================

defaults:
  min_time_in_state_seconds: 600 # 10 minutes
  humidity_hysteresis: 5.0 # % RH dead band (symmetric around threshold)

globals:
  # Per-room boost state (Epic 14 - independent room control)
  - id: ${room_slug}_boost_active
    type: bool
    initial_value: "false"
    restore_value: true
  # Per-room timing for independent mode transitions
  - id: ${room_slug}_last_mode_change_time
    type: uint32_t
    initial_value: "0"

# Diagnostic sensors for monitoring
binary_sensor:
  - platform: template
    id: ${room_slug}_boost_active_sensor
    name: "${room_name} Boost Active"
    device_class: running
    icon: "mdi:fan"
    lambda: "return id(${room_slug}_boost_active);"

text_sensor:
  - platform: template
    id: ${room_slug}_cooling_mode
    name: "${room_name} Cooling Mode"
    icon: "mdi:thermostat"
    lambda: |-
      if (id(${room_slug}_boost_active)) {
        return {"Fancoil Boost"};
      }
      return {"Radiant Only"};
    update_interval: 5s

sensor:
  # Per-room temperature delta sensors (Epic 14)
  # These enable independent boost decisions per room
  - platform: template
    id: ${room_slug}_temp_delta
    name: "${room_name} Temperature Delta"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    icon: "mdi:thermometer-lines"
    lambda: |-
      float current = id(${room_slug}_room_temp_abstracted).state;
      float target = id(pid_radiant_${room_slug}).target_temperature;
      if (std::isnan(current) || std::isnan(target)) return NAN;
      // Positive delta = room is warmer than target (needs cooling)
      return current - target;
    update_interval: 30s

  # Per-room time in current mode (Epic 14 diagnostics)
  - platform: template
    id: ${room_slug}_time_in_mode
    name: "${room_name} Time In Mode"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: "mdi:timer"
    lambda: |-
      if (id(${room_slug}_last_mode_change_time) == 0) return 0.0;
      uint32_t elapsed_ms = millis() - id(${room_slug}_last_mode_change_time);
      return elapsed_ms / 60000.0;
    update_interval: 60s

# Coordinator logic - runs every 60 seconds
# Epic 14: Independent per-room evaluation
interval:
  - interval: 60s
    then:
      - lambda: |-
          // Only process during cooling mode (summer)
          if (!id(summer_mode).state) {
            if (id(${room_slug}_boost_active)) {
              ESP_LOGI("coordinator", "Exiting boost mode - heating season");
              id(${room_slug}_boost_active) = false;
            }
            return;
          }

          // Get threshold values (shared across rooms)
          float temp_threshold = id(effective_fancoil_boost_threshold).state;
          float humidity_threshold = id(effective_fancoil_humidity_threshold).state;

          // Get per-room values (local variables - no room_slug prefix needed)
          float temp_delta = id(${room_slug}_temp_delta).state;
          float humidity = id(${room_slug}_room_humidity_abstracted).state;

          // Check for invalid thresholds
          if (std::isnan(temp_threshold) || std::isnan(humidity_threshold)) {
            ESP_LOGW("coordinator", "Invalid threshold(s), skipping");
            return;
          }

          uint32_t now = millis();
          uint32_t min_time_ms = ${min_time_in_state_seconds} * 1000;
          float humidity_hysteresis = ${humidity_hysteresis};

          // Need valid temperature delta; humidity can be NaN (we'll skip humidity check if so)
          if (!std::isnan(temp_delta)) {
            bool min_time_elapsed = (id(${room_slug}_last_mode_change_time) == 0 ||
                                     (now - id(${room_slug}_last_mode_change_time)) >= min_time_ms);

            if (min_time_elapsed) {
              // Boost activation: OR logic (either condition triggers boost)
              // 1. Temperature too high: room can't be cooled fast enough by radiant
              // 2. Humidity too high: limits radiant capacity due to dew point constraint
              //    Uses upper bound of hysteresis band (threshold + hysteresis/2)
              bool temp_trigger = temp_delta > temp_threshold;
              float humidity_activate = humidity_threshold + (humidity_hysteresis / 2.0);
              bool humidity_trigger = !std::isnan(humidity) && humidity > humidity_activate;
              
              if (!id(${room_slug}_boost_active) && (temp_trigger || humidity_trigger)) {
                id(${room_slug}_boost_active) = true;
                id(${room_slug}_last_mode_change_time) = now;
                
                // IMPORTANT: Enable output override to lock radiant at 100%
                // This prevents the PID from overwriting our output value
                // Use number.set for override_value (expects 0-100%)
                auto value_call = id(${room_slug}_radiant_override_value).make_call();
                value_call.set_value(100.0);  // 100% open
                value_call.perform();
                
                // Use switch.turn_on for override flag
                id(${room_slug}_radiant_override).turn_on();
                
                // Force the output to apply the override value immediately
                id(slow_pwm_${room_slug}).set_level(1.0);

                // Enable THIS room's fancoil
                auto fancoil_call = id(pid_fancoil_${room_slug}).make_call();
                fancoil_call.set_mode("COOL");
                fancoil_call.perform();

                ESP_LOGI("coordinator", "=== ${room_slug} BOOST ACTIVATED ===");
                ESP_LOGI("coordinator", "  Temp trigger: %s (delta %.1f°C > %.1f°C)",
                         temp_trigger ? "YES" : "no", temp_delta, temp_threshold);
                ESP_LOGI("coordinator", "  Humidity trigger: %s (%.0f%% > %.0f%%)",
                         humidity_trigger ? "YES" : "no", humidity, humidity_activate);
                ESP_LOGI("coordinator", "Radiant output LOCKED at 100%%, Fancoil COOL");
              }
              
              // Boost deactivation: AND logic (both conditions must be satisfied)
              // - Temperature: target reached (delta <= 0)
              // - Humidity: below lower bound of hysteresis band (threshold - hysteresis/2)
              bool temp_ok = temp_delta <= 0;
              float humidity_deactivate = humidity_threshold - (humidity_hysteresis / 2.0);
              bool humidity_ok = std::isnan(humidity) || humidity <= humidity_deactivate;
              
              if (id(${room_slug}_boost_active) && temp_ok && humidity_ok) {
                id(${room_slug}_boost_active) = false;
                id(${room_slug}_last_mode_change_time) = now;

                // Disable THIS room's fancoil
                auto fancoil_call = id(pid_fancoil_${room_slug}).make_call();
                fancoil_call.set_mode("OFF");
                fancoil_call.perform();
                
                // Release output override - PID will resume control
                id(${room_slug}_radiant_override).turn_off();

                ESP_LOGI("coordinator", "=== ${room_name} NORMAL MODE ===");
                ESP_LOGI("coordinator", "  Temp OK: delta %.1f°C <= 0", temp_delta);
                ESP_LOGI("coordinator", "  Humidity OK: %.0f%% <= %.0f%%",
                         humidity, humidity_deactivate);
                ESP_LOGI("coordinator", "Radiant output UNLOCKED (PID resumed), Fancoil OFF");
              }
            }
          }
