packages:
  pid: !include
    file: heat_only_radiant.yaml

climate:
  - id: !extend pid_radiant_${room_slug}
    cool_output: slow_pwm_${room_slug}

# Summer mode handler: automatically switch between HEAT and COOL modes
binary_sensor:
  - id: !extend summer_mode
    on_state:
      then:
        - if:
            condition:
              lambda: "return x;"  # x = true means summer
            then:
              - climate.control:
                  id: pid_radiant_${room_slug}
                  mode: "COOL"
            else:
              - climate.control:
                  id: pid_radiant_${room_slug}
                  mode: "HEAT"
